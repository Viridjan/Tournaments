const ED = 1000,
  EM = 50,
  ES = 500,
  EK = "tournament_elo_db_v2",
  SK = "tournament_sheets_url_v1",
  BK = "tournament_local_backup",
  BK_LAST = "tournament_local_backup_last";
const DU =
  "https://script.google.com/macros/s/AKfycby_FEGovdBvl8oYWU1J40NXGdbQpL-B6wKaUTq4m1O9sb81s5pku3qjM6sGA0nFBWp6VQ/exec";

// ═══════════════════════════════════════════════════════
// Pure functions: ELO, pairing, scoring, prizes (no DOM, no state)
function gpBestOf(scores, last, drop) {
  const l = Math.max(2, Number(last) || 4);
  const d = Math.max(0, Number(drop) || 1);
  if (scores.length <= l - d) return scores.reduce((a, b) => a + b, 0);
  const recent = scores.slice(-l);
  const sorted = [...recent].sort((a, b) => a - b);
  return sorted.slice(d).reduce((a, b) => a + b, 0);
}
function eloExpected(a, b, scale) {
  return 1 / (1 + Math.pow(10, (b - a) / (scale || ES)));
}
function getElo(d, n) {
  return d[n.toLowerCase()]?.elo ?? ED;
}
function setElo(d, n, e, t) {
  return { ...d, [n.toLowerCase()]: { elo: e, name: n, test: !!t } };
}
function eCalc(a, b, s, kMax, scale) {
  const k = kMax || EM;
  const e = eloExpected(a, b, scale),
    r = k * (s - e),
    d = Math.round(Math.max(-k, Math.min(k, r)));
  return { dA: d, dB: -d };
}
function findGroups(names, prev, groupSize, allow) {
  const n = names.length;
  if (!n) return [];
  if (n % groupSize !== 0) return null;
  const used = new Array(n).fill(false), groups = [];
  function bt() {
    const i = used.indexOf(false);
    if (i === -1) return true;
    used[i] = true;
    function pick(group, start) {
      if (group.length === groupSize) {
        groups.push([...group]);
        if (bt()) return true;
        groups.pop();
        return false;
      }
      for (let j = start; j < n; j++) {
        if (used[j]) continue;
        if (!allow && group.some(gi => (prev[names[gi]] || new Set()).has(names[j]))) continue;
        used[j] = true; group.push(j);
        if (pick(group, j + 1)) return true;
        group.pop(); used[j] = false;
      }
      return false;
    }
    if (!pick([i], i + 1)) { used[i] = false; return false; }
    return true;
  }
  return bt() ? groups : null;
}
function getPrev(h, a) {
  const s = new Set(a.map(p => p.name)), m = {};
  h.forEach(r => r.forEach(x => {
    if (x.isBye) return;
    const inv = x.players.filter(n => s.has(n));
    inv.forEach((n1, i) => inv.forEach((n2, j) => {
      if (i !== j) (m[n1] = m[n1] || new Set()).add(n2);
    }));
  }));
  return m;
}
function getByes(h, a) {
  const counts = {};
  a.forEach(p => (counts[p.name] = 0));
  h.forEach(r => r.forEach(m => {
    if (m.isBye && counts[m.players[0]] !== undefined) counts[m.players[0]]++;
  }));
  return counts;
}
function splitGroups(n, max, round) {
  if (n <= 0) return [];
  let g;
  if (round === "up") {
    g = Math.max(1, Math.floor(n / max));
    while (g * (max + 1) < n) g++;
  } else {
    g = Math.max(1, Math.ceil(n / max));
  }
  const base = Math.floor(n / g), extra = n % g;
  return Array.from({ length: g }, (_, i) => (i < extra ? base + 1 : base));
}
function genPairings(pl, h, ph, cfg, db) {
  const groupSize = Math.max(2, Number(cfg.matchMax) || 2);
  const matchRound = cfg.matchRound || "none";
  const activePlayers = pl.filter(p => !p.eliminated);
  const sorted = [...activePlayers].sort((a, b) =>
    ph === "roundrobin"
      ? getElo(db, b.name) - getElo(db, a.name)
      : b.w / (b.w + b.d + b.l || 1) - a.w / (a.w + a.d + a.l || 1) || b.score - a.score
  );
  const pr = getPrev(h, activePlayers);
  const pa = [];
  let tp = sorted;

  if (groupSize <= 2 && sorted.length % 2 === 1) {
    const bc = getByes(h, activePlayers);
    const mb = Math.min(...Object.values(bc));
    let byeName = null;
    for (let i = sorted.length - 1; i >= 0; i--)
      if (bc[sorted[i].name] <= mb) { byeName = sorted[i].name; break; }
    if (!byeName) byeName = sorted[sorted.length - 1].name;
    tp = sorted.filter(p => p.name !== byeName);
    pa.push({ players: [byeName], scores: {}, result: "done", isBye: true, rematch: false, eloDeltas: {}, noElo: false });
  }

  const ns = tp.map(p => p.name);
  const mkMatch = playerNames => {
    const hasRematch = playerNames.some((p1, i) =>
      playerNames.some((p2, j) => j > i && (pr[p1] || new Set()).has(p2))
    );
    return { players: playerNames, scores: Object.fromEntries(playerNames.map(n => [n, ""])), result: null, isBye: false, rematch: hasRematch, eloDeltas: {}, noElo: false, extraPoints: {} };
  };

  let grouped = false;
  if (ns.length > 0 && ns.length % groupSize === 0) {
    let groups = findGroups(ns, pr, groupSize, false);
    if (!groups) groups = findGroups(ns, pr, groupSize, true);
    if (groups) {
      for (const group of groups) pa.push(mkMatch(group.map(i => ns[i])));
      grouped = true;
    }
  }

  if (!grouped && ns.length > 0) {
    const sizes = splitGroups(ns.length, groupSize, matchRound);
    let offset = 0;
    for (const size of sizes) {
      if (size > 0) pa.push(mkMatch(ns.slice(offset, offset + size)));
      offset += size;
    }
  }

  if (cfg.firstPlayer && groupSize === 2) {
    const firstCounts = {};
    pl.forEach(p => (firstCounts[p.name] = p.firstCount || 0));
    pa.forEach(mm => {
      if (mm.isBye || mm.players.length !== 2) return;
      const [a, b] = mm.players;
      if ((firstCounts[a] || 0) > (firstCounts[b] || 0) || ((firstCounts[a] || 0) === (firstCounts[b] || 0) && Math.random() < 0.5))
        [mm.players[0], mm.players[1]] = [b, a];
      firstCounts[mm.players[0]] = (firstCounts[mm.players[0]] || 0) + 1;
    });
  }

  return pa;
}
function rkLbl(i) {
  if (i === 0) return "Winner";
  const n = i + 1,
    s = n % 100,
    x = s >= 11 && s <= 13 ? "th" : { 1: "st", 2: "nd", 3: "rd" }[n % 10] || "th";
  return `${n}${x}`;
}
function defRanks() {
  const t = [30, 15, 15, 10, 10, 10, 5, 5],
    s = t.reduce((a, v) => a + v, 0),
    o = t.map((v) => Math.round((v / s) * 1000) / 10);
  o[o.length - 1] = Math.round((o[o.length - 1] + (100 - o.reduce((a, v) => a + v, 0))) * 10) / 10;
  return o.map((p, i) => ({ label: rkLbl(i), pct: p }));
}

function calcAlloc(pl, pr, rk, ec, prizePct, prizePctUp, ruPct, ruPctUp) {
  const tp = ec * pl.length;
  if (!tp || !rk.length || !pr.length) return null;
  const ppct = prizePct || 50;
  const rawAc = (pl.length * ppct) / 100;
  const allocated = prizePctUp ? Math.ceil(rawAc) : Math.floor(rawAc);
  if (allocated < 1) return null;
  const rupct = ruPct || 50;
  const rawRu = (allocated * rupct) / 100;
  const ruCount = ruPctUp ? Math.ceil(rawRu) : Math.floor(rawRu);
  const prizeRanks = rk.slice(0, allocated),
    inv = pr.map((p) => ({ ...p }));
  const gbr = {};
  const avoidMap = {};
  inv.forEach((p) => {
    const gList = String(p.guaranteed || "")
      .split(",")
      .map((s) => parseInt(s.trim()))
      .filter((n) => n > 0 && n <= prizeRanks.length);
    gList.forEach((g) => {
      if (p.maxQty > 0) {
        (gbr[g - 1] = gbr[g - 1] || []).push({
          name: p.name,
          value: p.value,
          qty: 1,
          total: p.value,
        });
        p.maxQty--;
      }
    });
    const aList = String(p.avoid || "")
      .split(",")
      .map((s) => parseInt(s.trim()))
      .filter((n) => n > 0);
    aList.forEach((a) => {
      (avoidMap[a - 1] = avoidMap[a - 1] || new Set()).add(p.name);
    });
  });
  function fbc(tgt, rd, avoided) {
    const av = inv.filter((p) => p.maxQty > 0 && p.value > 0 && !(avoided && avoided.has(p.name))),
      mu = av.map((p) =>
        Math.max(
          0,
          Math.min((p.maxQtyPerPlayer || 1) <= 1 ? 1 : p.maxQty, Math.ceil(tgt / p.value) + 1),
        ),
      );
    let best = null;
    function con(c, v) {
      if (rd ? v <= tgt : v >= tgt)
        if (!best || (rd ? v > best.value : v < best.value)) best = { combo: c.slice(), value: v };
    }
    function dfs(i, c, v) {
      if (i >= av.length) {
        con(c, v);
        return;
      }
      for (let q = 0; q <= mu[i]; q++) {
        c.push({ prize: av[i], qty: q });
        dfs(i + 1, c, v + q * av[i].value);
        c.pop();
        if (!rd && v + q * av[i].value > tgt + (best ? best.value - tgt : Infinity)) break;
      }
    }
    dfs(0, [], 0);
    return best;
  }
  let gt = 0;
  const allocs = prizeRanks.map((r, ri) => {
    const rd = ri >= ruCount;
    const tgt = (tp * r.pct) / 100;
    const ch = (gbr[ri] || []).map((g) => ({ ...g }));
    let f = ch.reduce((s, c) => s + c.total, 0);
    const rem = tgt - f;
    if (rem > 0.001) {
      const res = fbc(rem, rd, avoidMap[ri]);
      if (res)
        res.combo.forEach(({ prize, qty }) => {
          if (qty > 0) {
            const ip = inv.find((x) => x.name === prize.name),
              ex = ch.find((c) => c.name === prize.name);
            if (ex) {
              ex.qty += qty;
              ex.total += qty * prize.value;
            } else ch.push({ name: prize.name, value: prize.value, qty, total: qty * prize.value });
            ip.maxQty -= qty;
            f += qty * prize.value;
          }
        });
    }
    if (!ch.length) {
      const cheapest = inv.filter((p) => p.maxQty > 0 && p.value > 0).sort((a, b) => a.value - b.value)[0];
      if (cheapest) {
        ch.push({ name: cheapest.name, value: cheapest.value, qty: 1, total: cheapest.value });
        cheapest.maxQty--;
      }
    }
    const av = ch.reduce((s, c) => s + c.total, 0);
    gt += av;
    return { rank: r.label, target: tgt, chosen: ch, actualValue: av };
  });
  const tiebreaker = inv.filter((p) => p.value > 0).sort((a, b) => a.value - b.value)[0];
  if (tiebreaker)
    for (let h = 0; h < allocs.length - 1; h++)
      for (let l = h + 1; l < allocs.length; l++)
        while (allocs[h].actualValue < allocs[l].actualValue && tiebreaker.maxQty > 0) {
          const ex = allocs[h].chosen.find((c) => c.name === tiebreaker.name);
          if (ex) {
            ex.qty++;
            ex.total += tiebreaker.value;
          } else allocs[h].chosen.push({ name: tiebreaker.name, value: tiebreaker.value, qty: 1, total: tiebreaker.value });
          allocs[h].actualValue += tiebreaker.value;
          gt += tiebreaker.value;
          tiebreaker.maxQty--;
        }
  return { allocs, totalPool: tp, grandTotal: gt };
}

// ═══════════════════════════════════════════════════════
// Storage helpers and pairing generator
function now() {
  return new Date().toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
  });
}
function makeId() {
  const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let i = "";
  for (let x = 0; x < 6; x++) i += c[Math.floor(Math.random() * c.length)];
  return i;
}
function loadLS(k, f) {
  try {
    const v = localStorage.getItem(k);
    return v ? JSON.parse(v) : f;
  } catch {
    return f;
  }
}
function saveLS(k, v) {
  try {
    localStorage.setItem(k, JSON.stringify(v));
  } catch {}
}
function getSheetsUrl() {
  try {
    return localStorage.getItem(SK) || DU;
  } catch {
    return DU;
  }
}
function buildSnap(state) {
  const t = state.tournaments?.[state.tournamentId];
  return {
    v: 3,
    tournamentMode: state.tournamentId,
    tournamentName: t?.name || "",
    tournamentStarted: state.tournamentStarted,
    playerCount: state.players.length,
    round: state.currentRound,
    state: {
      players: state.players,
      currentRound: state.currentRound,
      phase: state.phase,
      pairings: state.pairings,
      history: state.history,
      matchLog: state.matchLog,
      startedAt: state.startedAt,
    },
    prizes: state.prizes,
    ranks: state.ranks,
    entryCost: state.entryCost,
    prizePct: state.prizePct,
    prizePctRoundUp: state.prizePctRoundUp,
    roundUpPct: state.roundUpPct,
    roundUpPctRoundUp: state.roundUpPctRoundUp,
    featureOverrides: state.featureOverrides,
    testMode: state.testMode,
    experimental: state.experimental,
    advancedSetup: state.advancedSetup,
  };
}
function autoSeedSave(state) {
  const url = getSheetsUrl();
  if (!url || !state.tournamentStarted || !state.players.length || state.testMode) return;
  const t = state.tournaments?.[state.tournamentId];
  const id = makeId();
  const label = `${t?.icon || ""} ${t?.name || ""} · ${state.players.length}p · R${state.currentRound} [auto]`;
  try {
    fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "seed_save", id, label, data: JSON.stringify(buildSnap(state)) }),
    }).catch(() => {});
  } catch {}
}
function makePairings(st, pl, h, ph) {
  const cfg = { ...st.tournaments?.[st.tournamentId]?.features, ...st.featureOverrides };
  if (!cfg) return [];
  const activeElo = st.eloDb?.[cfg.eloDB || "ELO"] || {};
  return genPairings(pl, h, ph, cfg, activeElo);
}

// ═══════════════════════════════════════════════════════
// Initial state and reducer — all state transitions
// All app state lives in this reducer. Key groups:

//   Navigation: OPEN_TOURNAMENT, SET_TAB
const init = {
  screen: "landing",
  tournamentId: null,
  players: [],
  currentRound: 0,
  phase: "roundrobin",
  pairings: [],
  history: [],
  matchLog: [],
  tournamentStarted: false,
  startedAt: null,
  eloDb: (() => {
    const raw = loadLS(EK, {});
    const vals = Object.values(raw);
    if (vals.length > 0 && vals.some((v) => v && typeof v === "object" && "elo" in v)) {
      const db = {};
      vals.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = e; });
      return { "ELO": db };
    }
    const result = {};
    Object.entries(raw).forEach(([sh, entries]) => {
      if (entries && typeof entries === "object") {
        const db = {};
        Object.values(entries).forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = e; });
        result[sh] = db;
      }
    });
    return result;
  })(),
  activeTab: "players",
  matchSubTab: "pairings",
  prizes: [
    { name: "Pauper", value: 7, maxQty: 1, maxQtyPerPlayer: 1, guaranteed: "1", avoid: "" },
    { name: "Tournament", value: 5, maxQty: 1, maxQtyPerPlayer: 1, guaranteed: "2", avoid: "" },
    { name: "Booster", value: 6, maxQty: 99, maxQtyPerPlayer: 99, guaranteed: "", avoid: "" },
    { name: "Token", value: 3, maxQty: 99, maxQtyPerPlayer: 1, guaranteed: "", avoid: "" },
  ],
  ranks: defRanks(),
  entryCost: 3,
  prizePct: 50,
  prizePctRoundUp: false,
  roundUpPct: 50,
  roundUpPctRoundUp: true,
  spinnerOptions: [
    { name: "Small decks", weight: 20 },
    { name: "Plancia commanders", weight: 13 },
    { name: "Two heads bozos", weight: 20 },
    { name: "Vintage lands", weight: 20 },
    { name: "Drafting commanders", weight: 13 },
    { name: "Ante", weight: 20 },
    { name: "Pain rare", weight: 20 },
  ],
  tournaments: {},
  featureOverrides: {},
  testMode: false,
  experimental: false,
  advancedSetup: false,
  sheetsUrl: getSheetsUrl(),
};

function featureBase(st) {
  return st.tournaments[st.tournamentId]?.features || {};
}

function reducer(st, a) {
  switch (a.type) {
    // ── Navigation ──
    case "OPEN_TOURNAMENT":
      return {
        ...st,
        screen: "tournament",
        tournamentId: a.id,
        activeTab: "players",
        matchSubTab: "pairings",
        featureOverrides: {},
        players: [],
        currentRound: 0,
        phase: "roundrobin",
        pairings: [],
        history: [],
        matchLog: [],
        tournamentStarted: false,
        startedAt: null,
      };
    case "SET_TAB":
      return { ...st, activeTab: a.tab };
    case "SET_MATCH_SUBTAB":
      return { ...st, matchSubTab: a.tab };
    // ── Player management ──
    case "ADD_PLAYER": {
      const n = a.name.trim();
      if (!n || st.players.some((p) => p.name.toLowerCase() === n.toLowerCase())) return st;
      return {
        ...st,
        players: [
          ...st.players,
          { name: n, score: 0, w: 0, d: 0, l: 0, eliminated: false, paid: false, firstCount: 0 },
        ],
      };
    }
    case "REMOVE_PLAYER":
      return { ...st, players: st.players.filter((_, i) => i !== a.index) };
    case "TOGGLE_PAID":
      return {
        ...st,
        players: st.players.map((p, i) => (i === a.index ? { ...p, paid: !p.paid } : p)),
      };
    case "ABANDON_PLAYER": {
      const abandoned = st.players[a.index];
      if (!abandoned) return st;
      const pl = st.players.map((p, i) =>
        i === a.index ? { ...p, eliminated: true, score: 0 } : p,
      );
      const pa = st.pairings.map((m) => {
        if (m.result || m.isBye || m.players.length !== 2) return m;
        if (!m.players.includes(abandoned.name)) return m;
        const winner = m.players.find(n => n !== abandoned.name);
        const scores = Object.fromEntries(m.players.map(n => [n, n === winner ? 1 : 0]));
        return { ...m, scores, result: "done", noElo: true, forfeit: true };
      });
      return {
        ...st,
        players: pl,
        pairings: pa,
        matchLog: [...st.matchLog, { type: "abandon", label: `${abandoned.name} abandoned`, ts: now() }],
      };
    }
    // ── Tournament flow ──
    case "START_TOURNAMENT": {
      const cfg = { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides };
      if (!cfg) return st;
      const ss = cfg.startScore ?? 0;
      const activeElo = st.eloDb[cfg.eloDB || "ELO"] || {};
      const pl = st.players.map((p) => ({
        ...p,
        score: ss,
        gpScores: [],
        w: 0,
        d: 0,
        l: 0,
        p1: 0,
        p2: 0,
        p3: 0,
        pLast: 0,
        eliminated: false,
        firstCount: 0,
        eloStart: getElo(activeElo, p.name),
      }));
      const ph = cfg.rrRounds > 0 ? "roundrobin" : "swiss";
      const ns = {
        ...st,
        players: pl,
        currentRound: 1,
        phase: ph,
        history: [],
        tournamentStarted: true,
        startedAt: Date.now(),
        matchLog: [
          { type: "start", label: `Tournament started — ${pl.length} players`, ts: now() },
        ],
        activeTab: "matches",
        matchSubTab: cfg.draft ? "draft" : "pairings",
      };
      return { ...ns, pairings: makePairings(ns, pl, [], ph) };
    }
    case "SET_MATCH_RESULT":
      return {
        ...st,
        pairings: st.pairings.map((m, i) => {
          if (i !== a.index) return m;
          if (a.reset) return { ...m, scores: Object.fromEntries(m.players.map(n => [n, ""])), result: null };
          return { ...m, scores: a.scores, result: "done" };
        }),
      };
    case "SET_MATCH_SCORE":
      return {
        ...st,
        pairings: st.pairings.map((m, i) => {
          if (i !== a.index) return m;
          const scores = { ...m.scores, [a.player]: a.value.replace(/[^0-9.\-]/g, "") };
          const done = m.players.every(n => String(scores[n]).trim() !== "");
          return { ...m, scores, result: done ? "done" : null };
        }),
      };
    case "ADD_EXTRA_POINTS": {
      const delta = a.delta || 1;
      const currentEp = st.pairings[a.index]?.extraPoints?.[a.player] || 0;
      const isOn = currentEp > 0;
      const diff = isOn ? -currentEp : delta;
      return {
        ...st,
        players: st.players.map((p) =>
          p.name !== a.player ? p : { ...p, score: p.score + diff }
        ),
        pairings: st.pairings.map((m, i) => {
          if (i !== a.index) return m;
          return { ...m, extraPoints: { ...(m.extraPoints || {}), [a.player]: isOn ? 0 : delta } };
        }),
      };
    }
    case "NEXT_ROUND": {
      const cfg = { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides };
      if (!cfg) return st;
      const eloNs = cfg.eloDB || "ELO";
      let pl = st.players.map((p) => ({ ...p })),
        db = { ...(st.eloDb[eloNs] || {}) };
      const sc = cfg.scoring,
        rp = st.pairings.map((m) => ({ ...m }));
      rp.forEach((m) => {
        if (m.isBye || m.result !== "done") return;
        const scored = m.players.filter((n) => String(m.scores[n]).trim() !== "");
        if (!scored.length) return;
        const sorted = [...scored].sort((a, b) => parseFloat(m.scores[b] || 0) - parseFloat(m.scores[a] || 0));
        const topScore = parseFloat(m.scores[sorted[0]] || 0);

        if (sc === "points") {
          const ptMap = [
            cfg.pts1 !== "" && cfg.pts1 !== undefined ? Number(cfg.pts1) : 3,
            cfg.pts2 !== "" && cfg.pts2 !== undefined ? Number(cfg.pts2) : 2,
            cfg.pts3 !== "" && cfg.pts3 !== undefined ? Number(cfg.pts3) : 1,
          ];
          const ptsLast = cfg.ptsLast !== "" && cfg.ptsLast !== undefined ? Number(cfg.ptsLast) : 0;
          const groups = [];
          let gi = 0;
          while (gi < sorted.length) {
            const gs = parseFloat(m.scores[sorted[gi]] || 0);
            let gj = gi;
            while (gj < sorted.length && parseFloat(m.scores[sorted[gj]] || 0) === gs) gj++;
            groups.push({ players: sorted.slice(gi, gj), score: gs });
            gi = gj;
          }
          let rank = 1;
          groups.forEach((g, idx) => {
            const isLast = groups.length > 1 && idx === groups.length - 1;
            const pts = isLast || g.score === 0 ? ptsLast : (ptMap[rank - 1] ?? ptsLast);
            g.players.forEach((n) => {
              const p = pl.find((x) => x.name === n);
              if (!p) return;
              if (cfg.grandPrix) {
                if (!p.gpScores) p.gpScores = [];
                p.gpScores.push(pts + (m.extraPoints?.[n] || 0));
                p.score = gpBestOf(p.gpScores, cfg.gpBestOfLast, cfg.gpDropWorst);
              } else {
                p.score += pts;
              }
              if (isLast || g.score === 0) p.pLast = (p.pLast || 0) + 1;
              else if (rank === 1)         p.p1 = (p.p1 || 0) + 1;
              else if (rank === 2)         p.p2 = (p.p2 || 0) + 1;
              else if (rank === 3)         p.p3 = (p.p3 || 0) + 1;
              else                         p.pLast = (p.pLast || 0) + 1;
            });
            rank += g.players.length;
          });
        } else if (sc === "swiss") {
          const tied = sorted.filter(n => parseFloat(m.scores[n] || 0) === topScore);
          const multi = tied.length > 1;
          sorted.forEach(n => {
            const p = pl.find(x => x.name === n);
            if (!p) return;
            const isTop = parseFloat(m.scores[n] || 0) === topScore;
            let pts;
            if (isTop && multi) { p.d++; pts = cfg.drawPoints ?? 1; }
            else if (isTop)     { p.w++; pts = cfg.winPoints ?? 3; }
            else                { p.l++; pts = cfg.lossPoints ?? 0; }
            if (cfg.grandPrix) {
              if (!p.gpScores) p.gpScores = [];
              p.gpScores.push(pts + (m.extraPoints?.[n] || 0));
              p.score = gpBestOf(p.gpScores, cfg.gpBestOfLast, cfg.gpDropWorst);
            } else {
              p.score += pts;
            }
          });
        } else if (sc === "lifepoints") {
          const draw = sorted.every(n => parseFloat(m.scores[n] || 0) === topScore);
          sorted.forEach(n => {
            const p = pl.find(x => x.name === n);
            if (!p) return;
            const isTop = parseFloat(m.scores[n] || 0) === topScore;
            if (draw) {
              p.d++;
              const basePenalty = Math.abs(cfg.drawPoints);
              const dp = cfg.cumulativeDrawPenalty ? basePenalty * p.d : basePenalty;
              p.score = Math.max(0, p.score - dp);
              if (p.score <= 0) p.eliminated = true;
            } else if (isTop) {
              p.w++;
              p.score = Math.max(0, p.score + cfg.winPoints);
            } else {
              p.l++;
              p.score = Math.max(0, p.score + cfg.lossPoints);
              if (p.score <= 0) p.eliminated = true;
            }
          });
        }

        if (cfg.elo && !m.noElo) {
          const n = m.players.length,
            K = (cfg.eloKMax || 50) / n,
            dl = Object.fromEntries(m.players.map((p) => [p, 0]));
          for (let i = 0; i < n; i++)
            for (let j = i + 1; j < n; j++) {
              const pA = m.players[i], pB = m.players[j],
                sA = parseFloat(m.scores[pA] || 0), sB = parseFloat(m.scores[pB] || 0),
                rA = getElo(db, pA), rB = getElo(db, pB),
                eA = eloExpected(rA, rB, cfg.eloScale),
                scA = sA > sB ? 1 : sA < sB ? 0 : 0.5;
              dl[pA] += K * (scA - eA);
              dl[pB] += K * ((1 - scA) - (1 - eA));
            }
          m.eloDeltas = {};
          m.players.forEach((p) => {
            const d = Math.round(dl[p]);
            m.eloDeltas[p] = d;
            db = setElo(db, p, getElo(db, p) + d, db[p.toLowerCase()]?.test);
          });
        }
      });
      const h = [...st.history, rp],
        nr = st.currentRound + 1;
      let ph = st.phase;
      if (ph === "roundrobin" && nr > cfg.rrRounds) ph = "swiss";
      const activePlayers = pl.filter((p) => !p.eliminated),
        go = cfg.scoring === "lifepoints" && activePlayers.length <= 1;
      const newEloDb = { ...st.eloDb, [eloNs]: db };
      const ns = {
        ...st,
        players: pl,
        eloDb: newEloDb,
        history: h,
        currentRound: nr,
        phase: ph,
        matchLog: [
          ...st.matchLog,
          { type: "round", label: `Round ${st.currentRound} completed`, ts: now() },
        ],
        activeTab: "matches",
        matchSubTab: go ? "standings" : st.matchSubTab,
      };
      saveLS(EK, newEloDb);
      return { ...ns, pairings: go ? [] : makePairings(ns, pl, h, ph) };
    }
    case "END_TOURNAMENT": {
      try {
        localStorage.removeItem(BK + "_" + st.tournamentId);
        localStorage.removeItem(BK_LAST);
      } catch {}
      const sorted = [...st.players].sort((a, b) => b.score - a.score || b.w - a.w);
      return {
        ...st,
        players: st.players.map((p) => (p.name === sorted[0]?.name ? p : { ...p, eliminated: true })),
        activeTab: "matches",
        matchSubTab: "standings",
      };
    }
    case "NEW_GP_SESSION": {
      const cfg = { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides };
      if (!cfg) return st;
      const ph = cfg.rrRounds > 0 ? "roundrobin" : "swiss";
      const ns = { ...st, currentRound: 1, phase: ph, pairings: [] };
      return { ...ns, pairings: makePairings(ns, st.players, st.history, ph) };
    }
    // ── Remote data ──
    case "SET_TOURNAMENTS": {
      const tournaments = {};
      a.tournaments.forEach((t) => { if (t.id) tournaments[t.id] = t; });
      return { ...st, tournaments };
    }
    case "SET_ELO_DB": {
      const sheet = a.col || "ELO";
      const db = {};
      Object.values(a.db).forEach((e) => {
        if (e?.name) db[e.name.toLowerCase()] = e;
      });
      const newEloDb = { ...st.eloDb, [sheet]: db };
      saveLS(EK, newEloDb);
      return { ...st, eloDb: newEloDb };
    }

    // ── Prizes ──
    case "ADD_PRIZE":
      return {
        ...st,
        prizes: [
          ...st.prizes,
          { name: "", value: 0, maxQty: 1, maxQtyPerPlayer: 1, guaranteed: "", avoid: "" },
        ],
      };
    case "REMOVE_PRIZE":
      return { ...st, prizes: st.prizes.filter((_, i) => i !== a.index) };
    case "UPDATE_PRIZE":
      return {
        ...st,
        prizes: st.prizes.map((p, i) => (i === a.index ? { ...p, [a.field]: a.value } : p)),
      };
    case "UPDATE_RANK":
      return {
        ...st,
        ranks: st.ranks.map((r, i) => (i === a.index ? { ...r, [a.field]: a.value } : r)),
      };
    case "SET_ENTRY_COST":
      return { ...st, entryCost: a.value };
    case "SET_PRIZE_PCT":
      return { ...st, prizePct: a.value };
    case "SET_PRIZE_PCT_ROUNDUP":
      return { ...st, prizePctRoundUp: a.value };
    case "SET_ROUNDUP_PCT":
      return { ...st, roundUpPct: a.value };
    case "SET_ROUNDUP_PCT_ROUNDUP":
      return { ...st, roundUpPctRoundUp: a.value };
    case "ADD_SPINNER_OPTION":
      return { ...st, spinnerOptions: [...st.spinnerOptions, a.option] };
    case "REMOVE_SPINNER_OPTION":
      return { ...st, spinnerOptions: st.spinnerOptions.filter((_, i) => i !== a.index) };
    case "UPDATE_SPINNER_WEIGHT":
      return {
        ...st,
        spinnerOptions: st.spinnerOptions.map((o, i) =>
          i === a.index ? { ...o, weight: Math.max(1, parseInt(a.value) || 1) } : o,
        ),
      };
    // ── Dev / test ──
    case "INJECT_TEST_PLAYERS": {
      const ns = [
        "Alice",
        "Bob",
        "Carol",
        "Dave",
        "Eve",
        "Frank",
        "Grace",
        "Hank",
        "Iris",
        "Jack",
        "Karen",
        "Leo",
        "Mia",
        "Ned",
        "Olivia",
        "Pete",
        "Quinn",
        "Rose",
        "Sam",
        "Tina",
        "Uma",
        "Victor",
        "Wendy",
        "Xander",
        "Yara",
        "Zoe",
        "Aaron",
        "Beth",
        "Caleb",
        "Diana",
        "Ethan",
        "Fiona",
        "George",
        "Hannah",
        "Ivan",
        "Julia",
      ];
      const testNs = (st.tournaments?.[st.tournamentId] ?
        { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides }.eloDB
        : null) || "ELO";
      let db = { ...(st.eloDb[testNs] || {}) };
      const pl = [];
      for (let i = 0; i < a.count; i++) {
        const n = ns[i] || `Player ${i + 1}`;
        db = setElo(db, n, 800 + Math.floor(Math.random() * 800), true);
        pl.push({
          name: n,
          score: 0,
          w: 0,
          d: 0,
          l: 0,
          eliminated: false,
          paid: false,
          firstCount: 0,
        });
      }
      return { ...st, players: pl, eloDb: { ...st.eloDb, [testNs]: db } };
    }
    case "AUTO_SELECT_WINNERS": {
      const autoC = { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides };
      return {
        ...st,
        pairings: st.pairings.map((m) => {
          if (m.result || m.isBye) return m;
          if (autoC?.scoring === "points") {
            const sc = { ...m.scores };
            m.players.forEach((n) => { sc[n] = String(Math.floor(Math.random() * 21)); });
            return { ...m, scores: sc, result: "done" };
          }
          const wi = Math.floor(Math.random() * m.players.length);
          const scores = Object.fromEntries(m.players.map((n, i) => [n, i === wi ? 1 : 0]));
          return { ...m, scores, result: "done" };
        }),
      };
    }
    // ── Session / settings ──
    case "FULL_RESET":
      try {
        localStorage.removeItem(BK + "_" + st.tournamentId);
        localStorage.removeItem(BK_LAST);
      } catch {}
      return {
        ...init,
        eloDb: {},
        screen: "tournament",
        tournamentId: st.tournamentId,
        activeTab: "players",
        sheetsUrl: st.sheetsUrl,
      };
    case "SET_SHEETS_URL":
      try {
        if (a.url) localStorage.setItem(SK, a.url);
        else localStorage.removeItem(SK);
      } catch {}
      return { ...st, sheetsUrl: a.url };
    case "LOG_EVENT":
      return {
        ...st,
        matchLog: [...st.matchLog, { type: a.eventType, label: a.label, ts: now() }],
      };
    case "TOGGLE_FEATURE": {
      const ov = { ...st.featureOverrides };
      const base = featureBase(st);
      if (ov[a.key] !== undefined) delete ov[a.key];
      else ov[a.key] = !base[a.key];
      return { ...st, featureOverrides: ov };
    }
    case "SET_FEATURE": {
      const ov = { ...st.featureOverrides };
      const base = featureBase(st);
      if (a.value === base[a.key]) delete ov[a.key];
      else ov[a.key] = a.value;
      return { ...st, featureOverrides: ov };
    }
    case "SET_TEST_MODE":
      return { ...st, testMode: a.value };
    case "SET_EXPERIMENTAL":
      return { ...st, experimental: a.value };
    case "SET_ADVANCED":
      return { ...st, advancedSetup: a.value };
    case "RESTORE_SNAPSHOT": {
      const snap = a.snapshot;
      return {
        ...st,
        ...snap.state,
        tournamentStarted: !!snap.tournamentStarted,
        tournamentId: snap.tournamentMode || st.tournamentId,
        prizes: snap.prizes || st.prizes,
        ranks: snap.ranks || st.ranks,
        entryCost: snap.entryCost ?? st.entryCost,
        prizePct: snap.prizePct ?? st.prizePct,
        prizePctRoundUp: snap.prizePctRoundUp ?? st.prizePctRoundUp,
        roundUpPct: snap.roundUpPct ?? st.roundUpPct,
        roundUpPctRoundUp: snap.roundUpPctRoundUp ?? st.roundUpPctRoundUp,
        featureOverrides: snap.featureOverrides || st.featureOverrides,
        testMode: snap.testMode ?? st.testMode,
        experimental: snap.experimental ?? st.experimental,
        advancedSetup: snap.advancedSetup ?? st.advancedSetup,
        screen: "tournament",
        activeTab: snap.tournamentStarted ? "matches" : "players",
      };
    }
    default:
      return st;
  }
}

// Timer — countdown with start/pause/reset, plays 6-tone audio alarm at zero
function Timer({ minutes }) {
  const total = minutes * 60;
  const [left, setLeft] = useState(total);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null),
    audioRef = useRef(null),
    endTimeRef = useRef(null),
    wakeLockRef = useRef(null);
  const alarm = useCallback(() => {
    try {
      if (!audioRef.current) audioRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioRef.current;
      [880, 660, 880, 660, 880, 1100].forEach((f, i) => {
        const o = ctx.createOscillator(),
          g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.type = "sine";
        o.frequency.value = f;
        const t = ctx.currentTime + i * 0.38;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.45, t + 0.05);
        g.gain.linearRampToValueAtTime(0, t + 0.33);
        o.start(t);
        o.stop(t + 0.38);
      });
    } catch {}
  }, []);
  const acquireWakeLock = useCallback(async () => {
    try {
      if (navigator.wakeLock) wakeLockRef.current = await navigator.wakeLock.request("screen");
    } catch {}
  }, []);
  const releaseWakeLock = useCallback(() => {
    wakeLockRef.current?.release().catch(() => {});
    wakeLockRef.current = null;
  }, []);
  useEffect(() => {
    if (running && left > 0) {
      if (!endTimeRef.current) {
        endTimeRef.current = Date.now() + left * 1000;
        acquireWakeLock();
      }
      intervalRef.current = setInterval(() => {
        const remaining = Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000));
        if (remaining <= 0) {
          endTimeRef.current = null;
          releaseWakeLock();
          setRunning(false);
          setLeft(0);
          alarm();
        } else {
          setLeft(remaining);
        }
      }, 500);
    } else {
      endTimeRef.current = null;
      releaseWakeLock();
    }
    return () => clearInterval(intervalRef.current);
  }, [running, alarm, acquireWakeLock, releaseWakeLock]);
  useEffect(() => {
    const onVisible = () => {
      if (!running || !endTimeRef.current) return;
      if (!wakeLockRef.current) acquireWakeLock();
      const remaining = Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000));
      setLeft(remaining);
      if (remaining <= 0) {
        endTimeRef.current = null;
        releaseWakeLock();
        setRunning(false);
        alarm();
      }
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => document.removeEventListener("visibilitychange", onVisible);
  }, [running, alarm, acquireWakeLock, releaseWakeLock]);
  const urgent = left <= 60,
    m = Math.floor(left / 60),
    sec = left % 60;
  return (
    <div
      style={{
        background: C.subtle,
        borderRadius: 12,
        padding: "16px 20px",
        marginBottom: 16,
        display: "flex",
        alignItems: "center",
        gap: 12,
        flexWrap: "wrap",
      }}
    >
      <div
        style={{
          fontSize: 36,
          fontWeight: 500,
          fontVariantNumeric: "tabular-nums",
          letterSpacing: 3,
          minWidth: 100,
          color: urgent ? C.heart : C.text,
        }}
      >
        {String(m).padStart(2, "0")}:{String(sec).padStart(2, "0")}
      </div>
      <div
        style={{
          flex: 1,
          minWidth: 80,
          height: 6,
          background: "#ddd",
          borderRadius: 3,
          overflow: "hidden",
        }}
      >
        <div
          style={{
            height: "100%",
            borderRadius: 3,
            background: urgent ? C.heart : C.accent,
            width: `${(left / total) * 100}%`,
            transition: "width 0.9s linear",
          }}

// Draft groups — snake-draft seating by ELO across tables
function DraftGroups({ players, eloDb, dispatch }) {
  const n = players.length;
  if (n < 2)
    return (
      <div style={{ textAlign: "center", padding: 32, color: C.faint }}>
        Add at least 2 players.
      </div>
    );
  const ng = Math.max(1, Math.floor(n / 5)),
    sorted = [...players].sort((a, b) => getElo(eloDb, b.name) - getElo(eloDb, a.name)),
    g = Array.from({ length: ng }, () => []);
  sorted.forEach((p, i) => {
    const r = Math.floor(i / ng);
    g[r % 2 === 0 ? i % ng : ng - 1 - (i % ng)].push(p);
  });
  const gc = ["#185fa5", "#0f6e56", "#a32d2d", "#854f0b", "#534ab7", "#3b6d11"];
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
        <span style={{ fontSize: 15, fontWeight: 500 }}>
          {ng} table{ng > 1 ? "s" : ""} · {n} players
        </span>
        <Btn
          onClick={() =>
            dispatch({ type: "LOG_EVENT", eventType: "draft-end", label: "Draft ended" })
          }
          style={{ fontSize: 12 }}
        >
          Draft ended ↗
        </Btn>
      </div>
      <div
        style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))",
          gap: 10,
        }}
      >
        {g.map((gr, gi) => {
          const co = gc[gi % gc.length],
            elos = gr.map((p) => getElo(eloDb, p.name)),
            avg = Math.round(elos.reduce((a, v) => a + v, 0) / elos.length);
          return (
            <Card key={gi} style={{ borderLeft: `3px solid ${co}`, padding: "14px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontWeight: 500, color: co, fontSize: 15 }}>Table {gi + 1}</span>
                <span style={{ fontSize: 12, color: C.muted }}>
                  {gr.length}p · avg {avg}
                </span>
              </div>
              {gr
                .sort((a, b) => getElo(eloDb, b.name) - getElo(eloDb, a.name))
                .map((p) => (
                  <div
                    key={p.name}
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      padding: "4px 0",
                      fontSize: 13,
                      borderBottom: `0.5px solid ${C.bL}`,
                    }}
                  >
                    <span>{p.name}</span>
                    <span style={{ color: C.muted, fontSize: 11 }}>{getElo(eloDb, p.name)}</span>
                  </div>
                ))}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// Weighted random wheel (experimental feature)
// Spinner — weighted random wheel (experimental)
// Canvas-rendered with cubic ease-out animation
function SpinnerTab({ state, dispatch }) {
  const cr = useRef(null),
    [angle, setAngle] = useState(0),
    [spinning, setSpinning] = useState(false),
    [result, setResult] = useState("");
  const opts = state.spinnerOptions,
    total = opts.reduce((s, o) => s + (o.weight || 1), 0),
    cols = ["#8b5cf6", "#a78bfa", "#c4b5fd", "#7c3aed", "#ddd6fe", "#6d28d9", "#ede9fe"];
  const draw = useCallback(
    (a) => {
      const cv = cr.current;
      if (!cv) return;
      const ctx = cv.getContext("2d"),
        cx = 100,
        cy = 100,
        r = 98;
      ctx.clearRect(0, 0, 200, 200);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((a * Math.PI) / 180);
      let start = -Math.PI / 2;
      (opts.length ? opts : [{ name: "(none)", weight: 1 }]).forEach((o, i) => {
        const sl = 2 * Math.PI * ((o.weight || 1) / total);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, start + sl);
        ctx.closePath();
        ctx.fillStyle = cols[i % cols.length];
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.save();
        ctx.rotate(start + sl / 2 + Math.PI / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${Math.min(16, Math.max(9, 110 / opts.length))}px system-ui`;
        ctx.fillText(String(i + 1), 0, -(r * 0.65));
        ctx.restore();
        start += sl;
      });
      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, 14, 0, 2 * Math.PI);
      ctx.fillStyle = "#fff";
      ctx.fill();
    },
    [opts, total],
  );
  useEffect(() => {
    draw(angle);
  }, [angle, draw]);
  const spin = () => {
    if (spinning || !opts.length) return;
    setSpinning(true);
    setResult("");
    let rand = Math.random() * total,
      wi = 0;
    for (let i = 0; i < opts.length; i++) {
      rand -= opts[i].weight || 1;
      if (rand <= 0) {
        wi = i;
        break;
      }
    }
    let cum = 0;
    const ss = opts.map((o) => {
        const s = cum;
        cum += ((o.weight || 1) / total) * 360;
        return s;
      }),
      se = opts.map((o, i) => ss[i] + ((o.weight || 1) / total) * 360);
    const stop = ss[wi] + Math.random() * (se[wi] - ss[wi]),
      ta = (360 - stop + 360) % 360,
      extra = 5 + Math.floor(Math.random() * 5),
      td = extra * 360 + ta - (((angle % 360) + 360) % 360),
      dur = 3000 + Math.random() * 1000,
      sa = angle,
      st2 = performance.now(),
      ease = (t) => 1 - Math.pow(1 - t, 3);
    const frame = (n) => {
      const t = Math.min((n - st2) / dur, 1);
      setAngle(sa + td * ease(t));
      if (t < 1) requestAnimationFrame(frame);
      else {
        setResult("🎲 " + opts[wi].name);
        setSpinning(false);
      }
    };
    requestAnimationFrame(frame);
  };
  return (
    <div>
      <Card>
        <h3 style={{ ...S.cardTitle, color: C.purple, marginBottom: 4 }}>🎲 Mode Spinner</h3>
        <p style={{ fontSize: 13, color: C.muted, marginBottom: 24 }}>
          Spin to randomly pick a game mode.
        </p>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
          <div style={{ position: "relative", width: 200, height: 200 }}>
            <div
              style={{
                position: "absolute",
                top: -14,
                left: "50%",
                transform: "translateX(-50%)",
                fontSize: 22,
                zIndex: 2,
              }}
            >
              ▼
            </div>
            <canvas
              ref={cr}
              width={200}
              height={200}
              style={{ borderRadius: "50%", display: "block" }}
            />
          </div>
          <Btn
            onClick={spin}
            disabled={spinning}
            style={{
              fontSize: 15,
              padding: "10px 32px",
              borderColor: C.purple,
              color: C.purple,
              fontWeight: 500,
            }}
          >
            Spin!
          </Btn>
          <div
            style={{
              fontSize: 18,
              fontWeight: 600,
              color: C.purple,
              minHeight: 28,
              textAlign: "center",
            }}
          >
            {result}
          </div>
        </div>
      </Card>
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
          <h3 style={{ ...S.cardTitle, marginBottom: 0 }}>Options</h3>
          <Btn
            onClick={() => {
              const n = prompt("New mode name:");
              if (n?.trim())
                dispatch({ type: "ADD_SPINNER_OPTION", option: { name: n.trim(), weight: 20 } });
            }}
            style={{ fontSize: 12, padding: "4px 10px", borderColor: C.purple, color: C.purple }}
          >
            + Add
          </Btn>
        </div>
        <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th
                style={{
                  fontSize: 11,
                  color: C.muted,
                  fontWeight: 500,
                  textAlign: "center",
                  padding: "4px 6px",
                  borderBottom: `0.5px solid ${C.border}`,

                }}
              >
                #

              <th
                style={{

              <th

                }}
              >

              </th>
              <th

          <tbody>
            {opts.map((o, i) => (

function doGet(e) {

// ── ELO Database ──

function loadElo(colName) {
  var col = colName || "ELO";
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("ELO");
  if (!sheet) return jsonResponse({ entries: [] });

  var data = sheet.getDataRange().getValues();
  if (data.length < 1) return jsonResponse({ entries: [] });

  var headers = data[0].map(function(h) { return String(h).trim().toLowerCase(); });
  var nameIdx = headers.indexOf("name");
  var eloIdx = headers.indexOf(col.toLowerCase());
  var testIdx = headers.indexOf("test");

  if (nameIdx === -1 || eloIdx === -1) return jsonResponse({ entries: [] });

  var seen = {};
  for (var i = 1; i < data.length; i++) {
    var pName = String(data[i][nameIdx] || "").trim();
    if (!pName) continue;
    var key = pName.toLowerCase();
    seen[key] = {
      name: pName,
      elo: parseInt(data[i][eloIdx]) || 1000,
      test: testIdx !== -1 && (data[i][testIdx] === true || String(data[i][testIdx]).toLowerCase() === "true")
    };
  }

  var entries = [];
  for (var k in seen) entries.push(seen[k]);
  return jsonResponse({ entries: entries });
}

function saveElo(data) {
  var colName = data.col || "ELO";
  var spreadsheet = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = spreadsheet.getSheetByName("ELO");
  if (!sheet) {
    sheet = spreadsheet.insertSheet("ELO");
    sheet.getRange(1, 1, 1, 3).setValues([["Test", colName, "Name"]]);
  }

  var entries = data.entries || [];
  if (!entries.length) return jsonResponse({ ok: true, count: 0 });

  var allData = sheet.getDataRange().getValues();
  var headers = allData[0].map(function(h) { return String(h).trim(); });

  var nameIdx = headers.indexOf("Name");
  var eloIdx = headers.indexOf(colName);
  var testIdx = headers.indexOf("Test");

  // Add Name column if sheet is empty/malformed
  if (nameIdx === -1) {
    sheet.getRange(1, 1).setValue("Name");
    nameIdx = 0;
  }
  // Add this ELO column if missing
  if (eloIdx === -1) {
    var insertAt = testIdx !== -1 ? testIdx : headers.length;
    // Shift Test column right if it exists
    if (testIdx !== -1) {
      sheet.insertColumnBefore(testIdx + 1);
      sheet.getRange(1, testIdx + 1).setValue(colName);
      eloIdx = testIdx;
      testIdx = testIdx + 1;
    } else {
      sheet.getRange(1, headers.length + 1).setValue(colName);
      eloIdx = headers.length;
    }
  }
  // Add Test column if missing
  if (testIdx === -1) {
    allData = sheet.getDataRange().getValues();
    headers = allData[0].map(function(h) { return String(h).trim(); });
    testIdx = headers.length;
    sheet.getRange(1, testIdx + 1).setValue("Test");
  }

  // Re-read after any column additions
  allData = sheet.getDataRange().getValues();
  headers = allData[0].map(function(h) { return String(h).trim(); });
  nameIdx = headers.indexOf("Name");
  eloIdx = headers.indexOf(colName);
  testIdx = headers.indexOf("Test");

  // Build name→row map
  var rowMap = {};
  for (var i = 1; i < allData.length; i++) {
    var n = String(allData[i][nameIdx] || "").trim().toLowerCase();
    if (n) rowMap[n] = i + 1;
  }

  // Update or append
  for (var j = 0; j < entries.length; j++) {
    var e = entries[j];
    var key = e.name.toLowerCase();
    var testVal = e.test === true || e.test === "true";

    if (rowMap[key]) {
      sheet.getRange(rowMap[key], eloIdx + 1).setValue(e.elo);
      sheet.getRange(rowMap[key], testIdx + 1).setValue(testVal);
    } else {
      // New player: fill row with 1000 for all ELO columns, then set this one
      var newRow = new Array(headers.length).fill("");
      newRow[nameIdx] = e.name;
      newRow[testIdx] = testVal;
      for (var h = 0; h < headers.length; h++) {
        if (h !== nameIdx && h !== testIdx && headers[h] !== "") newRow[h] = 1000;
      }
      newRow[eloIdx] = e.elo;
      sheet.appendRow(newRow);
      rowMap[key] = sheet.getLastRow();
    }
  }

  return jsonResponse({ ok: true, count: entries.length });
}

// ── Seeds ──

function saveSeed(data) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Seeds");
  if (!sheet) {
    sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet("Seeds");
    sheet.getRange(1, 1, 1, 4).setValues([["ID", "Label", "Timestamp", "Data"]]);
  }

  var id = data.id || "";
  var label = data.label || "";
  var timestamp = new Date().toISOString();
  var stored = data.data || JSON.stringify(data.chunks || []);

  sheet.appendRow([id, label, timestamp, stored]);

  return jsonResponse({ ok: true, id: id });
}

function loadSeed(id) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Seeds");
  if (!sheet) return jsonResponse({ ok: false, error: "No Seeds sheet" });

  id = (id || "").toUpperCase();
  var data = sheet.getDataRange().getValues();

  for (var i = data.length - 1; i >= 1; i--) {
    if (String(data[i][0]).toUpperCase() === id) {
      var raw = String(data[i][3]);
      try {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          return jsonResponse({ ok: true, chunks: parsed });
        } else {
          return jsonResponse({ ok: true, data: raw });
        }
      } catch (e) {
        return jsonResponse({ ok: false, error: "Corrupt seed data" });
      }
    }
  }

  return jsonResponse({ ok: false, error: "Seed not found: " + id });
}

function deleteSeed(data) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Seeds");
  if (!sheet) return jsonResponse({ ok: false, error: "No Seeds sheet" });

  var id = (data.id || "").toUpperCase();
  var rows = sheet.getDataRange().getValues();

  for (var i = rows.length - 1; i >= 1; i--) {
    if (String(rows[i][0]).toUpperCase() === id) {
      sheet.deleteRow(i + 1);
    }
  }

  return jsonResponse({ ok: true, id: id });
}

function listSeeds() {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Seeds");
  if (!sheet) return jsonResponse({ seeds: [] });

  var data = sheet.getDataRange().getValues();
  var seeds = [];

  for (var i = 1; i < data.length; i++) {
    seeds.push({
      id: String(data[i][0]),
      label: String(data[i][1]),
      timestamp: String(data[i][2])
    });
  }

  return jsonResponse({ seeds: seeds });
}

// ── Rules ──

function loadRules(tournament) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Rules");
  if (!sheet) return jsonResponse({ rows: [] });

  tournament = (tournament || "").toLowerCase();
  var data = sheet.getDataRange().getValues();
  var rows = [];

  for (var i = 1; i < data.length; i++) {
    if (String(data[i][0]).toLowerCase() === tournament) {
      rows.push(data[i].slice(1).filter(function(c) { return c !== ""; }));
    }
  }

  return jsonResponse({ rows: rows });
}

// ── Tournaments ──

var TOURNAMENT_FEATURE_KEYS = [
  "scoring", "startScore", "pts1", "pts2", "pts3", "ptsLast", "winPoints", "drawPoints", "lossPoints",
  "cumulativeDrawPenalty", "rrRounds", "timerMinutes", "draft", "elo", "eloKMax",
  "eloScale", "eloDB", "firstPlayer", "grandPrix", "prizes",
  "timeout", "timeoutTime", "rules", "matchRound", "matchMax",
  "gpBestOfLast", "gpDropWorst", "extraPoints", "extraPointsValue"
];

function loadTournaments() {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Settings");
  if (!sheet) return jsonResponse({ tournaments: [] });

  var data = sheet.getDataRange().getValues();
  if (data.length < 2) return jsonResponse({ tournaments: [] });

  var headers = data[0].map(function(h) { return String(h).trim().toLowerCase(); });
  var tournaments = [];

  function hIdx(key) { return headers.indexOf(key.toLowerCase()); }

  var idColIdx = hIdx("id") !== -1 ? hIdx("id") : 0;

  for (var i = 1; i < data.length; i++) {
    var row = data[i];
    var id = String(row[idColIdx] || "").trim();
    if (!id) continue;

    var t = {
      id: id,
      name: String(row[hIdx("name")] !== undefined ? row[hIdx("name")] : ""),
      icon: String(row[hIdx("icon")] !== undefined ? row[hIdx("icon")] : ""),
      desc: String(row[hIdx("desc")] !== undefined ? row[hIdx("desc")] : ""),
      features: {}
    };

    TOURNAMENT_FEATURE_KEYS.forEach(function(key) {
      var idx = hIdx(key);
      if (idx === -1) return;
      var val = row[idx];
      if (val instanceof Date) {
        var hh = val.getHours(), mm = val.getMinutes();
        val = (hh < 10 ? "0" : "") + hh + ":" + (mm < 10 ? "0" : "") + mm;
      }
      t.features[key] = val;
    });

    tournaments.push(t);
  }

  return jsonResponse({ tournaments: tournaments });
}

function saveTournament(data) {
  var t = data.tournament;
  if (!t || !t.id) return jsonResponse({ error: "Missing tournament id" });

  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Settings");
  if (!sheet) {
    sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet("Settings");
    var initHeaders = ["id", "name", "icon", "desc"].concat(TOURNAMENT_FEATURE_KEYS);
    sheet.getRange(1, 1, 1, initHeaders.length).setValues([initHeaders]);
  }

  var existing = sheet.getDataRange().getValues();
  var headers = existing[0].map(function(h) { return String(h).trim(); });

  var row = headers.map(function(h) {
    if (h === "id") return t.id;
    if (h === "name") return t.name || "";
    if (h === "icon") return t.icon || "";
    if (h === "desc") return t.desc || "";
    return t.features && t.features[h] !== undefined ? t.features[h] : "";
  });

  var idIdx = headers.indexOf("id");
  for (var i = 1; i < existing.length; i++) {
    if (String(existing[i][idIdx]).trim() === t.id) {
      sheet.getRange(i + 1, 1, 1, row.length).setValues([row]);
      return jsonResponse({ ok: true, id: t.id });
    }
  }

  sheet.appendRow(row);
  return jsonResponse({ ok: true, id: t.id });
}

// Google Sheets integration — Database card in Advanced tab
// Sheets sync — pull/push ELO, validate, copy script
// Pull: fetches ELO entries (preserves test flag)
function SheetsSync({ state, dispatch, config }) {
  const [status, setStatus] = useState("");
  const url = state.sheetsUrl;
  const col = config?.features?.eloDB || "ELO";
  const pull = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Pulling…");
    try {
      const r = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      if (d?.entries) {
        const db = {};
        d.entries.forEach((e) => {
          if (e?.name)
            db[e.name.toLowerCase()] = { elo: parseInt(e.elo) || ED, name: e.name, test: !!e.test };
        });
        dispatch({ type: "SET_ELO_DB", db, col });
        setStatus(`✓ Pulled ${Object.keys(db).length} (${col})`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const push = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Pushing…");
    try {
      const ent = Object.values(state.eloDb?.[col] || {})
        .filter((v) => v?.name)
        .map((v) => ({ name: v.name, elo: v.elo, test: !!v.test }));
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "save", col, test: false, entries: ent }),
      });
      setStatus(`Verifying…`);
      await new Promise((r) => setTimeout(r, 1500));
      const vr = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      const vd = await vr.json();
      const remote = vd?.entries?.length || 0;
      if (remote >= ent.length) {
        setStatus(`✓ Pushed & verified (${remote} entries, ${col})`);
      } else {
        setStatus(`⚠ Pushed ${ent.length} but ${col} has ${remote} — check manually`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const validate = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Validating…");
    const results = [];
    try {
      const r = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      const d = await r.json();
      results.push(d?.entries ? `✓ ELO (${col})` : `✗ ELO (${col}) — missing or wrong format`);
    } catch {
      results.push("✗ ELO — unreachable");
    }
    try {
      const r = await fetch(url + "?action=seed_list");
      const d = await r.json();
      results.push(d?.seeds ? "✓ Seeds" : "✗ Seeds — missing or wrong format");
    } catch {
      results.push("✗ Seeds — unreachable");
    }
    try {
      const r = await fetch(url + "?action=rules&tournament=_validate_");
      const d = await r.json();
      results.push(d?.rows ? "✓ Rules" : "✗ Rules — missing or wrong format");
    } catch {
      results.push("✗ Rules — unreachable");
    }
    const ok = results.every((r) => r.startsWith("✓"));
    setStatus(ok ? `✓ All tabs valid — ${results.join(" · ")}` : results.join("\n"));
  };
  const copyScript = () => {
    const s = APPS_SCRIPT;
    navigator.clipboard
      .writeText(s)
      .then(() => setStatus("✓ Script copied to clipboard"))
      .catch(() => {
        const ta = document.createElement("textarea");
        ta.value = s;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        setStatus("✓ Script copied");
      });
  };
  return (
    <Card>
      <h3 style={S.cardTitle}>Database</h3>
      <label
        style={{ fontSize: 13, color: C.text, fontWeight: 500, marginBottom: 6, display: "block" }}
      >
        Google Sheet URL
      </label>
      <input
        type="text"
        value={url || ""}
        placeholder="Apps Script URL"
        onChange={(e) => dispatch({ type: "SET_SHEETS_URL", url: e.target.value.trim() })}
        style={{ ...S.input, fontSize: 12, padding: "5px 8px", marginBottom: 6 }}
      />
      <div style={{ display: "flex", gap: 6, marginBottom: 4 }}>
        <Btn onClick={pull} style={{ flex: 1, fontSize: 12 }}>
          ⬇ Pull
        </Btn>
        <Btn onClick={push} style={{ flex: 1, fontSize: 12 }}>
          ⬆ Push
        </Btn>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <Btn
          onClick={validate}
          style={{ flex: 1, fontSize: 12, borderColor: C.blue, color: C.blue }}
        >
          🔍 Validate Sheet
        </Btn>
        <Btn
          onClick={copyScript}
          style={{ flex: 1, fontSize: 12, borderColor: C.purple, color: C.purple }}
        >
          📋 Copy Script
        </Btn>
      </div>
      <div
        style={{
          fontSize: 11,
          color: C.muted,
          minHeight: 14,
          marginTop: 6,
          whiteSpace: "pre-wrap",
        }}
      >
        {status}
      </div>
    </Card>
  );
}

// Save/load tournament snapshots via Google Sheets
// Seeds — save/load/delete tournament snapshots
// v3 format: single JSON blob per seed (no chunking)
function SeedsManager({ state, dispatch }) {
  const [status, setStatus] = useState(""),
    [seedId, setSeedId] = useState(""),
    [seeds, setSeeds] = useState([]);
  const url = state.sheetsUrl;
  const save = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    if (!state.players.length) {
      setStatus("⚠ No players");
      return;
    }
    const id = makeId();
    const snap = buildSnap(state);
    const data = JSON.stringify(snap);
    const t = state.tournaments?.[state.tournamentId];
    const label = `${t?.icon || ""} ${t?.name || ""} · ${state.players.length}p · R${state.currentRound}`;
    setStatus("Saving…");
    try {
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "seed_save", id, label, data }),
      });
      setStatus("Verifying…");
      await new Promise((r) => setTimeout(r, 1500));
      const vr = await fetch(url + "?action=seed_load&id=" + encodeURIComponent(id));
      const vd = await vr.json();
      if (vd?.ok) {
        setStatus(`✓ Saved · ${id}`);
        list();
      } else {
        setStatus(`⚠ Sent but verify failed · ${id}`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const loadById = async (id) => {
    const target = (id || seedId.trim()).toUpperCase();
    if (!url || !target) {
      setStatus("⚠ Enter ID");
      return;
    }
    setStatus("Loading…");
    try {
      const r = await fetch(url + "?action=seed_load&id=" + encodeURIComponent(target));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      if (!d?.ok) throw new Error(d?.error || "Not found");
      let snap;
      if (d.data) {
        snap = JSON.parse(d.data);
      } else if (d.chunks) {
        snap = JSON.parse(d.chunks.join(""));
      } else throw new Error("No data");
      dispatch({ type: "RESTORE_SNAPSHOT", snapshot: snap });
      setStatus(`✓ Restored ${target}`);
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const del = async (id) => {
    if (!url) return;
    setStatus("Deleting…");
    try {
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "seed_delete", id }),
      });
      await new Promise((r) => setTimeout(r, 1000));
      list();
      setStatus(`✓ Deleted ${id}`);
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const list = async () => {
    if (!url) return;
    try {
      const r = await fetch(url + "?action=seed_list");
      const d = await r.json();
      setSeeds(
        (d?.seeds || []).sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || "")),
      );
    } catch {}
  };
  useEffect(() => {
    list();
  }, []);
  return (
    <Card>
      <h3 style={S.cardTitle}>Seeds</h3>
      <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
        <Btn onClick={save} style={{ fontSize: 12 }}>
          💾 Save snapshot
        </Btn>
        <input
          type="text"
          value={seedId}
          placeholder="Seed ID…"
          onChange={(e) => setSeedId(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && loadById()}
          style={{ ...S.input, fontSize: 12, padding: "5px 8px", flex: 1, minWidth: 80 }}
        />
        <Btn onClick={() => loadById()} style={{ fontSize: 12 }}>
          📂 Load
        </Btn>
      </div>
      <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>{status}</div>
      {seeds.length > 0 && (
        <div style={{ fontSize: 12 }}>
          {seeds.map((s) => (
            <div
              key={s.id}
              style={{
                display: "flex",
                gap: 6,
                padding: "6px 0",
                borderBottom: `0.5px solid ${C.bL}`,
                alignItems: "center",
                flexWrap: "wrap",
              }}
            >
              <code
                style={{
                  fontSize: 11,
                  background: C.subtle,
                  padding: "1px 5px",
                  borderRadius: 3,
                  flexShrink: 0,
                }}
              >
                {s.id}
              </code>
              <span style={{ flex: 1, fontSize: 12, minWidth: 80 }}>{s.label}</span>
              <span style={{ fontSize: 10, color: C.faint, flexShrink: 0 }}>
                {s.timestamp ? new Date(s.timestamp).toLocaleDateString() : ""}
              </span>
              <Btn
                onClick={() => {
                  if (confirm(`Load seed ${s.id}?`)) loadById(s.id);
                }}
                style={{
                  fontSize: 10,
                  padding: "2px 8px",
                  color: C.blue,
                  borderColor: C.bBd,
                  flexShrink: 0,
                }}
              >
                Load
              </Btn>
              <Btn
                onClick={() => {
                  if (confirm(`Delete seed ${s.id}?`)) del(s.id);
                }}
                style={{ fontSize: 10, padding: "2px 6px", color: C.red, flexShrink: 0 }}
              >
                ✕
              </Btn>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

// Rules tab — fetches from Sheets by tournament name, caches in localStorage
function RulesTab({ state }) {
  const [rows, setRows] = useState(null),
    [status, setStatus] = useState("");
  const tn = state.tournaments?.[state.tournamentId]?.name || "";
  const load = async (f) => {
    const ck = "rules_" + tn;
    if (!f)
      try {
        const cached = localStorage.getItem(ck);
        if (cached) {
          setRows(JSON.parse(cached));
          setStatus("Cached");
        }
      } catch {}
    const url = state.sheetsUrl;
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    try {
      const r = await fetch(url + "?action=rules&tournament=" + encodeURIComponent(tn));
      const d = await r.json();
      if (d?.rows) {
        setRows(d.rows);
        try {
          localStorage.setItem(ck, JSON.stringify(d.rows));
        } catch {}
        setStatus("✓");
      } else setStatus("✗ " + (d?.error || "Error"));
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  useEffect(() => {
    load(false);
  }, []);
  return (
    <Card>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          marginBottom: 12,
          flexWrap: "wrap",
          gap: 8,
        }}
      >
        <h3 style={{ ...S.cardTitle, marginBottom: 0 }}>Rules — {tn}</h3>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontSize: 11, color: C.muted }}>{status}</span>
          <Btn onClick={() => load(true)} style={{ fontSize: 11, padding: "3px 8px" }}>
            ↻
          </Btn>
        </div>
      </div>
      {!rows ? (
        <div
          style={{
            padding: 16,
            background: C.subtle,
            borderRadius: 8,
            color: C.muted,
            fontStyle: "italic",
            fontSize: 13,
          }}
        >
          Rules load from "Rules" tab.
        </div>
      ) : rows.length === 0 ? (
        <div style={{ padding: 16, color: C.muted, fontSize: 13 }}>No rules for "{tn}".</div>
      ) : (
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} style={{ background: i % 2 === 1 ? "#fafafa" : "" }}>
                {r.map((c, j) => (
                  <td
                    key={j}
                    style={{
                      padding: "6px 10px 6px 0",
                      borderBottom: `0.5px solid ${C.bL}`,
                      whiteSpace: "pre-wrap",
                    }}
                  >
                    {c}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </Card>
  );
}

                  >

// Standings — rankings, ELO deltas, inline prize tags
function StandingsTab({ state, dispatch, config }) {
  const cfg = config.features,
    activePlayers = state.players.filter((p) => !p.eliminated),
    gp = cfg.grandPrix,
    activeElo = state.eloDb[cfg.eloDB || "ELO"] || {};
  const sorted = [...state.players].sort(
      (a, b) => b.score - a.score || b.w - a.w || getElo(activeElo, a.name) - getElo(activeElo, b.name),
    ),
    winner = activePlayers.length === 1 ? activePlayers[0] : null;
  const prizeCalc = cfg.prizes
    ? calcAlloc(
        state.players,
        state.prizes,
        state.ranks,
        state.entryCost,
        state.prizePct,
        state.prizePctRoundUp,
        state.roundUpPct,
        state.roundUpPctRoundUp,
      )
    : null;
  return (
    <div>
      {winner && (
        <div
          style={{
            background: C.gBg,
            color: C.green,
            borderRadius: 10,
            padding: "12px 20px",
            fontSize: 16,
            fontWeight: 500,
            textAlign: "center",
            marginBottom: 16,
          }}
        >
          🏆 Winner: {winner.name}
        </div>
      )}
      <div
        style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}
      >
        <div style={S.metric}>
          <div style={S.metricLabel}>Round</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>
            {state.currentRound > 0 ? state.currentRound - 1 : "—"}
          </div>
        </div>
        <div style={S.metric}>
          <div style={S.metricLabel}>Players</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>{state.players.length || "—"}</div>
        </div>
        <div style={S.metric}>
          <div style={S.metricLabel}>Active</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>{activePlayers.length || "—"}</div>
        </div>
      </div>
      <Card>
          <h3 style={S.cardTitle}>Standings</h3>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead>
              <tr>
                {[
                  "#",
                  "Player",
                  "ELO",
                  cfg.scoring === "lifepoints" ? "LP" : "Pts",
                  cfg.scoring === "points" ? "1/2/3/L" : "W/D/L",
                  "Status",
                ].map((h, hi) => (
                  <th
                    key={hi}
                    style={{
                      ...S.tableHeader,
                      padding: "6px 8px",
                      borderBottom: `0.5px solid ${C.border}`,
                    }}
                  >
                    {h}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map((p, i) => {
                const pr = prizeCalc?.allocs?.[i] || null;
                const elo = getElo(activeElo, p.name);
                const eloDelta = cfg.elo && p.eloStart != null ? elo - p.eloStart : null;
                return (
                  <tr key={p.name}>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        fontWeight: 500,
                      }}
                    >
                      {i + 1}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {p.name}
                    </td>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        fontWeight: 500,
                      }}
                    >
                      {elo}
                      {eloDelta != null && eloDelta !== 0 && (
                        <span style={{ fontSize: 11, fontWeight: 500, color: eloDelta > 0 ? C.green : C.red, marginLeft: 4 }}>
                          {eloDelta > 0 ? "+" : ""}{eloDelta}

                      )}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {cfg.scoring === "lifepoints" ? (

                        </span>
                      )}
                    </td>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        color: C.muted,
                      }}
                    >
                      {cfg.scoring === "points"
                        ? `${p.p1||0}/${p.p2||0}/${p.p3||0}/${p.pLast||0}`
                        : `${p.w}/${p.d}/${p.l}`}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {p.eliminated ? (
                        <Tag variant="amber">Out</Tag>

                        <div style={{ lineHeight: 1.7 }}>
                          {pr.chosen.map((x, xi) => (
                            <span

                              style={{
                                fontSize: 10,
                                borderRadius: 4,
                                padding: "2px 5px",

                                color: C.green,
                                fontWeight: 500,
                                marginRight: 3,
                                marginBottom: 1,
