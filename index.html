// Sub-tabs: Draft (groups) | Pairings (cards) | Log (history)
// Matches tab — pairing cards, match log, timer, draft sub-tabs
// PC: 1v1 pairing card — 3-button layout (p1win / draw / p2win)
function PC({ match, index, dispatch }) {
  if (match.p2 === "BYE")
    return (
      <Card style={{ background: C.bg, borderStyle: "dashed", padding: "10px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>{match.p1}</div>
          <Tag variant="grey">BYE</Tag>
        </div>
      </Card>
    );
  const r = match.result,
    bs = (sel, t) => ({
      flex: 1,
      display: "flex",
      flexDirection: "column",
      padding: "6px 8px",
      borderRadius: 5,
      cursor: "pointer",
      fontFamily: "inherit",
      fontSize: 12,
      fontWeight: 500,
      lineHeight: 1.3,
      border: `0.5px solid ${sel ? (t === "d" ? C.aBd : C.gBd) : "#ddd"}`,
      background: sel ? (t === "d" ? C.aBg : C.gBg) : "transparent",
      color: sel ? (t === "d" ? C.amber : C.green) : C.muted,
      textAlign: t === "r" ? "right" : t === "d" ? "center" : "left",
      alignItems: t === "r" ? "flex-end" : t === "d" ? "center" : "flex-start",
    });
  return (
    <Card style={{ padding: "10px 14px" }}>
      <div
        style={{
          display: "grid",
          gridTemplateColumns: "2fr 1fr 2fr",
          gap: 4,
          alignItems: "stretch",
        }}
      >
        <button
          style={bs(r === "p1win", "l")}
          onClick={() => dispatch({ type: "SET_RESULT", index, result: "p1win" })}
        >
          <span>
            {match.p1}
            {match.rematch && (
              <>
                {" "}
                <Tag variant="amber">re</Tag>
              </>
            )}
          </span>
        </button>
        <button
          style={bs(r === "draw", "d")}
          onClick={() => dispatch({ type: "SET_RESULT", index, result: "draw" })}
        >
          draw
        </button>
        <button
          style={bs(r === "p2win", "r")}
          onClick={() => dispatch({ type: "SET_RESULT", index, result: "p2win" })}
        >
          <span>{match.p2}</span>
        </button>
      </div>
    </Card>
  );
}
function MC({ match, index, dispatch, eloDb }) {
  return (
    <Card style={{ padding: "10px 14px" }}>
      <div style={{ fontSize: 11, fontWeight: 500, color: C.purple, marginBottom: 8 }}>
        Match {index + 1} · {match.players.length}p
      </div>
      {match.players.map((n) => (
        <div
          key={n}
          style={{
            display: "flex",
            alignItems: "center",
            gap: 8,
            padding: "5px 0",
            borderBottom: `0.5px solid ${C.bL}`,
          }}
        >
          <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{n}</span>
          <span style={{ fontSize: 11, color: C.faint }}>{gE(eloDb, n)}</span>
          <input
            type="text"
            inputMode="numeric"
            placeholder="—"
            value={match.scores[n] ?? ""}
            onChange={(e) =>
              dispatch({
                type: "SET_MULTI_SCORE",
                matchIndex: index,
                playerName: n,
                value: e.target.value,
              })
            }
            style={{ ...S.input, width: 56, textAlign: "center", fontSize: 13, padding: "4px 6px" }}
          />
        </div>
      ))}
    </Card>
  );
}
function ML({ state }) {
  let ri = 0;
  if (!state.matchLog.length)
    return <div style={{ textAlign: "center", padding: 32, color: C.faint }}>No activity.</div>;
  return (
    <div>
      {state.matchLog.map((ev, ei) => {
        if (ev.type === "round") {
          const rd = state.history[ri++];
          if (!rd) return null;
          const isMultiRound = rd.some((m) => m.type === "multi");
          if (isMultiRound) {
            return (
              <div key={ei} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, padding: "0 4px" }}>
                  <h3 style={{ fontSize: 15, fontWeight: 500 }}>{ev.label}</h3>
                  <span style={{ fontSize: 11, color: C.faint }}>{ev.ts}</span>
                </div>
                {rd.map((m, mi) => (
                  <Card key={mi} style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: C.purple, marginBottom: 6 }}>
                      Table {mi + 1} · {m.players.length}p
                    </div>
                    {m.players.map((n) => (
                      <div
                        key={n}
                        style={{
                          fontSize: 13,
                          padding: "4px 0",
                          display: "flex",
                          justifyContent: "space-between",
                          borderBottom: `0.5px solid ${C.bL}`,
                        }}
                      >
                        <span style={{ fontWeight: 500 }}>{n}</span>
                        <span style={{ color: C.muted }}>
                          {m.scores[n]}pt{" "}
                          {m.eloDeltas?.[n] != null && (
                            <span
                              style={{
                                color:
                                  m.eloDeltas[n] > 0 ? C.green : m.eloDeltas[n] < 0 ? C.red : C.muted,
                                fontWeight: 500,
                                fontSize: 11,
                              }}
                            >
                              {m.eloDeltas[n] > 0 ? "+" : ""}
                              {m.eloDeltas[n]}
                            </span>
                          )}
                        </span>
                      </div>
                    ))}
                  </Card>
                ))}
              </div>
            );
          }
          return (
            <Card key={ei} style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <h3 style={{ fontSize: 15, fontWeight: 500 }}>{ev.label}</h3>
                <span style={{ fontSize: 11, color: C.faint }}>{ev.ts}</span>
              </div>
              {rd.map((m, mi) => {
                if (m.p2 === "BYE")
                  return (
                    <div
                      key={mi}
                      style={{
                        fontSize: 13,
                        padding: "4px 0",
                        borderBottom: `0.5px solid ${C.bL}`,
                      }}
                    >
                      {m.p1} — <Tag variant="grey">BYE</Tag>
                    </div>
                  );
                const w = m.result === "p1win" ? m.p1 : m.result === "p2win" ? m.p2 : null,
                  l = m.result === "p1win" ? m.p2 : m.result === "p2win" ? m.p1 : null,
                  d =
                    m.result === "p1win" ? m.eloDelta1 : m.result === "p2win" ? m.eloDelta2 : null;
                return (
                  <div
                    key={mi}
                    style={{
                      fontSize: 13,
                      padding: "4px 0",
                      display: "flex",
                      gap: 12,
                      borderBottom: `0.5px solid ${C.bL}`,
                      alignItems: "center",
                    }}
                  >
                    <span
                      style={{ fontWeight: 500, color: m.result === "draw" ? C.text : C.green }}
                    >
                      {w || m.p1}
                    </span>
                    <span style={{ color: "#555" }}>{l || m.p2}</span>
                    {d != null && (
                      <span
                        style={{
                          fontSize: 11,
                          fontWeight: 500,
                          color: d > 0 ? C.green : d < 0 ? C.red : C.muted,
                        }}
                      >
                        {d > 0 ? "+" : ""}
                        {d}
                      </span>
                    )}
                    {m.result === "draw" && (
                      <span style={{ color: C.amber, fontWeight: 500, fontSize: 11 }}>Draw</span>
                    )}
                    {m.rematch && <Tag variant="amber">re</Tag>}
                    {m.forfeit && <Tag variant="amber">forfeit</Tag>}
                  </div>
                );
              })}
            </Card>
          );
        }
        const ic = { start: "🏁", abandon: "⚑", "draft-end": "📋", "tournament-timeout": "⏰" },
          bg = { start: C.gBg, abandon: C.aBg, "draft-end": C.bBg, "tournament-timeout": C.rBg },
          co = {
            start: C.green,
            abandon: C.amber,
            "draft-end": C.blue,
            "tournament-timeout": C.red,
          };
        return (
          <div
            key={ei}
            style={{
              background: bg[ev.type] || C.subtle,
              borderRadius: 8,
              padding: "8px 12px",
              marginBottom: 12,
              display: "flex",
              justifyContent: "space-between",
            }}
          >
            <span style={{ fontSize: 13, fontWeight: 500, color: co[ev.type] || C.text }}>
              {ic[ev.type] || "•"} {ev.label}
            </span>
            <span style={{ fontSize: 11, color: C.faint }}>{ev.ts}</span>
          </div>
        );
      })}
    </div>
  );
}

function MatchesTab({ state, dispatch, config }) {
  const c = config.features,
    st = [
      c.draft && { id: "draft", label: "Draft" },
      { id: "pairings", label: "Pairings" },
      { id: "log", label: "Log" },
    ].filter(Boolean);
  const isRR = state.phase === "roundrobin" && c.rrRounds > 0,
    rl = isRR
      ? `Round Robin — R${state.currentRound}/${c.rrRounds}`
      : `Swiss — R${state.currentRound - (isRR ? 0 : c.rrRounds)}`;
  return (
    <div>
      <TabBar
        tabs={st}
        active={state.matchSubTab}
        onSelect={(id) => dispatch({ type: "SET_MATCH_SUBTAB", tab: id })}
      />
      {state.matchSubTab === "draft" && (
        <DraftGroups players={state.players} eloDb={state.eloDb} dispatch={dispatch} />
      )}
      {state.matchSubTab === "pairings" && (
        <div>
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              marginBottom: 16,
              flexWrap: "wrap",
              gap: 8,
            }}
          >
            <div>
              <div style={{ fontSize: 16, fontWeight: 500 }}>{rl}</div>
              <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>
                {isRR ? "By ELO" : "By win rate"}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              <Btn
                onClick={() => {
                  const u = state.pairings.filter(
                    (m) => m.type !== "multi" && m.p2 !== "BYE" && !m.result,
                  );
                  const uMulti = state.pairings.filter(
                    (m) =>
                      m.type === "multi" &&
                      m.players.every((n) => !String(m.scores[n]).trim()),
                  );
                  if (
                    (u.length || uMulti.length) &&
                    !confirm(`${u.length + uMulti.length} unresolved.`)
                  )
                    return;
                  dispatch({ type: "NEXT_ROUND" });
                }}
              >
                Next round ↗
              </Btn>
              {c.grandPrix && state.tournamentStarted && (
                <Btn
                  onClick={() => {
                    if (confirm("New session?")) dispatch({ type: "NEW_GP_SESSION" });
                  }}
                  style={{ borderColor: "#e63946", color: "#e63946" }}
                >
                  New session ＋
                </Btn>
              )}
              {c.scoring !== "lifepoints" && state.tournamentStarted && (
                <Btn
                  onClick={() => {
                    if (confirm("End?")) dispatch({ type: "END_TOURNAMENT" });
                  }}
                  style={{ borderColor: C.red, color: C.red }}
                >
                  End
                </Btn>
              )}
            </div>
          </div>
          {c.timerMinutes > 0 && <Timer minutes={c.timerMinutes} key={state.currentRound} />}
          {c.firstPlayer && state.pairings.some((m) => m.p2 !== "BYE" && m.type !== "multi") && (
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "2fr 1fr 2fr",
                gap: 4,
                marginBottom: 6,
                padding: "0 14px",
              }}
            >
              <div style={{ fontSize: 11, fontWeight: 500, color: C.green, textAlign: "center" }}>
                ⚡ First
              </div>
              <div />
              <div />
            </div>
          )}
          {!state.pairings.length && (
            <div style={{ textAlign: "center", padding: 32, color: C.faint }}>No pairings.</div>
          )}
          {state.pairings.map((m, i) =>
            m.type === "multi" ? (
              <MC key={i} match={m} index={i} dispatch={dispatch} eloDb={state.eloDb} />
            ) : (
              <PC key={i} match={m} index={i} dispatch={dispatch} />
            ),
          )}
        </div>
      )}
      {state.matchSubTab === "log" && <ML state={state} />}
    </div>
  );
}

// Rankings table with inline prize allocations in Status column
// Standings — rankings with inline prizes, ELO deltas
// Prizes show as green tags (e.g. '1x Pauper', '2x Booster')
function StandingsTab({ state, dispatch, config }) {
  const c = config.features,
    ac = state.players.filter((p) => !p.eliminated),
    gp = c.grandPrix,
    gs = (p) => (gp ? gpScore(p.name, state.history, c.gpBestOfLast, c.gpDropWorst) : p.score);
  const so = [...state.players].sort(
      (a, b) => gs(b) - gs(a) || b.w - a.w || gE(state.eloDb, a.name) - gE(state.eloDb, b.name),
    ),
    w = ac.length === 1 ? ac[0] : null;
  const al = c.prizes
    ? calcAlloc(
        state.players,
        state.prizes,
        state.ranks,
        state.entryCost,
        state.prizePct,
        state.prizePctRoundUp,
        state.roundUpPct,
        state.roundUpPctRoundUp,
      )
    : null;
  const prizeFor = (i) => {
    if (!al?.allocs?.[i]) return null;
    return al.allocs[i];
  };
  return (
    <div>
      {w && (
        <div
          style={{
            background: C.gBg,
            color: C.green,
            borderRadius: 10,
            padding: "12px 20px",
            fontSize: 16,
            fontWeight: 500,
            textAlign: "center",
            marginBottom: 16,
          }}
        >
          🏆 Winner: {w.name}
        </div>
      )}
      <div
        style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}
      >
        <div style={S.metric}>
          <div style={{ fontSize: 12, color: C.muted }}>Round</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>
            {state.currentRound > 0 ? state.currentRound - 1 : "—"}
          </div>
        </div>
        <div style={S.metric}>
          <div style={{ fontSize: 12, color: C.muted }}>Players</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>{state.players.length || "—"}</div>
        </div>
        <div style={S.metric}>
          <div style={{ fontSize: 12, color: C.muted }}>Active</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>{ac.length || "—"}</div>
        </div>
      </div>
      <Card>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead>
              <tr>
                {[
                  "#",
                  "Player",
                  "ELO",
                  c.scoring === "lifepoints" ? "LP" : "Pts",
                  "W/D/L",
                  "Status",
                ].map((h, hi) => (
                  <th
                    key={hi}
                    style={{
                      fontWeight: 500,
                      fontSize: 12,
                      color: C.muted,
                      textAlign: "left",
                      padding: "6px 8px",
                      borderBottom: `0.5px solid ${C.border}`,
                    }}
                  >
                    {h}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {so.map((p, i) => {
                const ds = gs(p);
                const pr = prizeFor(i);
                const elo = gE(state.eloDb, p.name);
                const eloDelta = c.elo && p.eloStart != null ? elo - p.eloStart : null;
                return (
                  <tr key={p.name}>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        fontWeight: 500,
                      }}
                    >
                      {i + 1}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {p.name}
                    </td>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        fontWeight: 500,
                      }}
                    >
                      {elo}
                      {eloDelta != null && eloDelta !== 0 && (
                        <span style={{ fontSize: 11, fontWeight: 500, color: eloDelta > 0 ? C.green : C.red, marginLeft: 4 }}>
                          {eloDelta > 0 ? "+" : ""}{eloDelta}
                        </span>
                      )}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {c.scoring === "lifepoints" ? (
                        <>
                          <Hearts score={p.score} max={c.startScore} />{" "}
                          <span style={{ fontSize: 11, color: C.faint }}>({p.score})</span>
                        </>
                      ) : (
                        <span style={{ fontWeight: 600 }}>
                          {ds}pt
                          {gp ? <span style={{ fontSize: 10, color: C.faint }}> GP</span> : ""}
                        </span>
                      )}
                    </td>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        color: C.muted,
                      }}
                    >
                      {p.w}/{p.d}/{p.l}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {p.eliminated ? (
                        <Tag variant="amber">Out</Tag>
                      ) : pr && pr.chosen.length ? (
                        <div style={{ lineHeight: 1.7 }}>
                          {pr.chosen.map((x, xi) => (
                            <span
                              key={xi}
                              style={{
                                fontSize: 10,
                                borderRadius: 4,
                                padding: "2px 5px",
                                display: "inline-block",
                                background: C.gBg,
                                color: C.green,
                                fontWeight: 500,
                                marginRight: 3,
                                marginBottom: 1,
                              }}
                            >
                              {x.qty > 1 ? x.qty + "× " : ""}
                              {x.name}
                            </span>
                          ))}
                        </div>
                      ) : i === 0 ? (
                        <Tag variant="green">Leader</Tag>
                      ) : null}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {al && (
            <div style={{ fontSize: 11, color: C.muted, marginTop: 8, textAlign: "right" }}>
              Prize pool: €{al.totalPool.toFixed(2)} · Allocated: €{al.grandTotal.toFixed(2)}
            </div>
          )}
      </Card>
    </div>
  );
}

// Tournament info (read-only metrics) + feature flags (read-only dots)
// Settings — tournament info, feature flags, mode checkboxes, seeds
// Three opt-in checkboxes that enable extra tabs:
function SettingsTab({ state, dispatch, config }) {
  const f = config.features;
  const Ft = ({ label, on }) => (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 8,
        padding: "6px 0",
        borderBottom: `0.5px solid ${C.bL}`,
      }}
    >
      <span
        style={{ width: 8, height: 8, borderRadius: "50%", background: on ? C.accent : "#ddd" }}
      />
      <span style={{ flex: 1, fontSize: 13 }}>{label}</span>
      <span style={{ fontSize: 11, color: on ? C.green : C.faint }}>{on ? "ON" : "OFF"}</span>
    </div>
  );
  const Chk = ({ label, checked, onChange, desc }) => (
    <div
      style={{
        display: "flex",
        alignItems: "flex-start",
        gap: 10,
        padding: "10px 0",
        borderBottom: `0.5px solid ${C.bL}`,
        cursor: "pointer",
      }}
      onClick={() => onChange(!checked)}
    >
      <input
        type="checkbox"
        checked={checked}
        onChange={(e) => onChange(e.target.checked)}
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 16,
          height: 16,
          accentColor: C.accent,
          cursor: "pointer",
          margin: "1px 0 0 0",
          flexShrink: 0,
        }}
      />

// Top-level tournament layout. Handles:
// Shell — layout, tabs, banners, timeout, auto-push, backup
//   - Tab bar (conditional tabs gated by test/experimental/advanced checkboxes)
function Shell({ state, dispatch, eloLoadedCols, eloColOptions }) {
  const rawConfig = state.tournaments?.[state.tournamentId];
  if (!rawConfig) return null;
  const config = { ...rawConfig, features: { ...rawConfig.features, ...state.featureOverrides } };
  const c = config.features,
    ac = state.players.filter((p) => !p.eliminated),
    go = state.tournamentStarted && c.scoring === "lifepoints" && ac.length <= 1;
  const [el, setEl] = useState("");
  const [timedOut, setTimedOut] = useState(false);
  const [syncStatus, setSyncStatus] = useState("");
  useEffect(() => {
    if (!state.startedAt || !state.tournamentStarted) return;
    const u = () => {
      const ms = Date.now() - state.startedAt,
        m = Math.floor(ms / 60000);
      setEl(`${Math.floor(m / 60)}h ${m % 60}m`);
    };
    u();
    const i = setInterval(u, 10000);
    return () => clearInterval(i);
  }, [state.startedAt, state.tournamentStarted]);
  const timeoutFired = useRef(false);
  useEffect(() => {
    if (!state.tournamentStarted || !c.timeout || !c.timeoutTime || timedOut) return;
    const check = () => {
      if (timeoutFired.current) return;
      const [h, m] = (c.timeoutTime || "").split(":").map(Number);
      if (isNaN(h) || isNaN(m)) return;
      const n = new Date(),
        target = new Date(n);
      target.setHours(h, m, 0, 0);
      if (state.startedAt) {
        const started = new Date(state.startedAt);
        if (started >= target) return;
      }
      if (n >= target) {
        setTimedOut(true);
        timeoutFired.current = true;
        dispatch({
          type: "LOG_EVENT",
          eventType: "tournament-timeout",
          label: `Timeout reached — ${c.timeoutTime}`,
        });
      }
    };
    check();
    const i = setInterval(check, 30000);
    return () => clearInterval(i);
  }, [state.tournamentStarted, c.timeout, c.timeoutTime, timedOut, dispatch, state.startedAt]);
  useEffect(() => {
    if (!state.players.length) return;
    sLS(BK, {
      state: {
        players: state.players,
        currentRound: state.currentRound,
        phase: state.phase,
        pairings: state.pairings,
        history: state.history,
        matchLog: state.matchLog,
        startedAt: state.startedAt,
      },
      tournamentStarted: state.tournamentStarted,
      tournamentMode: state.tournamentId,
      prizes: state.prizes,
      ranks: state.ranks,
      entryCost: state.entryCost,
      prizePct: state.prizePct,
      prizePctRoundUp: state.prizePctRoundUp,
      roundUpPct: state.roundUpPct,
      roundUpPctRoundUp: state.roundUpPctRoundUp,
      featureOverrides: state.featureOverrides,
      savedAt: Date.now(),
    });
  }, [state.players, state.pairings, state.currentRound, state.tournamentStarted, state.history]);
  const lastPushedRound = useRef(0);
  useEffect(() => {
    if (
      !state.tournamentStarted ||
      state.history.length === 0 ||
      state.history.length <= lastPushedRound.current
    )
      return;
    lastPushedRound.current = state.history.length;
    const url = state.sheetsUrl;
    if (!url) return;
    setSyncStatus("syncing");
    const ent = Object.values(state.eloDb)
      .filter((v) => v?.name)
      .map((v) => ({ name: v.name, elo: v.elo, test: !!v.test }));
    fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "save", test: false, entries: ent }),
    })
      .then(() => {
        setSyncStatus("synced");
        setTimeout(() => setSyncStatus(""), 5000);
      })
      .catch(() => {
        setSyncStatus("error");
        setTimeout(() => setSyncStatus(""), 8000);
      });
  }, [state.history.length]);
  useEffect(() => {
    const h = (e) => {
      if (!state.tournamentStarted) return;
      e.preventDefault();
      e.returnValue = "";
    };
    window.addEventListener("beforeunload", h);
    return () => window.removeEventListener("beforeunload", h);
  }, [state.tournamentStarted]);
  const tabs = [
    c.rules && { id: "rules", label: "Rules" },
    { id: "players", label: "Players" },
    { id: "matches", label: "Matches", disabled: !state.tournamentStarted },
    { id: "standings", label: "Standings", disabled: !state.tournamentStarted },
    { id: "settings", label: "Settings" },
    state.testMode && { id: "test", label: "🧪 Test", color: C.red },
    state.experimental && { id: "spinner", label: "🎲 Spinner", color: C.purple },
    state.advancedSetup && { id: "advanced", label: "⚙ Advanced" },
  ].filter(Boolean);
  let banner = null;
  if (!state.tournamentStarted)
    banner = (
      <div
        style={{
          background: C.aBg,
          color: C.amber,
          border: `0.5px solid ${C.aBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
        }}
      >
        ⚠ Not started. Add players and press Start.
      </div>
    );
  else if (go)
    banner = (
      <div
        style={{
          background: C.bBg,
          color: C.blue,
          border: `0.5px solid ${C.bBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
        }}
      >
        🏆 Over{ac[0] ? ` — ${ac[0].name} wins!` : "."}
      </div>
    );
  else
    banner = (
      <div
        style={{
          background: C.gBg,
          color: C.green,
          border: `0.5px solid ${C.gBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
          display: "flex",
          justifyContent: "space-between",
          flexWrap: "wrap",
          gap: 8,
        }}
      >
        <span>
          🟢 R{state.currentRound} · {state.phase === "roundrobin" ? "RR" : "Swiss"} · {ac.length}p
          · {c.scoring}
        </span>
        <span style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {syncStatus === "syncing" && (
            <span style={{ fontSize: 11, opacity: 0.7 }}>⟳ syncing…</span>
          )}
          {syncStatus === "synced" && <span style={{ fontSize: 11, opacity: 0.7 }}>☁ synced</span>}
          {syncStatus === "error" && (
            <span style={{ fontSize: 11, color: C.red, opacity: 0.9 }}>⚠ sync failed</span>
          )}
          {el && <span style={{ fontSize: 12, opacity: 0.75 }}>⏱ {el}</span>}
        </span>
      </div>
    );
  const timeoutBanner = timedOut ? (
    <div
      style={{
        background: C.rBg,
        color: C.red,
        border: `0.5px solid ${C.red}`,
        borderRadius: 8,
        padding: "8px 14px",
        marginBottom: 16,
        fontSize: 13,
        fontWeight: 600,
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
      }}
    >
      <span>⏰ Tournament timeout — {c.timeoutTime} has passed</span>
      <span style={{ fontSize: 11, fontWeight: 400, opacity: 0.7 }}>Finish the current round</span>
    </div>
  ) : null;
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ fontSize: 18, fontWeight: 500, margin: 0 }}>
          {config.icon} {config.name}
        </h2>
      </div>
      {banner}
      {timeoutBanner}
      <TabBar
        tabs={tabs}
        active={state.activeTab}
        onSelect={(id) => dispatch({ type: "SET_TAB", tab: id })}
      />
      {state.activeTab === "rules" && c.rules && <RulesTab state={state} />}
      {state.activeTab === "players" && (
        <PlayersTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.activeTab === "matches" && (
        <MatchesTab state={state} dispatch={dispatch} config={config} />
      )}
      {state.activeTab === "standings" && (
        <StandingsTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.activeTab === "settings" && (
        <SettingsTab state={state} dispatch={dispatch} config={config} />
      )}
      {state.activeTab === "advanced" && state.advancedSetup && (
        <AdvancedTab state={state} dispatch={dispatch} config={config} eloColOptions={eloColOptions} />
      )}
      {state.activeTab === "test" && state.testMode && (
        <TestTab state={state} dispatch={dispatch} />
      )}
      {state.activeTab === "spinner" && state.experimental && (
        <SpinnerTab state={state} dispatch={dispatch} />
      )}
    </div>
  );
}

// Root component. On mount:
// App root — reducer, auto-sync ELO, auto-restore backup
//   1. Auto-syncs ELO database from Google Sheets (silent)
function App() {
  const [state, dispatch] = useReducer(reducer, init);
  const [loading, setLoading] = useState(true);
  const [fetchError, setFetchError] = useState(null);
  const [eloLoadedCols, setEloLoadedCols] = useState({});
  const [eloColOptions, setEloColOptions] = useState([]);
  const fetchTournaments = (url) => {
    const u = url || gSU();
    if (!u) { setLoading(false); return; }
    setLoading(true);
    setFetchError(null);
    fetch(u + "?action=tournament_list")
      .then((r) => r.json())
      .then((d) => {
        if (d?.tournaments?.length) {
          dispatch({ type: "SET_TOURNAMENTS", tournaments: d.tournaments });
          const configuredCols = [...new Set(d.tournaments.map((t) => t.features?.eloCol).filter(Boolean))];
          const loadEloCols = (cols) => cols.forEach((col) => {
            fetch(u + "?action=load&col=" + encodeURIComponent(col))
              .then((r) => r.json())
              .then((ed) => {
                if (ed?.entries) {
                  const db = {};
                  ed.entries.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = { elo: parseInt(e.elo) || ED, name: e.name, test: !!e.test }; });
                  dispatch({ type: "SET_ELO_DB", db, col });
                  setEloLoadedCols((prev) => ({ ...prev, [col]: true }));
                }
              })
              .catch(() => {});
          });
          fetch(u + "?action=elo_cols")
            .then((r) => r.json())
            .then((cd) => {
              if (cd?.cols?.length) {
                setEloColOptions(cd.cols);
                const toLoad = configuredCols.length > 0 ? configuredCols : cd.cols;
                loadEloCols(toLoad);
              }
            })
            .catch(() => {
              if (configuredCols.length > 0) loadEloCols(configuredCols);
            });
        } else if (d?.error) {
          setFetchError("Script error: " + d.error);
        } else {
          setFetchError("Settings sheet is empty — add tournament rows to the sheet.");
        }
      })
      .catch((err) => setFetchError("Fetch failed: " + (err?.message || "network error")))
      .finally(() => setLoading(false));
  };
  useEffect(() => { fetchTournaments(); }, []);
  const prevEloCol = useRef(null);
  useEffect(() => {
    const col = state.featureOverrides?.eloCol;
    if (!col || col === prevEloCol.current || state.eloDb?.[col]) return;
    prevEloCol.current = col;
    const u = gSU();
    if (!u) return;
    fetch(u + "?action=load&col=" + encodeURIComponent(col))
      .then((r) => r.json())
      .then((ed) => {
        if (ed?.entries) {
          const db = {};
          ed.entries.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = { elo: parseInt(e.elo) || ED, name: e.name, test: !!e.test }; });
          dispatch({ type: "SET_ELO_DB", db, col });
        }
      })
      .catch(() => {});
  }, [state.featureOverrides?.eloCol]);
  const restored = useRef(false);
  useEffect(() => {
    if (restored.current) return;
    restored.current = true;
    try {
      const raw = localStorage.getItem(BK);
      if (!raw) return;
      const snap = JSON.parse(raw);
      if (snap?.tournamentStarted && snap?.state?.players?.length) {
        if (
          confirm(
            `Restore tournament in progress?\n${snap.state.players.length} players, round ${snap.state.currentRound}`,
          )
        ) {
          dispatch({ type: "RESTORE_SNAPSHOT", snapshot: snap });
        } else {
          localStorage.removeItem(BK);
        }
      }
    } catch {}
  }, []);
  if (loading)
    return (
      <div
        style={{
          fontFamily: "system-ui, -apple-system, sans-serif",
          background: C.bg,
          color: C.text,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          minHeight: "100vh",
          gap: 12,
        }}
      >
        <div style={{ fontSize: 32 }}>🏆</div>
        <div style={{ fontSize: 14, color: C.muted }}>Loading…</div>
      </div>
    );
  return (
    <div
      style={{
        fontFamily: "system-ui, -apple-system, sans-serif",
        background: C.bg,
        color: C.text,
        padding: 16,
        maxWidth: 950,
        margin: "0 auto",
        minHeight: "100vh",
      }}
    >
      {state.screen === "landing" && <LandingScreen dispatch={dispatch} tournaments={state.tournaments} onRetry={fetchTournaments} fetchError={fetchError} />}
      {state.screen === "tournament" && <Shell state={state} dispatch={dispatch} eloLoadedCols={eloLoadedCols} eloColOptions={eloColOptions} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
