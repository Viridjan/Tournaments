\nfunction doGet(e) {\n  var action = e.parameter.action || \"load\";\n\n  if (action === \"load\") return loadElo(e.parameter.col);\n  if (action === \"seed_load\") return loadSeed(e.parameter.id);\n  if (action === \"seed_list\") return listSeeds();\n  if (action === \"rules\") return loadRules(e.parameter.tournament);\n  if (action === \"tournament_list\") return loadTournaments();\n  if (action === \"debug_settings\") return debugSettings();\n  if (action === \"debug_elo\") return debugElo();\n  if (action === \"elo_cols\") return eloColumns();\n  if (action === \"global_settings\") return loadGlobalSettings();\n\n  return jsonResponse({ error: \"Unknown action\" });\n}\n\nfunction doPost(e) {\n  try {\n    var data = JSON.parse(e.postData.contents);\n    var action = data.action || \"save\";\n\n    if (action === \"save\") return saveElo(data);\n    if (action === \"seed_save\") return saveSeed(data);\n    if (action === \"seed_delete\") return deleteSeed(data);\n    if (action === \"tournament_save\") return saveTournament(data);\n    if (action === \"global_settings_save\") return saveGlobalSettings(data);\n\n    return jsonResponse({ error: \"Unknown action\" });\n  } catch (err) {\n    return jsonResponse({ error: err.message });\n  }\n}\n\n// ── ELO Database ──\n\nfunction loadElo(colName) {\n  var col = colName || \"ELO\";\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"ELO\");\n  if (!sheet) return jsonResponse({ entries: [] });\n\n  var data = sheet.getDataRange().getValues();\n  if (data.length < 1) return jsonResponse({ entries: [] });\n\n  var headers = data[0].map(function(h) { return String(h).trim().toLowerCase(); });\n  var nameIdx = headers.indexOf(\"name\");\n  var eloIdx = headers.indexOf(col.toLowerCase());\n  var testIdx = headers.indexOf(\"test\");\n\n  if (nameIdx === -1 || eloIdx === -1) return jsonResponse({ entries: [] });\n\n  var seen = {};\n  for (var i = 1; i < data.length; i++) {\n    var pName = String(data[i][nameIdx] || \"\").trim();\n    if (!pName) continue;\n    var eloVal = parseInt(data[i][eloIdx]);\n    if (isNaN(eloVal)) continue; // no valid ELO in this column — client default applies\n    var key = pName.toLowerCase();\n    seen[key] = {\n      name: pName,\n      elo: eloVal,\n      test: testIdx !== -1 && (data[i][testIdx] === true || String(data[i][testIdx]).toLowerCase() === \"true\")\n    };\n  }\n\n  var entries = [];\n  for (var k in seen) entries.push(seen[k]);\n  return jsonResponse({ entries: entries });\n}\n\nfunction saveElo(data) {\n  var colName = data.col || \"ELO\";\n  var spreadsheet = SpreadsheetApp.getActiveSpreadsheet();\n  var sheet = spreadsheet.getSheetByName(\"ELO\");\n  if (!sheet) {\n    sheet = spreadsheet.insertSheet(\"ELO\");\n    sheet.getRange(1, 1, 1, 3).setValues([[\"Test\", \"Name\", colName]]);\n  }\n\n  var entries = data.entries || [];\n  if (!entries.length) return jsonResponse({ ok: true, count: 0 });\n\n  var allData = sheet.getDataRange().getValues();\n  var headers = allData[0].map(function(h) { return String(h).trim(); });\n  var headersLower = headers.map(function(h) { return h.toLowerCase(); });\n\n  // Case-insensitive lookups — loadElo does the same; saveElo must match.\n  var nameIdx = headersLower.indexOf(\"name\");\n  var eloIdx  = headersLower.indexOf(colName.toLowerCase());\n  var testIdx = headersLower.indexOf(\"test\");\n\n  // Add missing columns at the end (never overwrite existing headers).\n  if (nameIdx === -1) {\n    nameIdx = headers.length;\n    sheet.getRange(1, nameIdx + 1).setValue(\"Name\");\n    headers.push(\"Name\"); headersLower.push(\"name\");\n  }\n  if (eloIdx === -1) {\n    eloIdx = headers.length;\n    sheet.getRange(1, eloIdx + 1).setValue(colName);\n    headers.push(colName); headersLower.push(colName.toLowerCase());\n  }\n  if (testIdx === -1) {\n    testIdx = headers.length;\n    sheet.getRange(1, testIdx + 1).setValue(\"Test\");\n    headers.push(\"Test\"); headersLower.push(\"test\");\n  }\n\n  // Re-read after any column additions\n  allData = sheet.getDataRange().getValues();\n  headers = allData[0].map(function(h) { return String(h).trim(); });\n  headersLower = headers.map(function(h) { return h.toLowerCase(); });\n  nameIdx = headersLower.indexOf(\"name\");\n  eloIdx  = headersLower.indexOf(colName.toLowerCase());\n  testIdx = headersLower.indexOf(\"test\");\n\n  // Build name→row map\n  var rowMap = {};\n  for (var i = 1; i < allData.length; i++) {\n    var n = String(allData[i][nameIdx] || \"\").trim().toLowerCase();\n    if (n) rowMap[n] = i + 1;\n  }\n\n  // Update existing row or append new one\n  for (var j = 0; j < entries.length; j++) {\n    var e = entries[j];\n    var key = e.name.toLowerCase();\n    var testVal = e.test === true || e.test === \"true\";\n\n    if (rowMap[key]) {\n      sheet.getRange(rowMap[key], eloIdx + 1).setValue(e.elo);\n      sheet.getRange(rowMap[key], testIdx + 1).setValue(testVal);\n    } else {\n      // New player: seed 1000 in every ELO column, then overwrite this column.\n      var newRow = new Array(headers.length).fill(\"\");\n      newRow[nameIdx] = e.name;\n      newRow[testIdx] = testVal;\n      for (var h = 0; h < headers.length; h++) {\n        var hl = headersLower[h];\n        if (h !== nameIdx && h !== testIdx && hl !== \"\" && hl !== \"name\" && hl !== \"test\") {\n          newRow[h] = \"\"; // other ELO columns left blank — client uses cfg.eloDefault\n        }\n      }\n      newRow[eloIdx] = e.elo;\n      sheet.appendRow(newRow);\n      rowMap[key] = sheet.getLastRow();\n    }\n  }\n\n  return jsonResponse({ ok: true, count: entries.length });\n}\n\n// ── Seeds ──\n\nfunction saveSeed(data) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) {\n    sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet(\"Seeds\");\n    sheet.getRange(1, 1, 1, 4).setValues([[\"ID\", \"Label\", \"Timestamp\", \"Data\"]]);\n  }\n\n  var id = data.id || \"\";\n  var label = data.label || \"\";\n  var timestamp = new Date().toISOString();\n  var stored = data.data || JSON.stringify(data.chunks || []);\n\n  sheet.appendRow([id, label, timestamp, stored]);\n\n  return jsonResponse({ ok: true, id: id });\n}\n\nfunction loadSeed(id) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) return jsonResponse({ ok: false, error: \"No Seeds sheet\" });\n\n  id = (id || \"\").toUpperCase();\n  var data = sheet.getDataRange().getValues();\n\n  for (var i = data.length - 1; i >= 1; i--) {\n    if (String(data[i][0]).toUpperCase() === id) {\n      var raw = String(data[i][3]);\n      try {\n        var parsed = JSON.parse(raw);\n        if (Array.isArray(parsed)) {\n          return jsonResponse({ ok: true, chunks: parsed });\n        } else {\n          return jsonResponse({ ok: true, data: raw });\n        }\n      } catch (e) {\n        return jsonResponse({ ok: false, error: \"Corrupt seed data\" });\n      }\n    }\n  }\n\n  return jsonResponse({ ok: false, error: \"Seed not found: \" + id });\n}\n\nfunction deleteSeed(data) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) return jsonResponse({ ok: false, error: \"No Seeds sheet\" });\n\n  var id = (data.id || \"\").toUpperCase();\n  var rows = sheet.getDataRange().getValues();\n\n  for (var i = rows.length - 1; i >= 1; i--) {\n    if (String(rows[i][0]).toUpperCase() === id) {\n      sheet.deleteRow(i + 1);\n    }\n  }\n\n  return jsonResponse({ ok: true, id: id });\n}\n\nfunction listSeeds() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) return jsonResponse({ seeds: [] });\n\n  var data = sheet.getDataRange().getValues();\n  var seeds = [];\n\n  for (var i = 1; i < data.length; i++) {\n    seeds.push({\n      id: String(data[i][0]),\n      label: String(data[i][1]),\n      timestamp: String(data[i][2])\n    });\n  }\n\n  return jsonResponse({ seeds: seeds });\n}\n\n// ── Rules ──\n\nfunction loadRules(tournament) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Rules\");\n  if (!sheet) return jsonResponse({ rows: [] });\n\n  tournament = (tournament || \"\").toLowerCase();\n  var data = sheet.getDataRange().getValues();\n  var rows = [];\n\n  for (var i = 1; i < data.length; i++) {\n    if (String(data[i][0]).toLowerCase() === tournament) {\n      rows.push(data[i].slice(1).filter(function(c) { return c !== \"\"; }));\n    }\n  }\n\n  return jsonResponse({ rows: rows });\n}\n\n// ── Tournaments ──\n\nvar TOURNAMENT_FEATURE_KEYS = [\n  \"scoring\", \"startScore\", \"pts1\", \"pts2\", \"pts3\", \"ptsLast\", \"winPoints\", \"drawPoints\", \"lossPoints\",\n  \"cumulativeDrawPenalty\", \"rrRounds\", \"timerMinutes\", \"draft\", \"elo\", \"eloKMax\",\n  \"eloScale\", \"eloDefault\", \"eloDB\", \"playerOrder\", \"grandPrix\", \"prizes\",\n  \"entryCost\", \"prizrPlCount\", \"prizePlCountRUp\", \"rUpPlCount\", \"rUpPlCountRUp\",\n  \"timeout\", \"timeoutTime\", \"rules\", \"matchRound\", \"matchMax\",\n  \"gpBestOfLast\", \"gpDropWorst\", \"gpGhostPoints\", \"extraPoints\", \"extraPointsValue\",\n  \"tiebreaker1\", \"tiebreaker2\", \"tiebreaker3\"\n];\n\nfunction loadTournaments() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Settings\");\n  if (!sheet) return jsonResponse({ tournaments: [] });\n\n  var data = sheet.getDataRange().getValues();\n  if (data.length < 2) return jsonResponse({ tournaments: [] });\n\n  var headers = data[0].map(function(h) { return String(h).trim().toLowerCase(); });\n  var tournaments = [];\n\n  function hIdx(key) { return headers.indexOf(key.toLowerCase()); }\n\n  var idColIdx = hIdx(\"id\") !== -1 ? hIdx(\"id\") : 0;\n\n  for (var i = 1; i < data.length; i++) {\n    var row = data[i];\n    var id = String(row[idColIdx] || \"\").trim();\n    if (!id) continue;\n\n    var t = {\n      id: id,\n      name: String(row[hIdx(\"name\")] !== undefined ? row[hIdx(\"name\")] : \"\"),\n      icon: String(row[hIdx(\"icon\")] !== undefined ? row[hIdx(\"icon\")] : \"\"),\n      desc: String(row[hIdx(\"desc\")] !== undefined ? row[hIdx(\"desc\")] : \"\"),\n      features: {}\n    };\n\n    TOURNAMENT_FEATURE_KEYS.forEach(function(key) {\n      var idx = hIdx(key);\n      if (idx === -1) return;\n      var val = row[idx];\n      if (val instanceof Date) {\n        var hh = val.getHours(), mm = val.getMinutes();\n        val = (hh < 10 ? \"0\" : \"\") + hh + \":\" + (mm < 10 ? \"0\" : \"\") + mm;\n      }\n      t.features[key] = val;\n    });\n\n    tournaments.push(t);\n  }\n\n  return jsonResponse({ tournaments: tournaments });\n}\n\nfunction saveTournament(data) {\n  var t = data.tournament;\n  if (!t || !t.id) return jsonResponse({ error: \"Missing tournament id\" });\n\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Settings\");\n  if (!sheet) {\n    sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet(\"Settings\");\n    var initHeaders = [\"id\", \"name\", \"icon\", \"desc\"].concat(TOURNAMENT_FEATURE_KEYS);\n    sheet.getRange(1, 1, 1, initHeaders.length).setValues([initHeaders]);\n  }\n\n  var existing = sheet.getDataRange().getValues();\n  var headers = existing[0].map(function(h) { return String(h).trim(); });\n\n  var row = headers.map(function(h) {\n    if (h === \"id\") return t.id;\n    if (h === \"name\") return t.name || \"\";\n    if (h === \"icon\") return t.icon || \"\";\n    if (h === \"desc\") return t.desc || \"\";\n    return t.features && t.features[h] !== undefined ? t.features[h] : \"\";\n  });\n\n  var idIdx = headers.indexOf(\"id\");\n  for (var i = 1; i < existing.length; i++) {\n    if (String(existing[i][idIdx]).trim() === t.id) {\n      sheet.getRange(i + 1, 1, 1, row.length).setValues([row]);\n      return jsonResponse({ ok: true, id: t.id });\n    }\n  }\n\n  sheet.appendRow(row);\n  return jsonResponse({ ok: true, id: t.id });\n}\n\n// ── Global Settings ──\n\nfunction loadGlobalSettings() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Global Settings\");\n  if (!sheet) return jsonResponse({ settings: {} });\n\n  var data = sheet.getDataRange().getValues();\n  if (data.length < 2) return jsonResponse({ settings: {} });\n\n  var headers = data[0].map(function(h) { return String(h).trim().toLowerCase(); });\n  var keyIdx = headers.indexOf(\"key\");\n  var valIdx = headers.indexOf(\"value\");\n  if (keyIdx === -1 || valIdx === -1) return jsonResponse({ settings: {} });\n\n  var settings = {};\n  for (var i = 1; i < data.length; i++) {\n    var key = String(data[i][keyIdx] || \"\").trim();\n    if (!key) continue;\n    var raw = data[i][valIdx];\n    // Coerce: boolean → bool, numeric string → number, else string\n    if (raw === true || raw === false) {\n      settings[key] = raw;\n    } else if (raw !== \"\" && !isNaN(Number(raw))) {\n      settings[key] = Number(raw);\n    } else {\n      settings[key] = String(raw);\n    }\n  }\n\n  return jsonResponse({ settings: settings });\n}\n\nfunction saveGlobalSettings(data) {\n  var spreadsheet = SpreadsheetApp.getActiveSpreadsheet();\n  var sheet = spreadsheet.getSheetByName(\"Global Settings\");\n  if (!sheet) {\n    sheet = spreadsheet.insertSheet(\"Global Settings\");\n    sheet.getRange(1, 1, 1, 2).setValues([[\"key\", \"value\"]]);\n  }\n\n  var incoming = data.settings || {};\n  var allData = sheet.getDataRange().getValues();\n  var headers = allData[0].map(function(h) { return String(h).trim().toLowerCase(); });\n  var keyIdx = headers.indexOf(\"key\");\n  var valIdx = headers.indexOf(\"value\");\n\n  if (keyIdx === -1) { keyIdx = 0; sheet.getRange(1, 1).setValue(\"key\"); }\n  if (valIdx === -1) { valIdx = 1; sheet.getRange(1, 2).setValue(\"value\"); }\n\n  // Build key → row map\n  var rowMap = {};\n  for (var i = 1; i < allData.length; i++) {\n    var k = String(allData[i][keyIdx] || \"\").trim();\n    if (k) rowMap[k] = i + 1;\n  }\n\n  for (var key in incoming) {\n    var val = incoming[key];\n    if (rowMap[key]) {\n      sheet.getRange(rowMap[key], valIdx + 1).setValue(val);\n    } else {\n      var newRow = [\"\", \"\"];\n      newRow[keyIdx] = key;\n      newRow[valIdx] = val;\n      sheet.appendRow(newRow);\n      rowMap[key] = sheet.getLastRow();\n    }\n  }\n\n  return jsonResponse({ ok: true });\n}\n\n// ── Debug ──\n\nfunction eloColumns() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"ELO\");\n  if (!sheet) return jsonResponse({ cols: [] });\n  var headers = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];\n  var cols = headers.map(function(h) { return String(h).trim(); }).filter(function(h) {\n    return h && h.toLowerCase() !== \"test\" && h.toLowerCase() !== \"name\";\n  });\n  return jsonResponse({ cols: cols });\n}\n\nfunction debugElo() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"ELO\");\n  if (!sheet) return jsonResponse({ error: \"No sheet named ELO\" });\n  var data = sheet.getDataRange().getValues();\n  return jsonResponse({\n    rowCount: data.length,\n    headers: data.length > 0 ? data[0] : [],\n    firstDataRow: data.length > 1 ? data[1] : []\n  });\n}\n\nfunction debugSettings() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Settings\");\n  if (!sheet) return jsonResponse({ error: \"No sheet named Settings\" });\n  var data = sheet.getDataRange().getValues();\n  return jsonResponse({\n    rowCount: data.length,\n    headers: data.length > 0 ? data[0] : [],\n    firstDataRow: data.length > 1 ? data[1] : []\n  });\n}\n\n// ── Helpers ──\n\nfunction jsonResponse(obj) {\n  return ContentService\n    .createTextOutput(JSON.stringify(obj))\n    .setMimeType(ContentService.MimeType.JSON);\n}\n";

// Google Sheets integration — Database card in Advanced tab
// Sheets sync — pull/push ELO, validate, copy script
// Pull: fetches ELO entries (preserves test flag)
function SheetsSync({ state, dispatch, config }) {
  const [status, setStatus] = useState("");
  const url = state.sheetsUrl;
  const col = config?.features?.eloDB || "ELO";
  const pull = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Pulling…");
    try {
      const r = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      if (d?.entries) {
        const db = {};
        d.entries.forEach((e) => {
          if (e?.name)
            db[e.name.toLowerCase()] = { elo: parseInt(e.elo) || 0, name: e.name, test: !!e.test };
        });
        dispatch({ type: "SET_ELO_DB", db, col });
        setStatus(`✓ Pulled ${Object.keys(db).length} (${col})`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const push = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Pushing…");
    try {
      const ent = Object.values(state.eloDb?.[col] || {})
        .filter((v) => v?.name)
        .map((v) => ({ name: v.name, elo: v.elo, test: !!v.test }));
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "save", col, test: false, entries: ent }),
      });
      setStatus(`Verifying…`);
      await new Promise((r) => setTimeout(r, 1500));
      const vr = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      const vd = await vr.json();
      const remote = vd?.entries?.length || 0;
      if (remote >= ent.length) {
        setStatus(`✓ Pushed & verified (${remote} entries, ${col})`);
      } else {
        setStatus(`⚠ Pushed ${ent.length} but ${col} has ${remote} — check manually`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const validate = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Validating…");
    const results = [];
    try {
      const r = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      const d = await r.json();
      results.push(d?.entries ? `✓ ELO (${col})` : `✗ ELO (${col}) — missing or wrong format`);
    } catch {
      results.push("✗ ELO — unreachable");
    }
    try {
      const r = await fetch(url + "?action=seed_list");
      const d = await r.json();
      results.push(d?.seeds ? "✓ Seeds" : "✗ Seeds — missing or wrong format");
    } catch {
      results.push("✗ Seeds — unreachable");
    }
    try {
      const r = await fetch(url + "?action=rules&tournament=_validate_");
      const d = await r.json();
      results.push(d?.rows ? "✓ Rules" : "✗ Rules — missing or wrong format");
    } catch {
      results.push("✗ Rules — unreachable");
    }
    const ok = results.every((r) => r.startsWith("✓"));
    setStatus(ok ? `✓ All tabs valid — ${results.join(" · ")}` : results.join("\n"));
  };
  const copyScript = () => {
    const s = APPS_SCRIPT;
    navigator.clipboard
      .writeText(s)
      .then(() => setStatus("✓ Script copied to clipboard"))
      .catch(() => {
        const ta = document.createElement("textarea");
        ta.value = s;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        setStatus("✓ Script copied");
      });
  };
  return (
    <Card>
      <h3 style={S.cardTitle}>Database</h3>
      <label
        style={{ fontSize: 13, color: C.text, fontWeight: 500, marginBottom: 6, display: "block" }}
      >
        Google Sheet URL
      </label>
      <input
        type="text"
        value={url || ""}
        placeholder="Apps Script URL"
        onChange={(e) => dispatch({ type: "SET_SHEETS_URL", url: e.target.value.trim() })}
        style={{ ...S.input, fontSize: 12, padding: "5px 8px", marginBottom: 6 }}
      />
      <div style={{ display: "flex", gap: 6, marginBottom: 4 }}>
        <Btn onClick={pull} style={{ flex: 1, fontSize: 12 }}>
          ⬇ Pull
        </Btn>
        <Btn onClick={push} style={{ flex: 1, fontSize: 12 }}>
          ⬆ Push
        </Btn>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <Btn
          onClick={validate}
          style={{ flex: 1, fontSize: 12, borderColor: C.blue, color: C.blue }}
        >
          🔍 Validate Sheet
        </Btn>
        <Btn
          onClick={copyScript}
          style={{ flex: 1, fontSize: 12, borderColor: C.purple, color: C.purple }}
        >
          📋 Copy Script
        </Btn>
      </div>
      <div
        style={{
          fontSize: 11,
          color: C.muted,
          minHeight: 14,
          marginTop: 6,
          whiteSpace: "pre-wrap",
        }}
      >
        {status}
      </div>
    </Card>
  );
}

// Save/load tournament snapshots via Google Sheets
// Seeds — save/load/delete tournament snapshots
// v3 format: single JSON blob per seed (no chunking)
function SeedsManager({ state, dispatch }) {
  const [status, setStatus] = useState(""),
    [seedId, setSeedId] = useState(""),
    [seeds, setSeeds] = useState([]);
  const url = state.sheetsUrl;
  const save = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    if (!state.players.length) {
      setStatus("⚠ No players");
      return;
    }
    const id = makeId();
    const snap = buildSnap(state);
    const data = JSON.stringify(snap);
    const t = state.tournaments?.[state.tournamentId];
    const label = `${t?.icon || ""} ${t?.name || ""} · ${state.players.length}p · R${state.currentRound}`;
    setStatus("Saving…");
    try {
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "seed_save", id, label, data }),
      });
      setStatus("Verifying…");
      await new Promise((r) => setTimeout(r, 1500));
      const vr = await fetch(url + "?action=seed_load&id=" + encodeURIComponent(id));
      const vd = await vr.json();
      if (vd?.ok) {
        setStatus(`✓ Saved · ${id}`);
        list();
      } else {
        setStatus(`⚠ Sent but verify failed · ${id}`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const loadById = async (id) => {
    const target = (id || seedId.trim()).toUpperCase();
    if (!url || !target) {
      setStatus("⚠ Enter ID");
      return;
    }
    setStatus("Loading…");
    try {
      const r = await fetch(url + "?action=seed_load&id=" + encodeURIComponent(target));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      if (!d?.ok) throw new Error(d?.error || "Not found");
      let snap;
      if (d.data) {
        snap = JSON.parse(d.data);
      } else if (d.chunks) {
        snap = JSON.parse(d.chunks.join(""));
      } else throw new Error("No data");
      dispatch({ type: "RESTORE_SNAPSHOT", snapshot: snap });
      setStatus(`✓ Restored ${target}`);
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const del = async (id) => {
    if (!url) return;
    setStatus("Deleting…");
    try {
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "seed_delete", id }),
      });
      await new Promise((r) => setTimeout(r, 1000));
      list();
      setStatus(`✓ Deleted ${id}`);
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const list = async () => {
    if (!url) return;
    try {
      const r = await fetch(url + "?action=seed_list");
      const d = await r.json();
      setSeeds(
        (d?.seeds || []).sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || "")),
      );
    } catch {}
  };
  useEffect(() => {
    list();
  }, []);
  return (
    <Card>
      <h3 style={S.cardTitle}>Seeds</h3>
      <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
        <Btn onClick={save} style={{ fontSize: 12 }}>
          💾 Save snapshot
        </Btn>
        <input
          type="text"
          value={seedId}
          placeholder="Seed ID…"
          onChange={(e) => setSeedId(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && loadById()}
          style={{ ...S.input, fontSize: 12, padding: "5px 8px", flex: 1, minWidth: 80 }}
        />
        <Btn onClick={() => loadById()} style={{ fontSize: 12 }}>
          📂 Load
        </Btn>
      </div>
      <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>{status}</div>
      {seeds.length > 0 && (
        <div style={{ fontSize: 12 }}>
          {seeds.map((s) => (
            <div
              key={s.id}
              style={{
                display: "flex",
                gap: 6,
                padding: "6px 0",
                borderBottom: `0.5px solid ${C.bL}`,
                alignItems: "center",
                flexWrap: "wrap",
              }}
            >
              <code
                style={{
                  fontSize: 11,
                  background: C.subtle,
                  padding: "1px 5px",
                  borderRadius: 3,
                  flexShrink: 0,
                }}
              >
                {s.id}
              </code>
              <span style={{ flex: 1, fontSize: 12, minWidth: 80 }}>{s.label}</span>
              <span style={{ fontSize: 10, color: C.faint, flexShrink: 0 }}>
                {s.timestamp ? new Date(s.timestamp).toLocaleDateString() : ""}
              </span>
              <Btn
                onClick={() => {
                  if (confirm(`Load seed ${s.id}?`)) loadById(s.id);
                }}
                style={{
                  fontSize: 10,
                  padding: "2px 8px",
                  color: C.blue,
                  borderColor: C.bBd,
                  flexShrink: 0,
                }}
              >
                Load
              </Btn>
              <Btn
                onClick={() => {
                  if (confirm(`Delete seed ${s.id}?`)) del(s.id);
                }}
                style={{ fontSize: 10, padding: "2px 6px", color: C.red, flexShrink: 0 }}
              >
                ✕
              </Btn>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

// Rules tab — fetches from Sheets by tournament name, caches in localStorage
function RulesTab({ state }) {
  const [rows, setRows] = useState(null),
    [status, setStatus] = useState("");
  const tn = state.tournaments?.[state.tournamentId]?.name || "";
  const load = async (f) => {
    const ck = "rules_" + tn;
    if (!f)
      try {
        const cached = localStorage.getItem(ck);
        if (cached) {
          setRows(JSON.parse(cached));
          setStatus("Cached");
        }
      } catch {}
    const url = state.sheetsUrl;
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    try {
      const r = await fetch(url + "?action=rules&tournament=" + encodeURIComponent(tn));
      const d = await r.json();
      if (d?.rows) {
        setRows(d.rows);
        try {
          localStorage.setItem(ck, JSON.stringify(d.rows));
        } catch {}
        setStatus("✓");
      } else setStatus("✗ " + (d?.error || "Error"));
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  useEffect(() => {
    load(false);
  }, []);
  return (
    <Card>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          marginBottom: 12,
          flexWrap: "wrap",
          gap: 8,
        }}
      >
        <h3 style={{ ...S.cardTitle, marginBottom: 0 }}>Rules — {tn}</h3>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontSize: 11, color: C.muted }}>{status}</span>
          <Btn onClick={() => load(true)} style={{ fontSize: 11, padding: "3px 8px" }}>
            ↻
          </Btn>
        </div>
      </div>
      {!rows ? (
        <div
          style={{
            padding: 16,
            background: C.subtle,
            borderRadius: 8,
            color: C.muted,
            fontStyle: "italic",
            fontSize: 13,
          }}
        >
          Rules load from "Rules" tab.
        </div>
      ) : rows.length === 0 ? (
        <div style={{ padding: 16, color: C.muted, fontSize: 13 }}>No rules for "{tn}".</div>
      ) : (
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} style={{ background: i % 2 === 1 ? "#fafafa" : "" }}>
                {r.map((c, j) => {
                  const isLast = j === r.length - 1;
                  let display = c;
                  if (isLast) {
                    const d = new Date(c);
                    if (!isNaN(d.getTime())) {
                      display = `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`;
                    } else {
                      display = String(c);
                    }
                  }
                  return (
                    <td
                      key={j}
                      style={{
                        padding: "6px 10px 6px 0",
                        borderBottom: `0.5px solid ${C.bL}`,
                        whiteSpace: "pre-wrap",
                        ...(isLast && { color: C.muted, fontSize: 11, whiteSpace: "nowrap" }),
                      }}
                    >
                      {display}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </Card>
  );
}

const AC_MAX_SUGGESTIONS = 6;   // max autocomplete results shown in the dropdown
const AC_BLUR_DELAY_MS   = 150; // delay before hiding dropdown on blur — prevents click-before-close race
// Left card: add players with autocomplete dropdown from ELO database
//   - Dropdown shows up to 6 matches, filtered by test mode
//   - Player list with paid toggle, abandon button, remove button
// Right card: full registered players table with ELO, filter search
//   - Filters by test flag based on testMode state
function PlayersTab({ state, dispatch, config, eloLoadedCols }) {
  const [input, setInput] = useState(""),
    [filter, setFilter] = useState(""),
    [acFocused, setAcFocused] = useState(false);
  const eloCol = config?.features?.eloDB || "ELO";
  const activeElo = state.eloDb?.[eloCol] || {};
  const eloReady = !eloCol || !!eloLoadedCols?.[eloCol] || Object.keys(activeElo).length > 0;
  const addedNames = useMemo(
    () => new Set(state.players.map((p) => p.name.toLowerCase())),
    [state.players],
  );
  const dbPlayers = useMemo(
    () =>
      Object.values(activeElo)
        .filter(
          (e) =>
            e?.name &&
            !addedNames.has(e.name.toLowerCase()) &&
            (!filter || e.name.toLowerCase().includes(filter.toLowerCase())) &&
            (state.testMode ? !!e.test : !e.test),
        )
        .sort((a, b) => (b.elo || 0) - (a.elo || 0)),
    [activeElo, filter, state.testMode, addedNames],
  );
  const paidCount = state.players.filter((p) => p.paid).length;
  const suggestions = useMemo(() => {
    if (!input.trim() || input.length < 1) return [];
    return Object.values(activeElo)
      .filter(
        (e) =>
          e?.name &&
          e.name.toLowerCase().includes(input.toLowerCase()) &&
          !addedNames.has(e.name.toLowerCase()) &&
          (state.testMode ? !!e.test : !e.test),
      )
      .sort((a, b) => (b.elo || 0) - (a.elo || 0))
      .slice(0, AC_MAX_SUGGESTIONS);
  }, [input, activeElo, addedNames, state.testMode]);
  const addPlayer = (name) => {
    dispatch({ type: "ADD_PLAYER", name });
    setInput("");

            <input
              type="text"
              value={filter}

          {!eloReady ? (
            <div style={{ textAlign: "center", padding: 16, color: C.faint, fontSize: 12 }}>

              <div style={{ maxHeight: 400, overflowY: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr>
                      <th
                        style={{
                          fontSize: 11,
                          color: C.muted,
                          fontWeight: 500,
                          textAlign: "left",
                          padding: "4px 6px 4px 0",

                          padding: "4px 6px",
                          borderBottom: `0.5px solid ${C.border}`,
                          width: 60,
                          position: "sticky",
                          top: 0,
                          background: C.card,

                        ELO
                      </th>
                      <th
                        style={{
                          borderBottom: `0.5px solid ${C.border}`,
                          width: 40,
                          position: "sticky",
                          top: 0,
                          background: C.card,

                        <tr key={e.name} style={{ background: i % 2 === 1 ? "#fafafa" : "" }}>
                          <td style={{ padding: "5px 6px 5px 0", fontWeight: 500 }}>{e.name}</td>
                          <td style={{ padding: "5px 6px", textAlign: "center", color: C.muted }}>

                          </td>

              <div style={{ fontSize: 11, color: C.faint, marginTop: 6 }}>{dbPlayers.length} entries</div>
            </>
          )}
        </Card>
      </div>
    </div>
  );
}

// Standings — rankings, ELO deltas, inline prize tags
function StandingsTab({ state, dispatch, config }) {
  const cfg = config.features,
    activePlayers = state.players.filter((p) => !p.eliminated),
    isGrandPrix = cfg.grandPrix,
    activeElo = state.eloDb[cfg.eloDB || "ELO"] || {};
  const tb1 = cfg.tiebreaker1 || "elo",
    tb2 = cfg.tiebreaker2 || "none",
    tb3 = cfg.tiebreaker3 || "none";
  const playerStats = Object.fromEntries(
    state.players.map((p) => [p.name, {
      elo: getElo(activeElo, p.name, cfg.eloDefault),
      omw: calcOMW(p.name, state.history, state.players),
      gwr: calcGWR(p),
    }]),
  );
  const sorted = [...state.players].sort(
    (a, b) =>
      b.score - a.score ||
      (tb1 !== "none" ? calcTiebreakerValue(playerStats, b, tb1) - calcTiebreakerValue(playerStats, a, tb1) : 0) ||
      (tb2 !== "none" ? calcTiebreakerValue(playerStats, b, tb2) - calcTiebreakerValue(playerStats, a, tb2) : 0) ||
      (tb3 !== "none" ? calcTiebreakerValue(playerStats, b, tb3) - calcTiebreakerValue(playerStats, a, tb3) : 0),
  ),
    winner = activePlayers.length === 1 ? activePlayers[0] : null;
  const prizeMisconfigured =
    cfg.prizes && (cfg.entryCost == null || cfg.prizrPlCount == null || cfg.rUpPlCount == null);
  const prizeCalc =
    cfg.prizes && !prizeMisconfigured
      ? calcAlloc(
          state.players,
          state.prizes,
          state.ranks,
          cfg.entryCost,
          cfg.prizrPlCount,
          cfg.prizePlCountRUp,
          cfg.rUpPlCount,
          cfg.rUpPlCountRUp,
        )
      : null;
  return (
    <div>
      {prizeMisconfigured && (
        <div
          style={{
            background: "#fff3cd",
            border: "0.5px solid #f0ad4e",
            borderRadius: 8,
            padding: "10px 16px",
            fontSize: 13,
            color: "#7d4e00",
            marginBottom: 12,
          }}
        >
          Prizes enabled but <strong>entryCost</strong>, <strong>prizrPlCount</strong>, and <strong>rUpPlCount</strong> must be set in the Settings tab.
        </div>
      )}
      {winner && (
        <div
          style={{
            background: C.gBg,
            color: C.green,
            borderRadius: 10,
            padding: "12px 20px",
            fontSize: 16,
            fontWeight: 500,
            textAlign: "center",
            marginBottom: 16,
          }}
        >
          🏆 Winner: {winner.name}
        </div>
      )}
      <div
        style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}
      >
        <div style={S.metric}>
          <div style={S.metricLabel}>Round</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>
            {state.currentRound > 0 ? state.currentRound - 1 : "—"}
          </div>
        </div>
        <div style={S.metric}>
          <div style={S.metricLabel}>Players</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>{state.players.length || "—"}</div>
        </div>
        <div style={S.metric}>
          <div style={S.metricLabel}>Active</div>
          <div style={{ fontSize: 22, fontWeight: 500 }}>{activePlayers.length || "—"}</div>
        </div>
      </div>
      <Card>
          <h3 style={S.cardTitle}>Standings</h3>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead>
              <tr>
                {[
                  "#",
                  "Player",
                  "ELO",
                  cfg.scoring === "lifepoints" ? "LP" : "Pts",
                  cfg.scoring === "points" ? "1/2/3/L" : "W/D/L",
                  "Status",
                ].map((h, hi) => (
                  <th
                    key={hi}
                    style={{
                      ...S.tableHeader,
                      padding: "6px 8px",
                      borderBottom: `0.5px solid ${C.border}`,
                    }}
                  >
                    {h}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map((p, i) => {
                const pr = prizeCalc?.allocs?.[i] || null;
                const elo = getElo(activeElo, p.name, cfg.eloDefault);
                const eloDelta = cfg.elo && p.eloStart != null ? elo - p.eloStart : null;
                return (
                  <tr key={p.name}>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        fontWeight: 500,
                      }}
                    >
                      {i + 1}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {p.name}
                    </td>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        fontWeight: 500,
                      }}
                    >
                      {elo}
                      {eloDelta != null && eloDelta !== 0 && (
                        <span style={{ fontSize: 11, fontWeight: 500, color: eloDelta > 0 ? C.green : C.red, marginLeft: 4 }}>
                          {eloDelta > 0 ? "+" : ""}{eloDelta}
                        </span>
                      )}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {cfg.scoring === "lifepoints" ? (
                        <>
                          <Hearts score={p.score} max={cfg.startScore} />{" "}
                          <span style={{ fontSize: 11, color: C.faint }}>({p.score})</span>
                        </>
                      ) : (
                        <span style={{ fontWeight: 600 }}>
                          {p.score}pt
                          {isGrandPrix ? <span style={{ fontSize: 10, color: C.faint }}> GP</span> : ""}
                        </span>
                      )}
                    </td>
                    <td
                      style={{
                        padding: "7px 8px",
                        borderBottom: `0.5px solid ${C.bL}`,
                        color: C.muted,
                      }}
                    >
                      {cfg.scoring === "points"
                        ? `${p.p1||0}/${p.p2||0}/${p.p3||0}/${p.pLast||0}`
                        : `${p.w}/${p.d}/${p.l}`}
                    </td>
                    <td style={{ padding: "7px 8px", borderBottom: `0.5px solid ${C.bL}` }}>
                      {p.eliminated ? (
                        <Tag variant="amber">Out</Tag>
                      ) : pr && pr.chosen.length ? (
                        <div style={{ lineHeight: 1.7 }}>
                          {pr.chosen.map((x, xi) => (
                            <span
                              key={xi}
                              style={{
                                fontSize: 10,
                                borderRadius: 4,
                                padding: "2px 5px",
                                display: "inline-block",
                                background: C.gBg,
                                color: C.green,
                                fontWeight: 500,
                                marginRight: 3,
                                marginBottom: 1,
                              }}
                            >
                              {x.qty > 1 ? x.qty + "× " : ""}
                              {x.name}
                            </span>
                          ))}
                        </div>
                      ) : i === 0 ? (
                        <Tag variant="green">Leader</Tag>
                      ) : null}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {prizeCalc && (
            <div style={{ fontSize: 11, color: C.muted, marginTop: 8, textAlign: "right" }}>
              Prize pool: €{prizeCalc.totalPool.toFixed(2)} · Allocated: €{prizeCalc.grandTotal.toFixed(2)}
            </div>
          )}
      </Card>
    </div>
  );
}

// Sub-tabs: Draft (groups) | Pairings (cards) | Log (history)
// Matches tab — pairing cards, match log, timer, draft sub-tabs
function MatchCard({ match, index, dispatch, scoring, eloDb, eloDefault = 0, extraPoints, extraPointsValue, playerOrder }) {
  if (match.isBye)
    return (
      <Card variant="bye">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>{match.players[0]}</div>
          <Tag variant="grey">BYE</Tag>
        </div>
      </Card>
    );

  if (scoring === "points") {
    return (
      <Card variant="compact">
        <div style={S.matchLabel}>
          Match {index + 1} · {match.players.length}p
          {match.rematch && <> <Tag variant="amber">re</Tag></>}
        </div>
        {match.players.map((n) => {
          const epOn = match.extraPoints?.[n] || 0;
          return (
            <div
              key={n}
              style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: `0.5px solid ${C.bL}` }}
            >
              <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{n}</span>
              <span style={{ fontSize: 11, color: C.faint }}>{getElo(eloDb, n, eloDefault)}</span>
              <input
                type="text"
                inputMode="numeric"
                placeholder="—"
                value={match.scores[n] ?? ""}
                onChange={(e) => dispatch({ type: "SET_MATCH_SCORE", index, player: n, value: e.target.value })}
                style={S.inputSm}
              />
              {extraPoints && (
                <button
                  onClick={() => dispatch({ type: "ADD_EXTRA_POINTS", index, player: n, delta: extraPointsValue || 1 })}
                  style={{ ...S.epBtn, padding: "3px 0", background: epOn ? C.aBg : "transparent", border: `0.5px solid ${epOn ? C.aBd : "#ddd"}`, color: epOn ? C.amber : C.muted }}
                >
                  {epOn ? "EP" : "+EP"}
                </button>
              )}
            </div>
          );
        })}
      </Card>
    );
  }

  // swiss / lifepoints: winner-selection UI
  const [p1, p2] = match.players;
  const scores = match.scores;
  const isDone = match.result === "done";
  const p1Score = scores[p1], p2Score = scores[p2];
  const sel = !isDone ? null : p1Score > p2Score ? "p1" : p2Score > p1Score ? "p2" : "draw";

  if (match.players.length === 2) {
    const btnStyle = (active, t) => ({
      flex: 1, display: "flex", flexDirection: "column", padding: "6px 8px", borderRadius: 5,
      cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 500, lineHeight: 1.3,
      border: `0.5px solid ${active ? (t === "d" ? C.aBd : C.gBd) : "#ddd"}`,
      background: active ? (t === "d" ? C.aBg : C.gBg) : "transparent",
      color: active ? (t === "d" ? C.amber : C.green) : C.muted,
      textAlign: t === "r" ? "right" : t === "d" ? "center" : "left",
      alignItems: t === "r" ? "flex-end" : t === "d" ? "center" : "flex-start",
    });
    const pick = (result) => {
      if (isDone && sel === result) {
        dispatch({ type: "SET_MATCH_RESULT", index, reset: true });
        return;
      }
      const scores = result === "p1" ? { [p1]: 1, [p2]: 0 } : result === "p2" ? { [p1]: 0, [p2]: 1 } : { [p1]: 0.5, [p2]: 0.5 };
      dispatch({ type: "SET_MATCH_RESULT", index, scores });
    };
    const mkEpBtn = (n) => {
      const epOn = match.extraPoints?.[n] || 0;
      return (
        <button
          onClick={() => dispatch({ type: "ADD_EXTRA_POINTS", index, player: n, delta: extraPointsValue || 1 })}
          style={{ ...S.epBtn, background: epOn ? C.aBg : "transparent", border: `0.5px solid ${epOn ? C.aBd : "#ddd"}`, color: epOn ? C.amber : C.muted, alignSelf: "stretch", display: "flex", alignItems: "center", justifyContent: "center" }}
        >
          {epOn ? "EP" : "+EP"}
        </button>
      );
    };
    return (
      <Card variant="compact">
        <div style={{ display: "flex", gap: 4, alignItems: "stretch" }}>
          {extraPoints && mkEpBtn(p1)}
          <button style={{ ...btnStyle(sel === "p1", "l"), flex: 2 }} onClick={() => pick("p1")}>
            <span>{p1}{match.rematch && <> <Tag variant="amber">re</Tag></>}</span>
          </button>
          <button style={{ ...btnStyle(sel === "draw", "d"), flex: 1 }} onClick={() => pick("draw")}>draw</button>
          <button style={{ ...btnStyle(sel === "p2", "r"), flex: 2 }} onClick={() => pick("p2")}>
            <span>{p2}</span>
          </button>
          {extraPoints && mkEpBtn(p2)}
        </div>
      </Card>
    );
  }

  // N-player swiss/lifepoints: tap to select winner(s), tap again to deselect
  const winners = match.players.filter(n => scores[n] === 1);
  const toggle = (name) => {
    const newWinners = winners.includes(name) ? winners.filter(x => x !== name) : [...winners, name];
    if (!newWinners.length) { dispatch({ type: "SET_MATCH_RESULT", index, reset: true }); return; }
    const scores = Object.fromEntries(match.players.map(n => [n, newWinners.includes(n) ? (newWinners.length > 1 ? 0.5 : 1) : 0]));
    dispatch({ type: "SET_MATCH_RESULT", index, scores });
  };
  return (
    <Card style={{ padding: "10px 14px" }}>
      <div style={S.matchLabel}>
        Match {index + 1} · {match.players.length}p
        {match.rematch && <> <Tag variant="amber">re</Tag></>}
      </div>
      {match.players.map((n, pi) => {
        const isWinner = scores[n] === 1, isDraw = scores[n] === 0.5;
        const epOn = match.extraPoints?.[n] || 0;
        return (
          <div key={n} style={{ display: "flex", gap: 4, marginBottom: 4 }}>
            <button
              onClick={() => toggle(n)}
              style={{
                display: "flex", alignItems: "center", flex: 1, gap: 8, padding: "7px 8px",
                borderRadius: 5, cursor: "pointer", fontFamily: "inherit", textAlign: "left",
                border: `0.5px solid ${isWinner ? C.gBd : isDraw ? C.aBd : "#ddd"}`,
                background: isWinner ? C.gBg : isDraw ? C.aBg : "transparent",
                color: isWinner ? C.green : isDraw ? C.amber : C.text,
                fontWeight: isWinner || isDraw ? 600 : 400, fontSize: 13,
              }}
            >
              {playerOrder && (
                <span style={{ fontSize: 10, fontWeight: 700, color: pi === 0 ? C.green : C.faint, minWidth: 14 }}>
                  {pi === 0 ? "⚡" : pi + 1}
                </span>
              )}
              <span style={{ flex: 1 }}>{n}</span>
              <span style={{ fontSize: 11, color: C.faint }}>{getElo(eloDb, n, eloDefault)}</span>
              {isWinner && <span style={{ fontSize: 11 }}>Win</span>}
              {isDraw && <span style={{ fontSize: 11 }}>Draw</span>}
            </button>
            {extraPoints && (
              <button
                onClick={() => dispatch({ type: "ADD_EXTRA_POINTS", index, player: n, delta: extraPointsValue || 1 })}
                style={{ ...S.epBtn, background: epOn ? C.aBg : "transparent", border: `0.5px solid ${epOn ? C.aBd : "#ddd"}`, color: epOn ? C.amber : C.muted }}
              >
                {epOn ? "EP" : "+EP"}
              </button>
            )}
          </div>
        );
      })}
    </Card>
  );
}
function MatchLog({ state }) {
  let roundIdx = 0;
  if (!state.matchLog.length)
    return <div style={{ textAlign: "center", padding: 32, color: C.faint }}>No activity.</div>;
  const roundHeader = (label, ts) => (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 4px 8px", marginBottom: 4 }}>
      <h3 style={{ fontSize: 15, fontWeight: 500, margin: 0 }}>{label}</h3>
      <span style={{ fontSize: 11, color: C.faint }}>{ts}</span>
    </div>
  );
  return (
    <div>
      {state.matchLog.map((ev, ei) => {
        if (ev.type === "round") {
          const round = state.history[roundIdx++];
          if (!round) return null;
          const isMulti = round.some((m) => !m.isBye && m.players.length > 2);
          if (isMulti) {
            return (
              <div key={ei} style={{ marginBottom: 16 }}>
                {roundHeader(ev.label, ev.ts)}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {round.map((m, mi) => (
                    <Card key={mi} style={{ marginBottom: 0 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: C.purple, marginBottom: 6 }}>
                        Table {mi + 1} · {m.players.length}p
                      </div>
                      {m.players.map((n) => (
                        <div key={n} style={{ fontSize: 13, padding: "4px 0", display: "flex", justifyContent: "space-between", borderBottom: `0.5px solid ${C.bL}` }}>
                          <span style={{ fontWeight: 500 }}>{n}</span>
                          <span style={{ color: C.muted }}>
                            {m.scores[n] != null && m.scores[n] !== "" ? `${m.scores[n]}pt` : "—"}
                            {(m.extraPoints?.[n] || 0) > 0 && (
                              <span style={{ color: C.green, fontWeight: 500, fontSize: 11, marginLeft: 4 }}>+EP</span>
                            )}
                            {m.eloDeltas?.[n] != null && (
                              <span style={{ color: m.eloDeltas[n] > 0 ? C.green : m.eloDeltas[n] < 0 ? C.red : C.muted, fontWeight: 500, fontSize: 11, marginLeft: 4 }}>
                                {m.eloDeltas[n] > 0 ? "+" : ""}{m.eloDeltas[n]}
                              </span>
                            )}
                          </span>
                        </div>
                      ))}
                    </Card>
                  ))}
                </div>
              </div>
            );
          }
          return (
            <div key={ei} style={{ marginBottom: 16 }}>
              {roundHeader(ev.label, ev.ts)}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {round.map((m, mi) => {
                  if (m.isBye)
                    return (
                      <Card key={mi} style={{ marginBottom: 0, fontSize: 13 }}>
                        {m.players[0]} — <Tag variant="grey">BYE</Tag>
                      </Card>
                    );
                  const [p1, p2] = m.players;
                  const s1 = parseFloat(m.scores[p1] || 0), s2 = parseFloat(m.scores[p2] || 0);
                  const isDraw = s1 === s2 && m.result === "done";
                  const w = !isDraw ? (s1 > s2 ? p1 : p2) : null;
                  const l = !isDraw ? (s1 > s2 ? p2 : p1) : null;
                  const winnerDelta = w && m.eloDeltas?.[w];
                  return (
                    <Card key={mi} style={{ marginBottom: 0 }}>
                      <div style={{ fontSize: 13, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
                        <span style={{ fontWeight: 500, color: isDraw ? C.text : C.green }}>{w || p1}</span>
                        <span style={{ color: C.muted }}>{l || p2}</span>
                        {winnerDelta != null && (
                          <span style={{ fontSize: 11, fontWeight: 500, color: winnerDelta > 0 ? C.green : winnerDelta < 0 ? C.red : C.muted }}>
                            {winnerDelta > 0 ? "+" : ""}{winnerDelta}
                          </span>
                        )}
                        {isDraw && <span style={{ color: C.amber, fontWeight: 500, fontSize: 11 }}>Draw</span>}
                        {m.players.some(n => (m.extraPoints?.[n] || 0) > 0) && (
                          <span style={{ color: C.green, fontWeight: 500, fontSize: 11 }}>
                            EP: {m.players.filter(n => (m.extraPoints?.[n] || 0) > 0).join(", ")}
                          </span>
                        )}
                        {m.rematch && <Tag variant="amber">re</Tag>}
                        {m.forfeit && <Tag variant="amber">forfeit</Tag>}
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>
          );
        }
        const icons = { start: "🏁", abandon: "⚑", "draft-end": "📋", "tournament-timeout": "⏰" },
          bg = { start: C.gBg, abandon: C.aBg, "draft-end": C.bBg, "tournament-timeout": C.rBg },
          colors = { start: C.green, abandon: C.amber, "draft-end": C.blue, "tournament-timeout": C.red };
        return (
          <div key={ei} style={{ background: bg[ev.type] || C.subtle, borderRadius: 8, padding: "8px 12px", marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: colors[ev.type] || C.text }}>
                {icons[ev.type] || "•"} {ev.label}
              </span>
              <span style={{ fontSize: 11, color: C.faint }}>{ev.ts}</span>
            </div>
            {ev.tables && (
              <div style={{ marginTop: 8, display: "flex", gap: 8, flexWrap: "wrap" }}>
                {ev.tables.map((tbl, ti) => (
                  <div key={ti} style={{ fontSize: 11, color: C.text }}>
                    <span style={{ fontWeight: 600, color: C.blue }}>T{ti + 1}: </span>
                    {tbl.map((p) => p.name).join(", ")}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function MatchesTab({ state, dispatch, config, eloLoadedCols }) {
  const cfg = config.features,
    subTabs = [
      cfg.draft && !state.draftEnded && { id: "draft", label: "Draft" },
      { id: "pairings", label: "Pairings" },
      { id: "standings", label: "Standings" },
      { id: "log", label: "Log" },
      { id: "session", label: "Session" },
    ].filter(Boolean);
  const isRR = state.phase === "roundrobin" && cfg.rrRounds > 0,
    scoringMode = SCORING_MODES.find(m => m.value === cfg.scoring) || SCORING_MODES[1],
    rl = isRR
      ? `Round Robin — R${state.currentRound}/${cfg.rrRounds}`
      : `${scoringMode.label} — R${state.currentRound - (isRR ? 0 : cfg.rrRounds)}`;
  return (
    <div>
      <TabBar
        tabs={subTabs}
        active={state.matchSubTab}
        onSelect={(id) => dispatch({ type: "SET_MATCH_SUBTAB", tab: id })}
      />
      {state.matchSubTab === "draft" && (
        <DraftGroups players={state.players} eloDb={state.eloDb[cfg.eloDB || "ELO"] || {}} dispatch={dispatch} eloDefault={cfg.eloDefault} />
      )}
      {state.matchSubTab === "pairings" && (
        <div>
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              marginBottom: 16,
              flexWrap: "wrap",
              gap: 8,
            }}
          >
            <div>
              <div style={{ fontSize: 16, fontWeight: 500 }}>{rl}</div>
              <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>
                {isRR ? "By ELO" : scoringMode.pairingSort}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              <Btn
                onClick={() => {
                  const u = state.pairings.filter((m) => !m.isBye && m.result !== "done");
                  if (u.length && !confirm(`${u.length} unresolved.`)) return;
                  dispatch({ type: "NEXT_ROUND" });
                }}
              >
                Next round ↗
              </Btn>
            </div>
          </div>
          {cfg.timerMinutes > 0 && <Timer minutes={cfg.timerMinutes} key={state.currentRound} />}
          {cfg.playerOrder && state.pairings.some((m) => !m.isBye && m.players.length === 2) && (
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "2fr 1fr 2fr",
                gap: 4,
                marginBottom: 6,
                padding: "0 14px",
              }}
            >
              <div style={{ fontSize: 11, fontWeight: 500, color: C.green, textAlign: "center" }}>
                ⚡ First
              </div>
              <div />
              <div />
            </div>
          )}
          {!state.pairings.length && (
            <div style={{ textAlign: "center", padding: 32, color: C.faint }}>No pairings.</div>
          )}
          {state.pairings.map((m, i) => (
            <MatchCard key={i} match={m} index={i} dispatch={dispatch} scoring={cfg.scoring} eloDb={state.eloDb[cfg.eloDB || "ELO"] || {}} eloDefault={cfg.eloDefault} extraPoints={cfg.extraPoints} extraPointsValue={cfg.extraPointsValue || 1} playerOrder={cfg.playerOrder} />
          ))}
        </div>
      )}
      {state.matchSubTab === "standings" && (
        <StandingsTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.matchSubTab === "log" && <MatchLog state={state} />}
      {state.matchSubTab === "session" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {cfg.grandPrix && (
            <Card>
              <h3 style={S.cardTitle}>New session ＋</h3>
              <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>
                Resets the round counter to 1 and generates fresh pairings, but keeps all match history. GP scoring continues across sessions — the sliding window runs over all rounds ever played.
              </div>
              <Btn
                onClick={() => {
                  if (confirm("Start a new session? Round counter resets but history is kept.")) {
                    autoSeedSave(state);
                    dispatch({ type: "NEW_GP_SESSION" });
                  }
                }}
                style={{ borderColor: C.aBd, color: C.amber, background: C.aBg, padding: "10px 20px", fontSize: 14, fontWeight: 500 }}
              >
                New session ＋
              </Btn>
            </Card>
          )}
          <Card>
            <h3 style={S.cardTitle}>End tournament</h3>
            <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>
              Finalizes the tournament. Players are sorted by score; the leader is declared the winner and everyone else is marked eliminated. The in-progress backup is cleared.
            </div>
            <Btn
              onClick={() => {
                if (confirm("End the tournament?")) {
                  autoSeedSave(state);
                  dispatch({ type: "END_TOURNAMENT" });
                }
              }}
              style={{ borderColor: C.red, color: C.red, background: C.rBg, padding: "10px 20px", fontSize: 14, fontWeight: 500 }}
            >
              End tournament
            </Btn>
          </Card>
        </div>
      )}
    </div>
  );
}

// Shell — layout, tab bar, banners, timeout, auto-push ELO, backup
const ELAPSED_POLL_MS  = 10_000; // how often the elapsed-time display updates
const TIMEOUT_POLL_MS  = 30_000; // how often to check the tournament timeout wall-clock
const STATUS_CLEAR_MS  =  5_000; // how long a successful sync status message stays visible
const STATUS_ERROR_MS  =  8_000; // how long an error sync status message stays visible
function Shell({ state, dispatch, eloLoadedCols, eloColOptions }) {
  const rawConfig = state.tournaments?.[state.tournamentId];
  if (!rawConfig) return null;
  const config = { ...rawConfig, features: { ...state.globalSettings, ...rawConfig.features, ...state.featureOverrides } };
  const cfg = config.features,
    activePlayers = state.players.filter((p) => !p.eliminated),
    go = state.tournamentStarted && isGameOver(cfg.scoring, activePlayers);
  const [el, setEl] = useState("");
  const [timedOut, setTimedOut] = useState(false);
  const [syncStatus, setSyncStatus] = useState("");
  useEffect(() => {
    if (!state.startedAt || !state.tournamentStarted) return;
    const updateElapsed = () => {
      const elapsed = Date.now() - state.startedAt,
        minutes = Math.floor(elapsed / 60000);
      setEl(`${Math.floor(minutes / 60)}h ${minutes % 60}m`);
    };
    updateElapsed();
    const i = setInterval(updateElapsed, ELAPSED_POLL_MS);
    return () => clearInterval(i);
  }, [state.startedAt, state.tournamentStarted]);
  // timeoutFired ref prevents the timeout from triggering more than once per session,
  // even if the effect re-runs due to state changes after the timeout is reached.
  const timeoutFired = useRef(false);
  useEffect(() => {
    if (!state.tournamentStarted || !cfg.timeout || !cfg.timeoutTime || timedOut) return;
    const check = () => {
      if (timeoutFired.current) return;
      // cfg.timeoutTime is a wall-clock "HH:MM" string — compare against today's date.
      const [h, m] = (cfg.timeoutTime || "").split(":").map(Number);
      if (isNaN(h) || isNaN(m)) return;
      const now = new Date(),
        target = new Date(now);
      target.setHours(h, m, 0, 0);
      // If the tournament started after the target time, skip (timeout is for "before" a cutoff).
      if (state.startedAt) {
        const started = new Date(state.startedAt);
        if (started >= target) return;
      }
      if (now >= target) {
        setTimedOut(true);
        timeoutFired.current = true;
        dispatch({
          type: "LOG_EVENT",
          eventType: "tournament-timeout",
          label: `Timeout reached — ${cfg.timeoutTime}`,
        });
      }
    };
    check();
    const i = setInterval(check, TIMEOUT_POLL_MS);
    return () => clearInterval(i);
  }, [state.tournamentStarted, cfg.timeout, cfg.timeoutTime, timedOut, dispatch, state.startedAt]);
  // Local backup: write the current tournament state to localStorage on every relevant change.
  // Intentionally duplicates the buildSnap() structure inline rather than calling buildSnap()
  // because this backup runs synchronously on every render and must stay lightweight.
  // buildSnap() is used for remote seed saves which are async and less frequent.
  useEffect(() => {
    if (!state.players.length) return;
    saveLS(LS_BACKUP + "_" + state.tournamentId, {
      state: {
        players: state.players,
        currentRound: state.currentRound,
        phase: state.phase,
        pairings: state.pairings,
        history: state.history,
        matchLog: state.matchLog,
        startedAt: state.startedAt,
        draftEnded: state.draftEnded,
      },
      tournamentStarted: state.tournamentStarted,
      tournamentMode: state.tournamentId,
      prizes: state.prizes,
      ranks: state.ranks,
      featureOverrides: state.featureOverrides,
      savedAt: Date.now(),
    });
    try { localStorage.setItem(LS_BACKUP_LAST, state.tournamentId); } catch {}
  }, [state.players, state.pairings, state.currentRound, state.tournamentStarted, state.history, state.matchLog, state.draftEnded]);
  // Auto-push ELO to Google Sheets after each completed round.
  // lastPushedRound tracks history.length at last push so this only fires once per new round,
  // not on every state change that happens to re-render Shell.
  const lastPushedRound = useRef(0);
  useEffect(() => {
    if (
      !state.tournamentStarted ||
      state.history.length === 0 ||
      state.history.length <= lastPushedRound.current
    )
      return;
    lastPushedRound.current = state.history.length;
    const url = state.sheetsUrl;
    if (!url) return;
    setSyncStatus("syncing");
    const eloEntries = Object.values(state.eloDb)
      .flatMap((sheet) => Object.values(sheet || {}))
      .filter((v) => v?.name)
      .map((v) => ({ name: v.name, elo: v.elo, test: !!v.test }));
    fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "save", test: false, entries: eloEntries }),
    })
      .then(() => {
        setSyncStatus("synced");
        setTimeout(() => setSyncStatus(""), STATUS_CLEAR_MS);
      })
      .catch(() => {
        setSyncStatus("error");
        setTimeout(() => setSyncStatus(""), STATUS_ERROR_MS);
      });
  }, [state.history.length]);
  useEffect(() => {
    const h = (e) => {
      if (!state.tournamentStarted) return;
      e.preventDefault();
      e.returnValue = "";
    };
    window.addEventListener("beforeunload", h);
    return () => window.removeEventListener("beforeunload", h);
  }, [state.tournamentStarted]);
  const tabs = [
    cfg.rules && { id: "rules", label: "Rules" },
    { id: "players", label: "Players" },
    { id: "matches", label: "Matches", disabled: !state.tournamentStarted },
    { id: "settings", label: "Settings" },
    state.testMode && { id: "test", label: "🧪 Test", color: C.red },
    state.experimental && { id: "spinner", label: "🎲 Spinner", color: C.purple },
    state.advancedSetup && { id: "advanced", label: "⚙ Advanced" },
  ].filter(Boolean);
  let banner = null;
  if (!state.tournamentStarted)
    banner = (
      <div
        style={{
          background: C.aBg,
          color: C.amber,
          border: `0.5px solid ${C.aBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
        }}
      >
        ⚠ Not started. Add players and press Start.
      </div>
    );
  else if (go)
    banner = (
      <div
        style={{
          background: C.bBg,
          color: C.blue,
          border: `0.5px solid ${C.bBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
        }}
      >
        🏆 Over{activePlayers[0] ? ` — ${activePlayers[0].name} wins!` : "."}
      </div>
    );
  else
    banner = (
      <div
        style={{
          background: C.gBg,
          color: C.green,
          border: `0.5px solid ${C.gBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
          display: "flex",
          justifyContent: "space-between",
          flexWrap: "wrap",
          gap: 8,
        }}
      >
        <span>
          🟢 R{state.currentRound} · {state.phase === "roundrobin" ? "RR" : "Swiss"} · {activePlayers.length}p
          · {cfg.scoring}
        </span>
        <span style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {syncStatus === "syncing" && (
            <span style={{ fontSize: 11, opacity: 0.7 }}>⟳ syncing…</span>
          )}
          {syncStatus === "synced" && <span style={{ fontSize: 11, opacity: 0.7 }}>☁ synced</span>}
          {syncStatus === "error" && (
            <span style={{ fontSize: 11, color: C.red, opacity: 0.9 }}>⚠ sync failed</span>
          )}
          {el && <span style={{ fontSize: 12, opacity: 0.75 }}>⏱ {el}</span>}
        </span>
      </div>
    );
  const timeoutBanner = timedOut ? (
    <div
      style={{
        background: C.rBg,
        color: C.red,
        border: `0.5px solid ${C.red}`,
        borderRadius: 8,
        padding: "8px 14px",
        marginBottom: 16,
        fontSize: 13,
        fontWeight: 600,
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
      }}
    >
      <span>⏰ Tournament timeout — {cfg.timeoutTime} has passed</span>
      <span style={{ fontSize: 11, fontWeight: 400, opacity: 0.7 }}>Finish the current round</span>
    </div>
  ) : null;
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ fontSize: 18, fontWeight: 500, margin: 0 }}>
          {config.icon} {config.name}
        </h2>
      </div>
      {banner}
      {timeoutBanner}
      <TabBar
        tabs={tabs}
        active={state.activeTab}
        onSelect={(id) => dispatch({ type: "SET_TAB", tab: id })}
      />
      {state.activeTab === "rules" && cfg.rules && <RulesTab state={state} />}
      {state.activeTab === "players" && (
        <PlayersTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.activeTab === "matches" && (
        <MatchesTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.activeTab === "settings" && (
        <SettingsTab state={state} dispatch={dispatch} config={config} />
      )}
      {state.activeTab === "advanced" && state.advancedSetup && (
        <AdvancedTab state={state} dispatch={dispatch} config={config} eloColOptions={eloColOptions} />
      )}
      {state.activeTab === "test" && state.testMode && (
        <TestTab state={state} dispatch={dispatch} />
      )}
      {state.activeTab === "spinner" && state.experimental && (
        <SpinnerTab state={state} dispatch={dispatch} />
      )}
    </div>
  );
}

// App root — reducer, auto-sync ELO from Sheets on mount, auto-restore backup
function App() {
  const [state, dispatch] = useReducer(reducer, init);
  const [loading, setLoading] = useState(true);
  const [fetchError, setFetchError] = useState(null);
  const [eloLoadedCols, setEloLoadedCols] = useState({});
  const [eloColOptions, setEloColOptions] = useState([]);
  const fetchTournaments = (url) => {
    const u = url || getSheetsUrl();
    if (!u) { setLoading(false); return; }
    setLoading(true);
    setFetchError(null);
    fetch(u + "?action=global_settings")
      .then((r) => r.json())
      .then((d) => { if (d?.settings) dispatch({ type: "SET_GLOBAL_SETTINGS", settings: d.settings }); })
      .catch(() => {});
    fetch(u + "?action=tournament_list")
      .then((r) => r.json())
      .then((d) => {
        if (d?.tournaments?.length) {
          dispatch({ type: "SET_TOURNAMENTS", tournaments: d.tournaments });
          const configuredCols = [...new Set(d.tournaments.map((t) => t.features?.eloDB).filter(Boolean))];
          const loadEloCols = (cols) => cols.forEach((col) => {
            fetch(u + "?action=load&col=" + encodeURIComponent(col))
              .then((r) => r.json())
              .then((ed) => {
                if (ed?.entries) {
                  const db = {};
                  ed.entries.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = { elo: parseInt(e.elo), name: e.name, test: !!e.test }; });
                  dispatch({ type: "SET_ELO_DB", db, col });
                  setEloLoadedCols((prev) => ({ ...prev, [col]: true }));
                }
              })
              .catch(() => {});
          });
          fetch(u + "?action=elo_cols")
            .then((r) => r.json())
            .then((cd) => {
              if (cd?.cols?.length) {
                setEloColOptions(cd.cols);
                const toLoad = configuredCols.length > 0 ? configuredCols : cd.cols;
                loadEloCols(toLoad);
              }
            })
            .catch(() => {
              if (configuredCols.length > 0) loadEloCols(configuredCols);
            });
        } else if (d?.error) {
          setFetchError("Script error: " + d.error);
        } else {
          setFetchError("Settings sheet is empty — add tournament rows to the sheet.");
        }
      })
      .catch((err) => setFetchError("Fetch failed: " + (err?.message || "network error")))
      .finally(() => setLoading(false));
  };
  useEffect(() => { fetchTournaments(); }, []);
  const prevEloCol = useRef(null);
  useEffect(() => {
    const col = state.featureOverrides?.eloDB;
    if (!col || col === prevEloCol.current || state.eloDb?.[col]) return;
    prevEloCol.current = col;
    const u = getSheetsUrl();
    if (!u) return;
    fetch(u + "?action=load&col=" + encodeURIComponent(col))
      .then((r) => r.json())
      .then((ed) => {
        if (ed?.entries) {
          const db = {};
          ed.entries.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = { elo: parseInt(e.elo), name: e.name, test: !!e.test }; });
          dispatch({ type: "SET_ELO_DB", db, col });
          setEloLoadedCols((prev) => ({ ...prev, [col]: true }));
        }
      })
      .catch(() => {});
  }, [state.featureOverrides?.eloDB]);
  useEffect(() => {
    if (!state.tournamentStarted || !state.players.length) return;
    const t = setTimeout(() => autoSeedSave(state), 2000);
    return () => clearTimeout(t);
  }, [state.pairings, state.history, state.players, state.currentRound, state.phase]);
  const restored = useRef(false);
  useEffect(() => {
    if (restored.current) return;
    restored.current = true;
    try {
      const lastId = localStorage.getItem(LS_BACKUP_LAST);
      const raw = lastId ? localStorage.getItem(LS_BACKUP + "_" + lastId) : null;
      if (!raw) return;
      const snap = JSON.parse(raw);
      if (snap?.tournamentStarted && snap?.state?.players?.length) {
        if (
          confirm(
            `Restore tournament in progress?\n${snap.state.players.length} players, round ${snap.state.currentRound}`,
          )
        ) {
          dispatch({ type: "RESTORE_SNAPSHOT", snapshot: snap });
        } else {
          localStorage.removeItem(LS_BACKUP + "_" + lastId);
          localStorage.removeItem(LS_BACKUP_LAST);
        }
      }
    } catch {}
  }, []);
  if (loading)
    return (
      <div
        style={{
          fontFamily: "system-ui, -apple-system, sans-serif",
          background: C.bg,
          color: C.text,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          minHeight: "100vh",
          gap: 12,
        }}
      >
        <div style={{ fontSize: 32 }}>🏆</div>
        <div style={{ fontSize: 14, color: C.muted }}>Loading…</div>
      </div>
    );
  return (
    <div
      style={{
        fontFamily: "system-ui, -apple-system, sans-serif",
        background: C.bg,
        color: C.text,
        padding: 16,
        maxWidth: 950,
        margin: "0 auto",
        minHeight: "100vh",
      }}
    >
      {state.screen === "landing" && <LandingScreen dispatch={dispatch} tournaments={state.tournaments} onRetry={fetchTournaments} fetchError={fetchError} />}
      {state.screen === "tournament" && <Shell state={state} dispatch={dispatch} eloLoadedCols={eloLoadedCols} eloColOptions={eloColOptions} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
