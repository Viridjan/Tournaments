                              {x.qty > 1 ? x.qty + "× " : ""}
                              {x.name}
                            </span>
                          ))}
                        </div>
                      ) : i === 0 ? (
                        <Tag variant="green">Leader</Tag>
                      ) : null}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {prizeCalc && (
            <div style={{ fontSize: 11, color: C.muted, marginTop: 8, textAlign: "right" }}>
              Prize pool: €{prizeCalc.totalPool.toFixed(2)} · Allocated: €{prizeCalc.grandTotal.toFixed(2)}
            </div>
          )}
      </Card>
    </div>
  );
}

// Sub-tabs: Draft (groups) | Pairings (cards) | Log (history)
// Matches tab — pairing cards, match log, timer, draft sub-tabs
function MatchCard({ match, index, dispatch, scoring, eloDb, extraPoints, extraPointsValue }) {
  if (match.isBye)
    return (
      <Card variant="bye">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>{match.players[0]}</div>
          <Tag variant="grey">BYE</Tag>
        </div>
      </Card>
    );

  if (scoring === "points") {
    return (
      <Card variant="compact">
        <div style={S.matchLabel}>
          Match {index + 1} · {match.players.length}p
          {match.rematch && <> <Tag variant="amber">re</Tag></>}
        </div>
        {match.players.map((n) => {
          const epC = match.extraPoints?.[n] || 0;
          return (
            <div
              key={n}
              style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: `0.5px solid ${C.bL}` }}
            >
              <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{n}</span>
              <span style={{ fontSize: 11, color: C.faint }}>{getElo(eloDb, n)}</span>
              <input
                type="text"
                inputMode="numeric"
                placeholder="—"
                value={match.scores[n] ?? ""}
                onChange={(e) => dispatch({ type: "SET_MATCH_SCORE", index, player: n, value: e.target.value })}
                style={S.inputSm}
              />
              {extraPoints && (
                <button
                  onClick={() => dispatch({ type: "ADD_EXTRA_POINTS", index, player: n, delta: extraPointsValue || 1 })}
                  style={{ fontSize: 11, padding: "3px 0", width: 36, textAlign: "center", background: epC ? C.aBg : "transparent", border: `0.5px solid ${epC ? C.aBd : "#ddd"}`, borderRadius: 5, cursor: "pointer", color: epC ? C.amber : C.muted, fontFamily: "inherit", flexShrink: 0 }}
                >
                  {epC ? "EP" : "+EP"}
                </button>
              )}
            </div>
          );
        })}
      </Card>
    );
  }

  // swiss / lifepoints: winner-selection UI
  const [p1, p2] = match.players;
  const sc = match.scores;
  const isDone = match.result === "done";
  const p1Score = sc[p1], p2Score = sc[p2];
  const sel = !isDone ? null : p1Score > p2Score ? "p1" : p2Score > p1Score ? "p2" : "draw";

  if (match.players.length === 2) {
    const btnStyle = (active, t) => ({
      flex: 1, display: "flex", flexDirection: "column", padding: "6px 8px", borderRadius: 5,
      cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 500, lineHeight: 1.3,
      border: `0.5px solid ${active ? (t === "d" ? C.aBd : C.gBd) : "#ddd"}`,
      background: active ? (t === "d" ? C.aBg : C.gBg) : "transparent",
      color: active ? (t === "d" ? C.amber : C.green) : C.muted,
      textAlign: t === "r" ? "right" : t === "d" ? "center" : "left",
      alignItems: t === "r" ? "flex-end" : t === "d" ? "center" : "flex-start",
    });
    const pick = (result) => {
      if (isDone && sel === result) {
        dispatch({ type: "SET_MATCH_RESULT", index, reset: true });
        return;
      }
      const scores = result === "p1" ? { [p1]: 1, [p2]: 0 } : result === "p2" ? { [p1]: 0, [p2]: 1 } : { [p1]: 0.5, [p2]: 0.5 };
      dispatch({ type: "SET_MATCH_RESULT", index, scores });
    };
    const mkEpBtn = (n) => {
      const epC = match.extraPoints?.[n] || 0;
      return (
        <button
          onClick={() => dispatch({ type: "ADD_EXTRA_POINTS", index, player: n, delta: extraPointsValue || 1 })}
          style={{ fontSize: 11, width: 36, textAlign: "center", background: epC ? C.aBg : "transparent", border: `0.5px solid ${epC ? C.aBd : "#ddd"}`, borderRadius: 5, cursor: "pointer", color: epC ? C.amber : C.muted, fontFamily: "inherit", flexShrink: 0, alignSelf: "stretch", display: "flex", alignItems: "center", justifyContent: "center" }}
        >
          {epC ? "EP" : "+EP"}
        </button>
      );
    };
    return (
      <Card variant="compact">
        <div style={{ display: "flex", gap: 4, alignItems: "stretch" }}>
          {extraPoints && mkEpBtn(p1)}
          <button style={{ ...btnStyle(sel === "p1", "l"), flex: 2 }} onClick={() => pick("p1")}>
            <span>{p1}{match.rematch && <> <Tag variant="amber">re</Tag></>}</span>
          </button>
          <button style={{ ...btnStyle(sel === "draw", "d"), flex: 1 }} onClick={() => pick("draw")}>draw</button>
          <button style={{ ...btnStyle(sel === "p2", "r"), flex: 2 }} onClick={() => pick("p2")}>
            <span>{p2}</span>
          </button>
          {extraPoints && mkEpBtn(p2)}
        </div>
      </Card>
    );
  }

  // N-player swiss/lifepoints: tap to select winner(s), tap again to deselect
  const winners = match.players.filter(n => sc[n] === 1);
  const toggle = (name) => {
    const newWinners = winners.includes(name) ? winners.filter(x => x !== name) : [...winners, name];
    if (!newWinners.length) { dispatch({ type: "SET_MATCH_RESULT", index, reset: true }); return; }
    const scores = Object.fromEntries(match.players.map(n => [n, newWinners.includes(n) ? (newWinners.length > 1 ? 0.5 : 1) : 0]));
    dispatch({ type: "SET_MATCH_RESULT", index, scores });
  };
  return (
    <Card style={{ padding: "10px 14px" }}>
      <div style={S.matchLabel}>
        Match {index + 1} · {match.players.length}p
        {match.rematch && <> <Tag variant="amber">re</Tag></>}
      </div>
      {match.players.map((n) => {
        const isWinner = sc[n] === 1, isDraw = sc[n] === 0.5;
        const epC = match.extraPoints?.[n] || 0;
        return (
          <div key={n} style={{ display: "flex", gap: 4, marginBottom: 4 }}>
            <button
              onClick={() => toggle(n)}
              style={{
                display: "flex", alignItems: "center", flex: 1, gap: 8, padding: "7px 8px",
                borderRadius: 5, cursor: "pointer", fontFamily: "inherit", textAlign: "left",
                border: `0.5px solid ${isWinner ? C.gBd : isDraw ? C.aBd : "#ddd"}`,
                background: isWinner ? C.gBg : isDraw ? C.aBg : "transparent",
                color: isWinner ? C.green : isDraw ? C.amber : C.text,
                fontWeight: isWinner || isDraw ? 600 : 400, fontSize: 13,
              }}
            >
              <span style={{ flex: 1 }}>{n}</span>
              <span style={{ fontSize: 11, color: C.faint }}>{getElo(eloDb, n)}</span>
              {isWinner && <span style={{ fontSize: 11 }}>Win</span>}
              {isDraw && <span style={{ fontSize: 11 }}>Draw</span>}
            </button>
            {extraPoints && (
              <button
                onClick={() => dispatch({ type: "ADD_EXTRA_POINTS", index, player: n, delta: extraPointsValue || 1 })}
                style={{ fontSize: 11, padding: "0", width: 36, textAlign: "center", background: epC ? C.aBg : "transparent", border: `0.5px solid ${epC ? C.aBd : "#ddd"}`, borderRadius: 5, cursor: "pointer", color: epC ? C.amber : C.muted, fontFamily: "inherit", flexShrink: 0 }}
              >
                {epC ? "EP" : "+EP"}
              </button>
            )}
          </div>
        );
      })}
    </Card>
  );
}
function ML({ state }) {
  let ri = 0;
  if (!state.matchLog.length)
    return <div style={{ textAlign: "center", padding: 32, color: C.faint }}>No activity.</div>;
  const roundHeader = (label, ts) => (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 4px 8px", marginBottom: 4 }}>
      <h3 style={{ fontSize: 15, fontWeight: 500, margin: 0 }}>{label}</h3>
      <span style={{ fontSize: 11, color: C.faint }}>{ts}</span>
    </div>
  );
  return (
    <div>
      {state.matchLog.map((ev, ei) => {
        if (ev.type === "round") {
          const rd = state.history[ri++];
          if (!rd) return null;
          const isMulti = rd.some((m) => !m.isBye && m.players.length > 2);
          if (isMulti) {
            return (
              <div key={ei} style={{ marginBottom: 16 }}>
                {roundHeader(ev.label, ev.ts)}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {rd.map((m, mi) => (
                    <Card key={mi} style={{ marginBottom: 0 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: C.purple, marginBottom: 6 }}>
                        Table {mi + 1} · {m.players.length}p
                      </div>
                      {m.players.map((n) => (
                        <div key={n} style={{ fontSize: 13, padding: "4px 0", display: "flex", justifyContent: "space-between", borderBottom: `0.5px solid ${C.bL}` }}>
                          <span style={{ fontWeight: 500 }}>{n}</span>
                          <span style={{ color: C.muted }}>
                            {m.scores[n] != null && m.scores[n] !== "" ? `${m.scores[n]}pt` : "—"}
                            {(m.extraPoints?.[n] || 0) > 0 && (
                              <span style={{ color: C.green, fontWeight: 500, fontSize: 11, marginLeft: 4 }}>+EP</span>
                            )}
                            {m.eloDeltas?.[n] != null && (
                              <span style={{ color: m.eloDeltas[n] > 0 ? C.green : m.eloDeltas[n] < 0 ? C.red : C.muted, fontWeight: 500, fontSize: 11, marginLeft: 4 }}>
                                {m.eloDeltas[n] > 0 ? "+" : ""}{m.eloDeltas[n]}
                              </span>
                            )}
                          </span>
                        </div>
                      ))}
                    </Card>
                  ))}
                </div>
              </div>
            );
          }
          return (
            <div key={ei} style={{ marginBottom: 16 }}>
              {roundHeader(ev.label, ev.ts)}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {rd.map((m, mi) => {
                  if (m.isBye)
                    return (
                      <Card key={mi} style={{ marginBottom: 0, fontSize: 13 }}>
                        {m.players[0]} — <Tag variant="grey">BYE</Tag>
                      </Card>
                    );
                  const [p1, p2] = m.players;
                  const s1 = parseFloat(m.scores[p1] || 0), s2 = parseFloat(m.scores[p2] || 0);
                  const isDraw = s1 === s2 && m.result === "done";
                  const w = !isDraw ? (s1 > s2 ? p1 : p2) : null;
                  const l = !isDraw ? (s1 > s2 ? p2 : p1) : null;
                  const winnerDelta = w && m.eloDeltas?.[w];
                  return (
                    <Card key={mi} style={{ marginBottom: 0 }}>
                      <div style={{ fontSize: 13, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
                        <span style={{ fontWeight: 500, color: isDraw ? C.text : C.green }}>{w || p1}</span>
                        <span style={{ color: C.muted }}>{l || p2}</span>
                        {winnerDelta != null && (
                          <span style={{ fontSize: 11, fontWeight: 500, color: winnerDelta > 0 ? C.green : winnerDelta < 0 ? C.red : C.muted }}>
                            {winnerDelta > 0 ? "+" : ""}{winnerDelta}
                          </span>
                        )}
                        {isDraw && <span style={{ color: C.amber, fontWeight: 500, fontSize: 11 }}>Draw</span>}
                        {m.players.some(n => (m.extraPoints?.[n] || 0) > 0) && (
                          <span style={{ color: C.green, fontWeight: 500, fontSize: 11 }}>
                            EP: {m.players.filter(n => (m.extraPoints?.[n] || 0) > 0).join(", ")}
                          </span>
                        )}
                        {m.rematch && <Tag variant="amber">re</Tag>}
                        {m.forfeit && <Tag variant="amber">forfeit</Tag>}
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>
          );
        }
        const icons = { start: "🏁", abandon: "⚑", "draft-end": "📋", "tournament-timeout": "⏰" },
          bg = { start: C.gBg, abandon: C.aBg, "draft-end": C.bBg, "tournament-timeout": C.rBg },
          colors = { start: C.green, abandon: C.amber, "draft-end": C.blue, "tournament-timeout": C.red };
        return (
          <div key={ei} style={{ background: bg[ev.type] || C.subtle, borderRadius: 8, padding: "8px 12px", marginBottom: 12, display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 500, color: colors[ev.type] || C.text }}>
              {icons[ev.type] || "•"} {ev.label}
            </span>
            <span style={{ fontSize: 11, color: C.faint }}>{ev.ts}</span>
          </div>
        );
      })}
    </div>
  );
}

function MatchesTab({ state, dispatch, config, eloLoadedCols }) {

              <Btn
                onClick={() => {
                  const u = state.pairings.filter((m) => !m.isBye && m.result !== "done");
                  if (u.length && !confirm(`${u.length} unresolved.`)) return;
                  dispatch({ type: "NEXT_ROUND" });

            <div

                gridTemplateColumns: "2fr 1fr 2fr",

                marginBottom: 6,
                padding: "0 14px",

          ))}
        </div>
      )}
      {state.matchSubTab === "standings" && (
        <StandingsTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.matchSubTab === "log" && <ML state={state} />}

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

            <Card>
              <h3 style={S.cardTitle}>New session ＋</h3>
              <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>
                Resets the round counter to 1 and generates fresh pairings, but keeps all match history. GP scoring continues across sessions — the sliding window runs over all rounds ever played.
              </div>
              <Btn
                onClick={() => {

                }}
                style={{ borderColor: C.aBd, color: C.amber, background: C.aBg, padding: "10px 20px", fontSize: 14, fontWeight: 500 }}
              >
                New session ＋
              </Btn>
            </Card>
          )}

            <h3 style={S.cardTitle}>End tournament</h3>
            <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>

              }}
              style={{ borderColor: C.red, color: C.red, background: C.rBg, padding: "10px 20px", fontSize: 14, fontWeight: 500 }}
            >
              End tournament
            </Btn>
          </Card>
        </div>
      )}
    </div>
  );
}

// Shell — layout, tab bar, banners, timeout, auto-push ELO, backup
function Shell({ state, dispatch, eloLoadedCols, eloColOptions }) {
  const rawConfig = state.tournaments?.[state.tournamentId];
  if (!rawConfig) return null;
  const config = { ...rawConfig, features: { ...rawConfig.features, ...state.featureOverrides } };
  const cfg = config.features,
    activePlayers = state.players.filter((p) => !p.eliminated),
    go = state.tournamentStarted && cfg.scoring === "lifepoints" && activePlayers.length <= 1;
  const [el, setEl] = useState("");
  const [timedOut, setTimedOut] = useState(false);
  const [syncStatus, setSyncStatus] = useState("");
  useEffect(() => {
    if (!state.startedAt || !state.tournamentStarted) return;
    const u = () => {
      const ms = Date.now() - state.startedAt,
        m = Math.floor(ms / 60000);
      setEl(`${Math.floor(m / 60)}h ${m % 60}m`);
    };
    u();
    const i = setInterval(u, 10000);
    return () => clearInterval(i);
  }, [state.startedAt, state.tournamentStarted]);
  const timeoutFired = useRef(false);
  useEffect(() => {
    if (!state.tournamentStarted || !cfg.timeout || !cfg.timeoutTime || timedOut) return;
    const check = () => {
      if (timeoutFired.current) return;
      const [h, m] = (cfg.timeoutTime || "").split(":").map(Number);
      if (isNaN(h) || isNaN(m)) return;
      const n = new Date(),
        target = new Date(n);
      target.setHours(h, m, 0, 0);
      if (state.startedAt) {
        const started = new Date(state.startedAt);
        if (started >= target) return;
      }
      if (n >= target) {
        setTimedOut(true);
        timeoutFired.current = true;
        dispatch({
          type: "LOG_EVENT",
          eventType: "tournament-timeout",
          label: `Timeout reached — ${cfg.timeoutTime}`,
        });
      }
    };
    check();
    const i = setInterval(check, 30000);
    return () => clearInterval(i);
  }, [state.tournamentStarted, cfg.timeout, cfg.timeoutTime, timedOut, dispatch, state.startedAt]);
  useEffect(() => {
    if (!state.players.length) return;
    saveLS(BK + "_" + state.tournamentId, {
      state: {
        players: state.players,
        currentRound: state.currentRound,
        phase: state.phase,
        pairings: state.pairings,
        history: state.history,
        matchLog: state.matchLog,
        startedAt: state.startedAt,
      },
      tournamentStarted: state.tournamentStarted,
      tournamentMode: state.tournamentId,
      prizes: state.prizes,
      ranks: state.ranks,
      entryCost: state.entryCost,
      prizePct: state.prizePct,
      prizePctRoundUp: state.prizePctRoundUp,
      roundUpPct: state.roundUpPct,
      roundUpPctRoundUp: state.roundUpPctRoundUp,
      featureOverrides: state.featureOverrides,
      savedAt: Date.now(),
    });
    try { localStorage.setItem(BK_LAST, state.tournamentId); } catch {}
  }, [state.players, state.pairings, state.currentRound, state.tournamentStarted, state.history]);
  const lastPushedRound = useRef(0);
  useEffect(() => {
    if (
      !state.tournamentStarted ||
      state.history.length === 0 ||
      state.history.length <= lastPushedRound.current
    )
      return;
    lastPushedRound.current = state.history.length;
    const url = state.sheetsUrl;
    if (!url) return;
    setSyncStatus("syncing");
    const ent = Object.values(state.eloDb)
      .filter((v) => v?.name)
      .map((v) => ({ name: v.name, elo: v.elo, test: !!v.test }));
    fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "save", test: false, entries: ent }),
    })
      .then(() => {
        setSyncStatus("synced");
        setTimeout(() => setSyncStatus(""), 5000);
      })
      .catch(() => {
        setSyncStatus("error");
        setTimeout(() => setSyncStatus(""), 8000);
      });
  }, [state.history.length]);
  useEffect(() => {
    const h = (e) => {
      if (!state.tournamentStarted) return;
      e.preventDefault();
      e.returnValue = "";
    };
    window.addEventListener("beforeunload", h);
    return () => window.removeEventListener("beforeunload", h);
  }, [state.tournamentStarted]);
  const tabs = [
    cfg.rules && { id: "rules", label: "Rules" },
    { id: "players", label: "Players" },
    { id: "matches", label: "Matches", disabled: !state.tournamentStarted },
    { id: "settings", label: "Settings" },
    state.testMode && { id: "test", label: "🧪 Test", color: C.red },
    state.experimental && { id: "spinner", label: "🎲 Spinner", color: C.purple },
    state.advancedSetup && { id: "advanced", label: "⚙ Advanced" },
  ].filter(Boolean);
  let banner = null;
  if (!state.tournamentStarted)
    banner = (
      <div
        style={{
          background: C.aBg,
          color: C.amber,
          border: `0.5px solid ${C.aBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
        }}
      >
        ⚠ Not started. Add players and press Start.
      </div>
    );
  else if (go)
    banner = (
      <div
        style={{
          background: C.bBg,
          color: C.blue,
          border: `0.5px solid ${C.bBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
        }}
      >
        🏆 Over{activePlayers[0] ? ` — ${activePlayers[0].name} wins!` : "."}
      </div>
    );
  else
    banner = (
      <div
        style={{
          background: C.gBg,
          color: C.green,
          border: `0.5px solid ${C.gBd}`,
          borderRadius: 8,
          padding: "8px 14px",
          marginBottom: 16,
          fontSize: 13,
          fontWeight: 500,
          display: "flex",
          justifyContent: "space-between",
          flexWrap: "wrap",
          gap: 8,
        }}
      >
        <span>
          🟢 R{state.currentRound} · {state.phase === "roundrobin" ? "RR" : "Swiss"} · {activePlayers.length}p
          · {cfg.scoring}
        </span>
        <span style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {syncStatus === "syncing" && (
            <span style={{ fontSize: 11, opacity: 0.7 }}>⟳ syncing…</span>
          )}
          {syncStatus === "synced" && <span style={{ fontSize: 11, opacity: 0.7 }}>☁ synced</span>}
          {syncStatus === "error" && (
            <span style={{ fontSize: 11, color: C.red, opacity: 0.9 }}>⚠ sync failed</span>
          )}
          {el && <span style={{ fontSize: 12, opacity: 0.75 }}>⏱ {el}</span>}
        </span>
      </div>
    );
  const timeoutBanner = timedOut ? (
    <div
      style={{
        background: C.rBg,
        color: C.red,
        border: `0.5px solid ${C.red}`,
        borderRadius: 8,
        padding: "8px 14px",
        marginBottom: 16,
        fontSize: 13,
        fontWeight: 600,
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
      }}
    >
      <span>⏰ Tournament timeout — {cfg.timeoutTime} has passed</span>
      <span style={{ fontSize: 11, fontWeight: 400, opacity: 0.7 }}>Finish the current round</span>
    </div>
  ) : null;
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ fontSize: 18, fontWeight: 500, margin: 0 }}>
          {config.icon} {config.name}
        </h2>
      </div>
      {banner}
      {timeoutBanner}
      <TabBar
        tabs={tabs}
        active={state.activeTab}
        onSelect={(id) => dispatch({ type: "SET_TAB", tab: id })}
      />
      {state.activeTab === "rules" && cfg.rules && <RulesTab state={state} />}
      {state.activeTab === "players" && (
        <PlayersTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.activeTab === "matches" && (
        <MatchesTab state={state} dispatch={dispatch} config={config} eloLoadedCols={eloLoadedCols} />
      )}
      {state.activeTab === "settings" && (
        <SettingsTab state={state} dispatch={dispatch} config={config} />
      )}
      {state.activeTab === "advanced" && state.advancedSetup && (
        <AdvancedTab state={state} dispatch={dispatch} config={config} eloColOptions={eloColOptions} />
      )}
      {state.activeTab === "test" && state.testMode && (
        <TestTab state={state} dispatch={dispatch} />
      )}
      {state.activeTab === "spinner" && state.experimental && (
        <SpinnerTab state={state} dispatch={dispatch} />
      )}
    </div>
  );
}

// App root — reducer, auto-sync ELO from Sheets on mount, auto-restore backup
function App() {
  const [state, dispatch] = useReducer(reducer, init);
  const [loading, setLoading] = useState(true);
  const [fetchError, setFetchError] = useState(null);
  const [eloLoadedCols, setEloLoadedCols] = useState({});
  const [eloColOptions, setEloColOptions] = useState([]);
  const fetchTournaments = (url) => {
    const u = url || getSheetsUrl();
    if (!u) { setLoading(false); return; }
    setLoading(true);
    setFetchError(null);
    fetch(u + "?action=tournament_list")
      .then((r) => r.json())
      .then((d) => {
        if (d?.tournaments?.length) {
          dispatch({ type: "SET_TOURNAMENTS", tournaments: d.tournaments });
          const configuredCols = [...new Set(d.tournaments.map((t) => t.features?.eloDB).filter(Boolean))];
          const loadEloCols = (cols) => cols.forEach((col) => {
            fetch(u + "?action=load&col=" + encodeURIComponent(col))
              .then((r) => r.json())
              .then((ed) => {
                if (ed?.entries) {
                  const db = {};
                  ed.entries.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = { elo: parseInt(e.elo) || ED, name: e.name, test: !!e.test }; });
                  dispatch({ type: "SET_ELO_DB", db, col });
                  setEloLoadedCols((prev) => ({ ...prev, [col]: true }));
                }
              })
              .catch(() => {});
          });
          fetch(u + "?action=elo_cols")
            .then((r) => r.json())
            .then((cd) => {
              if (cd?.cols?.length) {
                setEloColOptions(cd.cols);
                const toLoad = configuredCols.length > 0 ? configuredCols : cd.cols;
                loadEloCols(toLoad);
              }
            })
            .catch(() => {
              if (configuredCols.length > 0) loadEloCols(configuredCols);
            });
        } else if (d?.error) {
          setFetchError("Script error: " + d.error);
        } else {
          setFetchError("Settings sheet is empty — add tournament rows to the sheet.");
        }
      })
      .catch((err) => setFetchError("Fetch failed: " + (err?.message || "network error")))
      .finally(() => setLoading(false));
  };
  useEffect(() => { fetchTournaments(); }, []);
  const prevEloCol = useRef(null);
  useEffect(() => {
    const col = state.featureOverrides?.eloDB;
    if (!col || col === prevEloCol.current || state.eloDb?.[col]) return;
    prevEloCol.current = col;
    const u = getSheetsUrl();
    if (!u) return;
    fetch(u + "?action=load&col=" + encodeURIComponent(col))
      .then((r) => r.json())
      .then((ed) => {
        if (ed?.entries) {
          const db = {};
          ed.entries.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = { elo: parseInt(e.elo) || ED, name: e.name, test: !!e.test }; });
          dispatch({ type: "SET_ELO_DB", db, col });
          setEloLoadedCols((prev) => ({ ...prev, [col]: true }));
        }
      })
      .catch(() => {});
  }, [state.featureOverrides?.eloDB]);
  useEffect(() => {
    if (!state.tournamentStarted || !state.players.length) return;
    const t = setTimeout(() => autoSeedSave(state), 2000);
    return () => clearTimeout(t);
  }, [state.pairings, state.history, state.players, state.currentRound, state.phase]);
  const restored = useRef(false);
  useEffect(() => {
    if (restored.current) return;
    restored.current = true;
    try {
      const lastId = localStorage.getItem(BK_LAST);
      const raw = lastId ? localStorage.getItem(BK + "_" + lastId) : null;
      if (!raw) return;
      const snap = JSON.parse(raw);
      if (snap?.tournamentStarted && snap?.state?.players?.length) {
        if (
          confirm(
            `Restore tournament in progress?\n${snap.state.players.length} players, round ${snap.state.currentRound}`,
          )
        ) {
          dispatch({ type: "RESTORE_SNAPSHOT", snapshot: snap });
        } else {
          localStorage.removeItem(BK + "_" + lastId);
          localStorage.removeItem(BK_LAST);
        }
      }
    } catch {}
  }, []);
  if (loading)
    return (
      <div
        style={{
          fontFamily: "system-ui, -apple-system, sans-serif",
          background: C.bg,
          color: C.text,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          minHeight: "100vh",
          gap: 12,
        }}
      >
        <div style={{ fontSize: 32 }}>🏆</div>
        <div style={{ fontSize: 14, color: C.muted }}>Loading…</div>
      </div>
    );
  return (
    <div
      style={{
        fontFamily: "system-ui, -apple-system, sans-serif",
        background: C.bg,
        color: C.text,
        padding: 16,
        maxWidth: 950,
        margin: "0 auto",
        minHeight: "100vh",
      }}
    >
      {state.screen === "landing" && <LandingScreen dispatch={dispatch} tournaments={state.tournaments} onRetry={fetchTournaments} fetchError={fetchError} />}
      {state.screen === "tournament" && <Shell state={state} dispatch={dispatch} eloLoadedCols={eloLoadedCols} eloColOptions={eloColOptions} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
