<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Manager</title>
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #f8f8f6; }</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useReducer,useEffect,useRef,useCallback,useMemo}=React;


const ED = 1000,
  EM = 50,
  ES = 500,
  EK = "tournament_elo_db_v2",
  SK = "tournament_sheets_url_v1",
  BK = "tournament_local_backup";
const DU =
  "https://script.google.com/macros/s/AKfycby_FEGovdBvl8oYWU1J40NXGdbQpL-B6wKaUTq4m1O9sb81s5pku3qjM6sGA0nFBWp6VQ/exec";

// ═══════════════════════════════════════════════════════
// Pure functions: ELO, pairing, scoring, prizes (no DOM, no state)
function eExp(a, b, scale) {
  return 1 / (1 + Math.pow(10, (b - a) / (scale || ES)));
}
function gE(d, n) {
  return d[n.toLowerCase()]?.elo ?? ED;
}
function sE(d, n, e, t) {
  return { ...d, [n.toLowerCase()]: { elo: e, name: n, test: !!t } };
}
function eCalc(a, b, s, kMax, scale) {
  const k = kMax || EM;
  const e = eExp(a, b, scale),
    r = k * (s - e),
    d = Math.round(Math.max(-k, Math.min(k, r)));
  return { dA: d, dB: -d };
}
function findMatch(names, prev, allow) {
  const n = names.length;
  if (!n) return [];
  if (n % 2) return null;
  const u = new Array(n).fill(false),
    p = [];
  function bt() {
    let i = u.indexOf(false);
    if (i === -1) return true;
    u[i] = true;
    for (let j = i + 1; j < n; j++) {
      if (u[j]) continue;
      if (!allow && (prev[names[i]] || new Set()).has(names[j])) continue;
      u[j] = true;
      p.push([i, j]);
      if (bt()) return true;
      p.pop();
      u[j] = false;
    }
    u[i] = false;
    return false;
  }
  return bt() ? p : null;
}
function getPrev(h, a) {
  const s = new Set(a.map((p) => p.name)),
    m = {};
  h.forEach((r) =>
    r.forEach((x) => {
      if (x.p2 === "BYE" || x.type === "multi") return;
      if (!s.has(x.p1) || !s.has(x.p2)) return;
      (m[x.p1] = m[x.p1] || new Set()).add(x.p2);
      (m[x.p2] = m[x.p2] || new Set()).add(x.p1);
    }),
  );
  return m;
}
function getByes(h, a) {
  const c = {};
  a.forEach((p) => (c[p.name] = 0));
  h.forEach((r) =>
    r.forEach((m) => {
      if (m.p2 === "BYE" && c[m.p1] !== undefined) c[m.p1]++;
    }),
  );
  return c;
}
function gen1v1(pl, h, ph, rr, db, fp) {
  const ac = pl.filter((p) => !p.eliminated),
    pr = getPrev(h, ac),
    bc = getByes(h, ac);
  const so = [...ac].sort((a, b) =>
    ph === "roundrobin"
      ? gE(db, b.name) - gE(db, a.name)
      : b.w / (b.w + b.d + b.l || 1) - a.w / (a.w + a.d + a.l || 1) || b.score - a.score,
  );
  let bn = null,
    tp = so;
  if (so.length % 2 === 1) {
    const mb = Math.min(...Object.values(bc));
    for (let i = so.length - 1; i >= 0; i--)
      if (bc[so[i].name] <= mb) {
        bn = so[i].name;
        break;
      }
    if (!bn) bn = so[so.length - 1].name;
    tp = so.filter((p) => p.name !== bn);
  }
  const pa = [];
  if (bn) pa.push({ p1: bn, p2: "BYE", result: "bye", rematch: false });
  const ns = tp.map((p) => p.name);
  let m = findMatch(ns, pr, false);
  if (!m) m = findMatch(ns, pr, true);
  if (m)
    for (const [i, j] of m)
      pa.push({ p1: ns[i], p2: ns[j], result: null, rematch: (pr[ns[i]] || new Set()).has(ns[j]) });
  if (fp) {
    const cm = {};
    pl.forEach((p) => (cm[p.name] = p.firstCount || 0));
    pa.forEach((mm) => {
      if (mm.p2 === "BYE") return;
      const c1 = cm[mm.p1] || 0,
        c2 = cm[mm.p2] || 0;
      if (c1 > c2 || (c1 === c2 && Math.random() < 0.5)) [mm.p1, mm.p2] = [mm.p2, mm.p1];
      cm[mm.p1] = (cm[mm.p1] || 0) + 1;
    });
  }
  return pa;
}
function genMulti(pl, mn, mx, db) {
  const ac = pl.filter((p) => !p.eliminated);
  ac.sort((a, b) => b.score - a.score || b.w - a.w || gE(db, b.name) - gE(db, a.name));
  const n = ac.length,
    g = [];
  if (n > 0 && n < mn) g.push(ac.map((p) => p.name));
  else {
    let i = 0;
    while (i < n) {
      const r = n - i;
      if (r <= mx) {
        if (r >= mn) g.push(ac.slice(i).map((p) => p.name));
        else if (g.length > 0) ac.slice(i).forEach((p) => g[g.length - 1].push(p.name));
        else g.push(ac.slice(i).map((p) => p.name));
        break;
      }
      g.push(ac.slice(i, i + mx).map((p) => p.name));
      i += mx;
    }
  }
  return g.map((p) => ({
    type: "multi",
    players: p,
    scores: Object.fromEntries(p.map((x) => [x, ""])),
    result: null,
  }));
}
function gpScore(name, h, bestOf, drop) {
  bestOf = bestOf || 3;
  drop = drop || 1;
  const s = [];
  h.forEach((r) =>
    r.forEach((m) => {
      if (m.type !== "multi" || !m.players.includes(name)) return;
      const v = parseFloat(m.scores?.[name]);
      if (!isNaN(v)) s.push(v);
    }),
  );
  if (!s.length) return 0;
  const l = s.slice(-bestOf);
  if (l.length <= drop) return l.reduce((a, v) => a + v, 0);
  const sorted = [...l].sort((a, b) => a - b);
  for (let i = 0; i < drop; i++) sorted.shift();
  return sorted.reduce((a, v) => a + v, 0);
}
function rkLbl(i) {
  if (i === 0) return "Winner";
  const n = i + 1,
    s = n % 100,
    x = s >= 11 && s <= 13 ? "th" : { 1: "st", 2: "nd", 3: "rd" }[n % 10] || "th";
  return `${n}${x}`;
}
function defRanks() {
  const t = [30, 15, 15, 10, 10, 10, 5, 5],
    s = t.reduce((a, v) => a + v, 0),
    o = t.map((v) => Math.round((v / s) * 1000) / 10);
  o[o.length - 1] = Math.round((o[o.length - 1] + (100 - o.reduce((a, v) => a + v, 0))) * 10) / 10;
  return o.map((p, i) => ({ label: rkLbl(i), pct: p }));
}

function calcAlloc(pl, pr, rk, ec, prizePct, prizePctUp, ruPct, ruPctUp) {
  const tp = ec * pl.length;
  if (!tp || !rk.length || !pr.length) return null;
  const ppct = prizePct || 50;
  const rawAc = (pl.length * ppct) / 100;
  const ac = prizePctUp ? Math.ceil(rawAc) : Math.floor(rawAc);
  if (ac < 1) return null;
  const rupct = ruPct || 50;
  const rawRu = (ac * rupct) / 100;
  const ruCount = ruPctUp ? Math.ceil(rawRu) : Math.floor(rawRu);
  const ar = rk.slice(0, ac),
    inv = pr.map((p) => ({ ...p }));
  const gbr = {};
  const avoidMap = {};
  inv.forEach((p) => {
    const gList = String(p.guaranteed || "")
      .split(",")
      .map((s) => parseInt(s.trim()))
      .filter((n) => n > 0 && n <= ar.length);
    gList.forEach((g) => {
      if (p.maxQty > 0) {
        (gbr[g - 1] = gbr[g - 1] || []).push({
          name: p.name,
          value: p.value,
          qty: 1,
          total: p.value,
        });
        p.maxQty--;
      }
    });
    const aList = String(p.avoid || "")
      .split(",")
      .map((s) => parseInt(s.trim()))
      .filter((n) => n > 0);
    aList.forEach((a) => {
      (avoidMap[a - 1] = avoidMap[a - 1] || new Set()).add(p.name);
    });
  });
  function fbc(tgt, rd, avoided) {
    const av = inv.filter((p) => p.maxQty > 0 && p.value > 0 && !(avoided && avoided.has(p.name))),
      mu = av.map((p) =>
        Math.max(
          0,
          Math.min((p.maxQtyPerPlayer || 1) <= 1 ? 1 : p.maxQty, Math.ceil(tgt / p.value) + 1),
        ),
      );
    let best = null;
    function con(c, v) {
      if (rd ? v <= tgt : v >= tgt)
        if (!best || (rd ? v > best.value : v < best.value)) best = { combo: c.slice(), value: v };
    }
    function dfs(i, c, v) {
      if (i >= av.length) {
        con(c, v);
        return;
      }
      for (let q = 0; q <= mu[i]; q++) {
        c.push({ prize: av[i], qty: q });
        dfs(i + 1, c, v + q * av[i].value);
        c.pop();
        if (!rd && v + q * av[i].value > tgt + (best ? best.value - tgt : Infinity)) break;
      }
    }
    dfs(0, [], 0);
    return best;
  }
  let gt = 0;
  const al = ar.map((r, ri) => {
    const rd = ri >= ruCount;
    const tgt = (tp * r.pct) / 100;
    const ch = (gbr[ri] || []).map((g) => ({ ...g }));
    let f = ch.reduce((s, c) => s + c.total, 0);
    const rem = tgt - f;
    if (rem > 0.001) {
      const res = fbc(rem, rd, avoidMap[ri]);
      if (res)
        res.combo.forEach(({ prize, qty }) => {
          if (qty > 0) {
            const ip = inv.find((x) => x.name === prize.name),
              ex = ch.find((c) => c.name === prize.name);
            if (ex) {
              ex.qty += qty;
              ex.total += qty * prize.value;
            } else ch.push({ name: prize.name, value: prize.value, qty, total: qty * prize.value });
            ip.maxQty -= qty;
            f += qty * prize.value;
          }
        });
    }
    if (!ch.length) {
      const c = inv.filter((p) => p.maxQty > 0 && p.value > 0).sort((a, b) => a.value - b.value)[0];
      if (c) {
        ch.push({ name: c.name, value: c.value, qty: 1, total: c.value });
        c.maxQty--;
      }
    }
    const av = ch.reduce((s, c) => s + c.total, 0);
    gt += av;
    return { rank: r.label, target: tgt, chosen: ch, actualValue: av };
  });
  const tk =
    inv.find((p) => p.name === "Token" && p.value > 0) ||
    inv.filter((p) => p.value > 0).sort((a, b) => a.value - b.value)[0];
  if (tk)
    for (let h = 0; h < al.length - 1; h++)
      for (let l = h + 1; l < al.length; l++)
        while (al[h].actualValue < al[l].actualValue && tk.maxQty > 0) {
          const ex = al[h].chosen.find((c) => c.name === tk.name);
          if (ex) {
            ex.qty++;
            ex.total += tk.value;
          } else al[h].chosen.push({ name: tk.name, value: tk.value, qty: 1, total: tk.value });
          al[h].actualValue += tk.value;
          gt += tk.value;
          tk.maxQty--;
        }
  return { allocs: al, totalPool: tp, grandTotal: gt };
}

// ═══════════════════════════════════════════════════════
// Storage helpers and pairing generator
function now() {
  return new Date().toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
  });
}
function mkId() {
  const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let i = "";
  for (let x = 0; x < 6; x++) i += c[Math.floor(Math.random() * c.length)];
  return i;
}
function lLS(k, f) {
  try {
    const v = localStorage.getItem(k);
    return v ? JSON.parse(v) : f;
  } catch {
    return f;
  }
}
function sLS(k, v) {
  try {
    localStorage.setItem(k, JSON.stringify(v));
  } catch {}
}
function gSU() {
  try {
    return localStorage.getItem(SK) || DU;
  } catch {
    return DU;
  }
}
function mkP(st, pl, h, ph) {
  const c = { ...st.tournaments?.[st.tournamentId]?.features, ...st.featureOverrides };
  if (!c) return [];
  const activeElo = st.eloDb?.[c.eloCol || "ELO"] || {};
  return c.pairing === "multi"
    ? genMulti(pl, c.matchMin, c.matchMax, activeElo)
    : gen1v1(pl, h, ph, c.rrRounds, activeElo, c.firstPlayer);
}

// ═══════════════════════════════════════════════════════
// Initial state and reducer — all state transitions
// All app state lives in this reducer. Key groups:

//   Navigation: OPEN_TOURNAMENT, GO_HOME, SET_TAB
const init = {
  screen: "landing",
  tournamentId: null,
  players: [],
  currentRound: 0,
  phase: "roundrobin",
  pairings: [],
  history: [],
  matchLog: [],
  tournamentStarted: false,
  startedAt: null,
  eloDb: (() => {
    const raw = lLS(EK, {});
    const vals = Object.values(raw);
    if (vals.length > 0 && vals.some((v) => v && typeof v === "object" && "elo" in v)) {
      const db = {};
      vals.forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = e; });
      return { "ELO": db };
    }
    const result = {};
    Object.entries(raw).forEach(([sh, entries]) => {
      if (entries && typeof entries === "object") {
        const db = {};
        Object.values(entries).forEach((e) => { if (e?.name) db[e.name.toLowerCase()] = e; });
        result[sh] = db;
      }
    });
    return result;
  })(),
  activeTab: "players",
  matchSubTab: "pairings",
  standingsSubTab: "rankings",
  prizes: [
    { name: "Pauper", value: 7, maxQty: 1, maxQtyPerPlayer: 1, guaranteed: "1", avoid: "" },
    { name: "Tournament", value: 5, maxQty: 1, maxQtyPerPlayer: 1, guaranteed: "2", avoid: "" },
    { name: "Booster", value: 6, maxQty: 99, maxQtyPerPlayer: 99, guaranteed: "", avoid: "" },
    { name: "Token", value: 3, maxQty: 99, maxQtyPerPlayer: 1, guaranteed: "", avoid: "" },
  ],
  ranks: defRanks(),
  entryCost: 3,
  prizePct: 50,
  prizePctRoundUp: false,
  roundUpPct: 50,
  roundUpPctRoundUp: true,
  spinnerOptions: [
    { name: "Small decks", weight: 20 },
    { name: "Plancia commanders", weight: 13 },
    { name: "Two heads bozos", weight: 20 },
    { name: "Vintage lands", weight: 20 },
    { name: "Drafting commanders", weight: 13 },
    { name: "Ante", weight: 20 },
    { name: "Pain rare", weight: 20 },
  ],
  tournaments: {},
  featureOverrides: {},
  testMode: false,
  experimental: false,
  advancedSetup: false,
  sheetsUrl: gSU(),
};

function reducer(st, a) {
  switch (a.type) {
    case "OPEN_TOURNAMENT":
      return { ...st, screen: "tournament", tournamentId: a.id, activeTab: "players", featureOverrides: {} };
    case "GO_HOME":
      return { ...st, screen: "landing" };
    case "SET_TAB":
      return { ...st, activeTab: a.tab };
    case "SET_MATCH_SUBTAB":
      return { ...st, matchSubTab: a.tab };
    case "SET_STANDINGS_SUBTAB":
      return { ...st, standingsSubTab: a.tab };
    case "ADD_PLAYER": {
      const n = a.name.trim();
      if (!n || st.players.some((p) => p.name.toLowerCase() === n.toLowerCase())) return st;
      return {
        ...st,
        players: [
          ...st.players,
          { name: n, score: 0, w: 0, d: 0, l: 0, eliminated: false, paid: false, firstCount: 0 },
        ],
      };
    }
    case "REMOVE_PLAYER":
      return { ...st, players: st.players.filter((_, i) => i !== a.index) };
    case "TOGGLE_PAID":
      return {
        ...st,
        players: st.players.map((p, i) => (i === a.index ? { ...p, paid: !p.paid } : p)),
      };
    case "ABANDON_PLAYER": {
      const ab = st.players[a.index];
      if (!ab) return st;
      const pl = st.players.map((p, i) =>
        i === a.index ? { ...p, eliminated: true, score: 0 } : p,
      );
      const pa = st.pairings.map((m) => {
        if (m.result || m.p2 === "BYE" || m.type === "multi") return m;
        if (m.p1 === ab.name) return { ...m, result: "p2win", noElo: true, forfeit: true };
        if (m.p2 === ab.name) return { ...m, result: "p1win", noElo: true, forfeit: true };
        return m;
      });
      return {
        ...st,
        players: pl,
        pairings: pa,
        matchLog: [...st.matchLog, { type: "abandon", label: `${ab.name} abandoned`, ts: now() }],
      };
    }
    case "START_TOURNAMENT": {
      const c = { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides };
      if (!c) return st;
      const ss = c.startScore ?? 0;
      const activeElo = st.eloDb[c.eloCol || "ELO"] || {};
      const pl = st.players.map((p) => ({
        ...p,
        score: ss,
        w: 0,
        d: 0,
        l: 0,
        eliminated: false,
        firstCount: 0,
        eloStart: gE(activeElo, p.name),
      }));
      const ph = c.rrRounds > 0 ? "roundrobin" : "swiss";
      const ns = {
        ...st,
        players: pl,
        currentRound: 1,
        phase: ph,
        history: [],
        tournamentStarted: true,
        startedAt: Date.now(),
        matchLog: [
          { type: "start", label: `Tournament started — ${pl.length} players`, ts: now() },
        ],
        activeTab: "matches",
        matchSubTab: c.draft ? "draft" : "pairings",
      };
      return { ...ns, pairings: mkP(ns, pl, [], ph) };
    }
    case "SET_RESULT":
      return {
        ...st,
        pairings: st.pairings.map((m, i) => (i === a.index ? { ...m, result: a.result } : m)),
      };
    case "SET_MULTI_SCORE":
      return {
        ...st,
        pairings: st.pairings.map((m, i) =>
          i !== a.matchIndex
            ? m
            : { ...m, scores: { ...m.scores, [a.playerName]: a.value.replace(/[^0-9\-]/g, "") } },
        ),
      };
    case "NEXT_ROUND": {
      const c = { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides };
      if (!c) return st;
      const eloNs = c.eloCol || "ELO";
      let pl = st.players.map((p) => ({ ...p })),
        db = { ...(st.eloDb[eloNs] || {}) };
      const sc = c.scoring,
        rp = st.pairings.map((m) => ({ ...m }));
      rp.forEach((m) => {
        if (m.type === "multi") {
          const fl = m.players.filter((n) => String(m.scores[n]).trim() !== ""),
            so = [...fl].sort(
              (a, b) => parseFloat(m.scores[b] || 0) - parseFloat(m.scores[a] || 0),
            );
          if (so.length) {
            const ptMap = [3, 2, 1];
            const groups = [];
            let gi = 0;
            while (gi < so.length) {
              const gs = parseFloat(m.scores[so[gi]] || 0);
              let gj = gi;
              while (gj < so.length && parseFloat(m.scores[so[gj]] || 0) === gs) gj++;
              groups.push({ players: so.slice(gi, gj), score: gs });
              gi = gj;
            }
            const multiGroup = groups.length > 1;
            let rank = 1;
            groups.forEach((g, idx) => {
              const isLast = multiGroup && idx === groups.length - 1;
              const pts = isLast || g.score === 0 ? 0 : (ptMap[rank - 1] ?? 0);
              g.players.forEach((n) => {
                const p = pl.find((x) => x.name === n);
                if (!p) return;
                p.score += pts;
                pts > 0 ? p.w++ : p.l++;
              });
              rank += g.players.length;
            });
          }
          if (c.elo) {
            const n = m.players.length,
              K = (c.eloKMax || 50) / n,
              dl = Object.fromEntries(m.players.map((p) => [p, 0]));
            for (let i = 0; i < n; i++)
              for (let j = i + 1; j < n; j++) {
                const pA = m.players[i],
                  pB = m.players[j],
                  sA = parseFloat(m.scores[pA] || 0),
                  sB = parseFloat(m.scores[pB] || 0),
                  rA = gE(db, pA),
                  rB = gE(db, pB),
                  eA = eExp(rA, rB, c.eloScale),
                  scA = sA > sB ? 1 : sA < sB ? 0 : 0.5;
                dl[pA] += K * (scA - eA);
                dl[pB] += K * (1 - scA - (1 - eA));
              }
            m.eloDeltas = {};
            m.players.forEach((p) => {
              const d = Math.round(dl[p]);
              m.eloDeltas[p] = d;
              db = sE(db, p, gE(db, p) + d, db[p.toLowerCase()]?.test);
            });
          }
          return;
        }
        if (m.p2 === "BYE" || !m.result) return;
        const p1 = pl.find((x) => x.name === m.p1),
          p2 = pl.find((x) => x.name === m.p2);
        if (!p1 || !p2) return;
        if (sc === "lifepoints") {
          if (m.result === "p1win") {
            p1.w++;
            p2.l++;
            p2.score = Math.max(0, p2.score - 1);
            if (p2.score <= 0) p2.eliminated = true;
          } else if (m.result === "p2win") {
            p2.w++;
            p1.l++;
            p1.score = Math.max(0, p1.score - 1);
            if (p1.score <= 0) p1.eliminated = true;
          } else {
            p1.d++;
            p2.d++;
            const dp = c.cumulativeDrawPenalty ? 0.5 * p1.d : 0.5;
            const dp2 = c.cumulativeDrawPenalty ? 0.5 * p2.d : 0.5;
            p1.score = Math.max(0, p1.score - dp);
            p2.score = Math.max(0, p2.score - dp2);
            if (p1.score <= 0) p1.eliminated = true;
            if (p2.score <= 0) p2.eliminated = true;
          }
        } else {
          if (m.result === "p1win") {
            p1.w++;
            p1.score += c.winPoints || 3;
            p2.l++;
            p2.score += c.lossPoints || 0;
          } else if (m.result === "p2win") {
            p2.w++;
            p2.score += c.winPoints || 3;
            p1.l++;
            p1.score += c.lossPoints || 0;
          } else {
            p1.d++;
            p2.d++;
            p1.score += c.drawPoints || 1;
            p2.score += c.drawPoints || 1;
          }
        }
        if (c.elo && !m.noElo) {
          const rA = gE(db, m.p1),
            rB = gE(db, m.p2),
            scA = m.result === "p1win" ? 1 : m.result === "p2win" ? 0 : 0.5,
            { dA, dB } = eCalc(rA, rB, scA, c.eloKMax, c.eloScale);
          m.eloDelta1 = dA;
          m.eloDelta2 = dB;
          db = sE(db, m.p1, rA + dA, db[m.p1.toLowerCase()]?.test);
          db = sE(db, m.p2, rB + dB, db[m.p2.toLowerCase()]?.test);
        }
      });
      const h = [...st.history, rp],
        nr = st.currentRound + 1;
      let ph = st.phase;
      if (ph === "roundrobin" && nr > c.rrRounds) ph = "swiss";
      const ac = pl.filter((p) => !p.eliminated),
        go = c.scoring === "lifepoints" && ac.length <= 1;
      const newEloDb = { ...st.eloDb, [eloNs]: db };
      const ns = {
        ...st,
        players: pl,
        eloDb: newEloDb,
        history: h,
        currentRound: nr,
        phase: ph,
        matchLog: [
          ...st.matchLog,
          { type: "round", label: `Round ${st.currentRound} completed`, ts: now() },
        ],
        activeTab: go ? "standings" : st.activeTab,
      };
      sLS(EK, newEloDb);
      return { ...ns, pairings: go ? [] : mkP(ns, pl, h, ph) };
    }
    case "END_TOURNAMENT": {
      try {
        localStorage.removeItem(BK);
      } catch {}
      const so = [...st.players].sort((a, b) => b.score - a.score || b.w - a.w);
      return {
        ...st,
        players: st.players.map((p) => (p.name === so[0]?.name ? p : { ...p, eliminated: true })),
        activeTab: "standings",
      };
    }
    case "NEW_GP_SESSION": {
      const c = { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides };
      if (!c) return st;
      const ph = c.rrRounds > 0 ? "roundrobin" : "swiss";
      const ns = { ...st, currentRound: 1, phase: ph, pairings: [] };
      return { ...ns, pairings: mkP(ns, st.players, st.history, ph) };
    }
    case "SET_TOURNAMENTS": {
      const tournaments = {};
      a.tournaments.forEach((t) => { if (t.id) tournaments[t.id] = t; });
      return { ...st, tournaments };
    }
    case "SET_ELO_DB": {
      const sheet = a.col || "ELO";
      const db = {};
      Object.values(a.db).forEach((e) => {
        if (e?.name) db[e.name.toLowerCase()] = e;
      });
      const newEloDb = { ...st.eloDb, [sheet]: db };
      sLS(EK, newEloDb);
      return { ...st, eloDb: newEloDb };
    }

    case "ADD_PRIZE":
      return {
        ...st,
        prizes: [
          ...st.prizes,
          { name: "", value: 0, maxQty: 1, maxQtyPerPlayer: 1, guaranteed: "", avoid: "" },
        ],
      };
    case "REMOVE_PRIZE":
      return { ...st, prizes: st.prizes.filter((_, i) => i !== a.index) };
    case "UPDATE_PRIZE":
      return {
        ...st,
        prizes: st.prizes.map((p, i) => (i === a.index ? { ...p, [a.field]: a.value } : p)),
      };
    case "UPDATE_RANK":
      return {
        ...st,
        ranks: st.ranks.map((r, i) => (i === a.index ? { ...r, [a.field]: a.value } : r)),
      };
    case "SET_ENTRY_COST":
      return { ...st, entryCost: a.value };
    case "SET_PRIZE_PCT":

    case "SET_PRIZE_PCT_ROUNDUP":

    case "SET_ROUNDUP_PCT":

    case "ADD_SPINNER_OPTION":

    case "REMOVE_SPINNER_OPTION":

    case "UPDATE_SPINNER_WEIGHT":

          i === a.index ? { ...o, weight: Math.max(1, parseInt(a.value) || 1) } : o,
        ),

    case "INJECT_TEST_PLAYERS": {
      const ns = [

      ];
      const testNs = (st.tournaments?.[st.tournamentId] ?
        { ...st.tournaments[st.tournamentId]?.features, ...st.featureOverrides }.eloCol
        : null) || "ELO";
      let db = { ...(st.eloDb[testNs] || {}) };
      const pl = [];
      for (let i = 0; i < a.count; i++) {
        const n = ns[i] || `Player ${i + 1}`;
        db = sE(db, n, 800 + Math.floor(Math.random() * 800), true);
        pl.push({

      }
      return { ...st, players: pl, eloDb: { ...st.eloDb, [testNs]: db } };
    }
    case "AUTO_SELECT_WINNERS":
      return {
        ...st,
        pairings: st.pairings.map((m) => {
          if (m.result) return m;
          if (m.type === "multi") {

            m.players.forEach((n) => {

          }
          if (m.p2 === "BYE") return m;

        }),

    case "FULL_RESET":

    case "LOG_EVENT":

      };
    case "TOGGLE_FEATURE": {
      const ov = { ...st.featureOverrides };

      if (ov[a.key] !== undefined) delete ov[a.key];

    case "SET_FEATURE": {

    case "SET_TEST_MODE":

        tournamentId: snap.tournamentMode || st.tournamentId,

        prizePct: snap.prizePct ?? st.prizePct,

        experimental: snap.experimental ?? st.experimental,
        advancedSetup: snap.advancedSetup ?? st.advancedSetup,
        screen: "tournament",
        activeTab: snap.tournamentStarted ? "matches" : "players",
      };
    }
    default:
      return st;
  }
}

// Countdown timer with start/pause/reset
// Timer — countdown with audio alarm
// Plays 6-tone audio alarm when it hits zero
function Timer({ minutes }) {
  const total = minutes * 60;
  const [left, setLeft] = useState(total);
  const [running, setRunning] = useState(false);
  const ir = useRef(null),
    ar = useRef(null);
  const alarm = useCallback(() => {
    try {
      if (!ar.current) ar.current = new (window.AudioContext || window.webkitAudioContext)();
      const c = ar.current;
      [880, 660, 880, 660, 880, 1100].forEach((f, i) => {
        const o = c.createOscillator(),
          g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        o.type = "sine";
        o.frequency.value = f;
        const t = c.currentTime + i * 0.38;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.45, t + 0.05);
        g.gain.linearRampToValueAtTime(0, t + 0.33);
        o.start(t);
        o.stop(t + 0.38);
      });
    } catch {}
  }, []);
  useEffect(() => {
    if (running && left > 0)
      ir.current = setInterval(
        () =>
          setLeft((p) => {
            if (p <= 1) {
              setRunning(false);
              alarm();
              return 0;
            }
            return p - 1;
          }),
        1000,
      );
    return () => clearInterval(ir.current);
  }, [running, left, alarm]);
  const u = left <= 60,
    m = Math.floor(left / 60),
    sec = left % 60;
  return (
    <div
      style={{
        background: C.subtle,
        borderRadius: 12,
        padding: "16px 20px",
        marginBottom: 16,
        display: "flex",
        alignItems: "center",
        gap: 12,
        flexWrap: "wrap",
      }}
    >
      <div
        style={{
          fontSize: 36,
          fontWeight: 500,
          fontVariantNumeric: "tabular-nums",
          letterSpacing: 3,
          minWidth: 100,
          color: u ? C.heart : C.text,
        }}
      >
        {String(m).padStart(2, "0")}:{String(sec).padStart(2, "0")}
      </div>
      <div
        style={{
          flex: 1,
          minWidth: 80,
          height: 6,
          background: "#ddd",
          borderRadius: 3,
          overflow: "hidden",
        }}
      >
        <div
          style={{
            height: "100%",
            borderRadius: 3,
            background: u ? C.heart : C.accent,
            width: `${(left / total) * 100}%`,
            transition: "width 0.9s linear",
          }}
        />
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <Btn
          onClick={() => {
            try {
              ar.current?.resume();
            } catch {}
            setRunning(!running);
          }}
          style={{ minWidth: 64 }}
        >
          {running ? "Pause" : "Start"}
        </Btn>
        <Btn
          onClick={() => {
            setRunning(false);
            setLeft(total);
          }}
        >
          ↺
        </Btn>
      </div>
    </div>
  );
}

// Snake-draft table seating
// Draft groups — snake-draft seating by ELO
// Sorts players by ELO, distributes across tables using
function DraftGroups({ players, eloDb, dispatch }) {
  const n = players.length;
  if (n < 2)
    return (
      <div style={{ textAlign: "center", padding: 32, color: C.faint }}>
        Add at least 2 players.
      </div>
    );
  const ng = Math.max(1, Math.floor(n / 5)),
    so = [...players].sort((a, b) => gE(eloDb, b.name) - gE(eloDb, a.name)),
    g = Array.from({ length: ng }, () => []);
  so.forEach((p, i) => {
    const r = Math.floor(i / ng);
    g[r % 2 === 0 ? i % ng : ng - 1 - (i % ng)].push(p);
  });
  const gc = ["#185fa5", "#0f6e56", "#a32d2d", "#854f0b", "#534ab7", "#3b6d11"];
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
        <span style={{ fontSize: 15, fontWeight: 500 }}>
          {ng} table{ng > 1 ? "s" : ""} · {n} players
        </span>
        <Btn
          onClick={() =>
            dispatch({ type: "LOG_EVENT", eventType: "draft-end", label: "Draft ended" })
          }
          style={{ fontSize: 12 }}
        >
          Draft ended ↗
        </Btn>
      </div>
      <div
        style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))",
          gap: 10,
        }}
      >
        {g.map((gr, gi) => {
          const co = gc[gi % gc.length],
            elos = gr.map((p) => gE(eloDb, p.name)),
            avg = Math.round(elos.reduce((a, v) => a + v, 0) / elos.length);
          return (
            <Card key={gi} style={{ borderLeft: `3px solid ${co}`, padding: "14px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontWeight: 500, color: co, fontSize: 15 }}>Table {gi + 1}</span>
                <span style={{ fontSize: 12, color: C.muted }}>
                  {gr.length}p · avg {avg}
                </span>
              </div>
              {gr
                .sort((a, b) => gE(eloDb, b.name) - gE(eloDb, a.name))
                .map((p) => (
                  <div
                    key={p.name}
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      padding: "4px 0",
                      fontSize: 13,
                      borderBottom: `0.5px solid ${C.bL}`,
                    }}
                  >
                    <span>{p.name}</span>
                    <span style={{ color: C.muted, fontSize: 11 }}>{gE(eloDb, p.name)}</span>
                  </div>
                ))}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// Weighted random wheel (experimental feature)
// Spinner — weighted random wheel (experimental)
// Canvas-rendered with cubic ease-out animation
function SpinnerTab({ state, dispatch }) {
  const cr = useRef(null),
    [angle, setAngle] = useState(0),
    [spinning, setSpinning] = useState(false),
    [result, setResult] = useState("");
  const opts = state.spinnerOptions,
    total = opts.reduce((s, o) => s + (o.weight || 1), 0),
    cols = ["#8b5cf6", "#a78bfa", "#c4b5fd", "#7c3aed", "#ddd6fe", "#6d28d9", "#ede9fe"];
  const draw = useCallback(
    (a) => {
      const cv = cr.current;
      if (!cv) return;
      const ctx = cv.getContext("2d"),
        cx = 100,
        cy = 100,
        r = 98;
      ctx.clearRect(0, 0, 200, 200);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((a * Math.PI) / 180);
      let start = -Math.PI / 2;
      (opts.length ? opts : [{ name: "(none)", weight: 1 }]).forEach((o, i) => {
        const sl = 2 * Math.PI * ((o.weight || 1) / total);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, start + sl);
        ctx.closePath();
        ctx.fillStyle = cols[i % cols.length];
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.save();
        ctx.rotate(start + sl / 2 + Math.PI / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${Math.min(16, Math.max(9, 110 / opts.length))}px system-ui`;
        ctx.fillText(String(i + 1), 0, -(r * 0.65));
        ctx.restore();
        start += sl;
      });
      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, 14, 0, 2 * Math.PI);
      ctx.fillStyle = "#fff";
      ctx.fill();
    },
    [opts, total],
  );
  useEffect(() => {
    draw(angle);
  }, [angle, draw]);
  const spin = () => {
    if (spinning || !opts.length) return;
    setSpinning(true);
    setResult("");
    let rand = Math.random() * total,
      wi = 0;
    for (let i = 0; i < opts.length; i++) {
      rand -= opts[i].weight || 1;
      if (rand <= 0) {
        wi = i;
        break;
      }
    }
    let cum = 0;
    const ss = opts.map((o) => {
        const s = cum;
        cum += ((o.weight || 1) / total) * 360;
        return s;
      }),
      se = opts.map((o, i) => ss[i] + ((o.weight || 1) / total) * 360);
    const stop = ss[wi] + Math.random() * (se[wi] - ss[wi]),
      ta = (360 - stop + 360) % 360,
      extra = 5 + Math.floor(Math.random() * 5),
      td = extra * 360 + ta - (((angle % 360) + 360) % 360),
      dur = 3000 + Math.random() * 1000,
      sa = angle,
      st2 = performance.now(),
      ease = (t) => 1 - Math.pow(1 - t, 3);
    const frame = (n) => {
      const t = Math.min((n - st2) / dur, 1);
      setAngle(sa + td * ease(t));
      if (t < 1) requestAnimationFrame(frame);
      else {
        setResult("🎲 " + opts[wi].name);
        setSpinning(false);
      }
    };
    requestAnimationFrame(frame);
  };
  return (
    <div>
      <Card>

10. Type: Web app\n// 11. Execute as: Me\n// 12. Who has access: Anyone\n// 13. Click Deploy and copy the URL\n// 14. Paste the URL into the Tournament Manager's Database URL field\n//\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n\nfunction doGet(e) {\n  var action = e.parameter.action || \"load\";\n\n  if (action === \"load\") return loadElo(e.parameter.col);\n  if (action === \"seed_load\") return loadSeed(e.parameter.id);\n  if (action === \"seed_list\") return listSeeds();\n  if (action === \"rules\") return loadRules(e.parameter.tournament);\n  if (action === \"tournament_list\") return loadTournaments();\n  if (action === \"debug_settings\") return debugSettings();\n  if (action === \"debug_elo\") return debugElo();\n  if (action === \"elo_cols\") return eloColumns();\n\n  return jsonResponse({ error: \"Unknown action\" });\n}\n\nfunction doPost(e) {\n  try {\n    var data = JSON.parse(e.postData.contents);\n    var action = data.action || \"save\";\n\n    if (action === \"save\") return saveElo(data);\n    if (action === \"seed_save\") return saveSeed(data);\n    if (action === \"seed_delete\") return deleteSeed(data);\n    if (action === \"tournament_save\") return saveTournament(data);\n\n    return jsonResponse({ error: \"Unknown action\" });\n  } catch (err) {\n    return jsonResponse({ error: err.message });\n  }\n}\n\n// \u2500\u2500 ELO Database \u2500\u2500\n\nfunction loadElo(colName) {\n  var col = colName || \"ELO\";\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"ELO\");\n  if (!sheet) return jsonResponse({ entries: [] });\n\n  var data = sheet.getDataRange().getValues();\n  if (data.length < 1) return jsonResponse({ entries: [] });\n\n  var headers = data[0].map(function(h) { return String(h).trim().toLowerCase(); });\n  var nameIdx = headers.indexOf(\"name\");\n  var eloIdx = headers.indexOf(col.toLowerCase());\n  var testIdx = headers.indexOf(\"test\");\n\n  if (nameIdx === -1 || eloIdx === -1) return jsonResponse({ entries: [] });\n\n  var seen = {};\n  for (var i = 1; i < data.length; i++) {\n    var pName = String(data[i][nameIdx] || \"\").trim();\n    if (!pName) continue;\n    var key = pName.toLowerCase();\n    seen[key] = {\n      name: pName,\n      elo: parseInt(data[i][eloIdx]) || 1000,\n      test: testIdx !== -1 && (data[i][testIdx] === true || String(data[i][testIdx]).toLowerCase() === \"true\")\n    };\n  }\n\n  var entries = [];\n  for (var k in seen) entries.push(seen[k]);\n  return jsonResponse({ entries: entries });\n}\n\nfunction saveElo(data) {\n  var colName = data.col || \"ELO\";\n  var spreadsheet = SpreadsheetApp.getActiveSpreadsheet();\n  var sheet = spreadsheet.getSheetByName(\"ELO\");\n  if (!sheet) {\n    sheet = spreadsheet.insertSheet(\"ELO\");\n    sheet.getRange(1, 1, 1, 3).setValues([[\"Test\", colName, \"Name\"]]);\n  }\n\n  var entries = data.entries || [];\n  if (!entries.length) return jsonResponse({ ok: true, count: 0 });\n\n  var allData = sheet.getDataRange().getValues();\n  var headers = allData[0].map(function(h) { return String(h).trim(); });\n\n  var nameIdx = headers.indexOf(\"Name\");\n  var eloIdx = headers.indexOf(colName);\n  var testIdx = headers.indexOf(\"Test\");\n\n  // Add Name column if sheet is empty/malformed\n  if (nameIdx === -1) {\n    sheet.getRange(1, 1).setValue(\"Name\");\n    nameIdx = 0;\n  }\n  // Add this ELO column if missing\n  if (eloIdx === -1) {\n    var insertAt = testIdx !== -1 ? testIdx : headers.length;\n    // Shift Test column right if it exists\n    if (testIdx !== -1) {\n      sheet.insertColumnBefore(testIdx + 1);\n      sheet.getRange(1, testIdx + 1).setValue(colName);\n      eloIdx = testIdx;\n      testIdx = testIdx + 1;\n    } else {\n      sheet.getRange(1, headers.length + 1).setValue(colName);\n      eloIdx = headers.length;\n    }\n  }\n  // Add Test column if missing\n  if (testIdx === -1) {\n    allData = sheet.getDataRange().getValues();\n    headers = allData[0].map(function(h) { return String(h).trim(); });\n    testIdx = headers.length;\n    sheet.getRange(1, testIdx + 1).setValue(\"Test\");\n  }\n\n  // Re-read after any column additions\n  allData = sheet.getDataRange().getValues();\n  headers = allData[0].map(function(h) { return String(h).trim(); });\n  nameIdx = headers.indexOf(\"Name\");\n  eloIdx = headers.indexOf(colName);\n  testIdx = headers.indexOf(\"Test\");\n\n  // Build name\u2192row map\n  var rowMap = {};\n  for (var i = 1; i < allData.length; i++) {\n    var n = String(allData[i][nameIdx] || \"\").trim().toLowerCase();\n    if (n) rowMap[n] = i + 1;\n  }\n\n  // Update or append\n  for (var j = 0; j < entries.length; j++) {\n    var e = entries[j];\n    var key = e.name.toLowerCase();\n    var testVal = e.test === true || e.test === \"true\";\n\n    if (rowMap[key]) {\n      sheet.getRange(rowMap[key], eloIdx + 1).setValue(e.elo);\n      sheet.getRange(rowMap[key], testIdx + 1).setValue(testVal);\n    } else {\n      // New player: fill row with 1000 for all ELO columns, then set this one\n      var newRow = new Array(headers.length).fill(\"\");\n      newRow[nameIdx] = e.name;\n      newRow[testIdx] = testVal;\n      for (var h = 0; h < headers.length; h++) {\n        if (h !== nameIdx && h !== testIdx && headers[h] !== \"\") newRow[h] = 1000;\n      }\n      newRow[eloIdx] = e.elo;\n      sheet.appendRow(newRow);\n      rowMap[key] = sheet.getLastRow();\n    }\n  }\n\n  return jsonResponse({ ok: true, count: entries.length });\n}\n\n// \u2500\u2500 Seeds \u2500\u2500\n\nfunction saveSeed(data) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) {\n    sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet(\"Seeds\");\n    sheet.getRange(1, 1, 1, 4).setValues([[\"ID\", \"Label\", \"Timestamp\", \"Data\"]]);\n  }\n\n  var id = data.id || \"\";\n  var label = data.label || \"\";\n  var timestamp = new Date().toISOString();\n  var stored = data.data || JSON.stringify(data.chunks || []);\n\n  sheet.appendRow([id, label, timestamp, stored]);\n\n  return jsonResponse({ ok: true, id: id });\n}\n\nfunction loadSeed(id) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) return jsonResponse({ ok: false, error: \"No Seeds sheet\" });\n\n  id = (id || \"\").toUpperCase();\n  var data = sheet.getDataRange().getValues();\n\n  for (var i = data.length - 1; i >= 1; i--) {\n    if (String(data[i][0]).toUpperCase() === id) {\n      var raw = String(data[i][3]);\n      try {\n        var parsed = JSON.parse(raw);\n        if (Array.isArray(parsed)) {\n          return jsonResponse({ ok: true, chunks: parsed });\n        } else {\n          return jsonResponse({ ok: true, data: raw });\n        }\n      } catch (e) {\n        return jsonResponse({ ok: false, error: \"Corrupt seed data\" });\n      }\n    }\n  }\n\n  return jsonResponse({ ok: false, error: \"Seed not found: \" + id });\n}\n\nfunction deleteSeed(data) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) return jsonResponse({ ok: false, error: \"No Seeds sheet\" });\n\n  var id = (data.id || \"\").toUpperCase();\n  var rows = sheet.getDataRange().getValues();\n\n  for (var i = rows.length - 1; i >= 1; i--) {\n    if (String(rows[i][0]).toUpperCase() === id) {\n      sheet.deleteRow(i + 1);\n    }\n  }\n\n  return jsonResponse({ ok: true, id: id });\n}\n\nfunction listSeeds() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Seeds\");\n  if (!sheet) return jsonResponse({ seeds: [] });\n\n  var data = sheet.getDataRange().getValues();\n  var seeds = [];\n\n  for (var i = 1; i < data.length; i++) {\n    seeds.push({\n      id: String(data[i][0]),\n      label: String(data[i][1]),\n      timestamp: String(data[i][2])\n    });\n  }\n\n  return jsonResponse({ seeds: seeds });\n}\n\n// \u2500\u2500 Rules \u2500\u2500\n\nfunction loadRules(tournament) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Rules\");\n  if (!sheet) return jsonResponse({ rows: [] });\n\n  tournament = (tournament || \"\").toLowerCase();\n  var data = sheet.getDataRange().getValues();\n  var rows = [];\n\n  for (var i = 1; i < data.length; i++) {\n    if (String(data[i][0]).toLowerCase() === tournament) {\n      rows.push(data[i].slice(1).filter(function(c) { return c !== \"\"; }));\n    }\n  }\n\n  return jsonResponse({ rows: rows });\n}\n\n// \u2500\u2500 Tournaments \u2500\u2500\n\nvar TOURNAMENT_FEATURE_KEYS = [\n  \"scoring\", \"startScore\", \"winPoints\", \"drawPoints\", \"lossPoints\",\n  \"cumulativeDrawPenalty\", \"pairing\", \"rrRounds\", \"timerMinutes\", \"draft\", \"elo\", \"eloKMax\",\n  \"eloCol\", \"firstPlayer\", \"grandPrix\", \"gpBestOfLast\", \"gpDropWorst\", \"prizes\", \"timeout\",\n  \"timeoutTime\", \"spinner\", \"rules\", \"matchMin\", \"matchMax\"\n];\n\nfunction loadTournaments() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Settings\");\n  if (!sheet) return jsonResponse({ tournaments: [] });\n\n  var data = sheet.getDataRange().getValues();\n  if (data.length < 2) return jsonResponse({ tournaments: [] });\n\n  var headers = data[0].map(function(h) { return String(h).trim().toLowerCase(); });\n  var tournaments = [];\n\n  function hIdx(key) { return headers.indexOf(key.toLowerCase()); }\n\n  var idColIdx = hIdx(\"id\") !== -1 ? hIdx(\"id\") : 0;\n\n  for (var i = 1; i < data.length; i++) {\n    var row = data[i];\n    var id = String(row[idColIdx] || \"\").trim();\n    if (!id) continue;\n\n    var t = {\n      id: id,\n      name: String(row[hIdx(\"name\")] !== undefined ? row[hIdx(\"name\")] : \"\"),\n      icon: String(row[hIdx(\"icon\")] !== undefined ? row[hIdx(\"icon\")] : \"\"),\n      desc: String(row[hIdx(\"desc\")] !== undefined ? row[hIdx(\"desc\")] : \"\"),\n      features: {}\n    };\n\n    TOURNAMENT_FEATURE_KEYS.forEach(function(key) {\n      var idx = hIdx(key);\n      if (idx === -1) return;\n      var val = row[idx];\n      if (val instanceof Date) {\n        var hh = val.getHours(), mm = val.getMinutes();\n        val = (hh < 10 ? \"0\" : \"\") + hh + \":\" + (mm < 10 ? \"0\" : \"\") + mm;\n      }\n      t.features[key] = val;\n    });\n\n    tournaments.push(t);\n  }\n\n  return jsonResponse({ tournaments: tournaments });\n}\n\nfunction saveTournament(data) {\n  var t = data.tournament;\n  if (!t || !t.id) return jsonResponse({ error: \"Missing tournament id\" });\n\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Settings\");\n  if (!sheet) {\n    sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet(\"Settings\");\n    var initHeaders = [\"id\", \"name\", \"icon\", \"desc\"].concat(TOURNAMENT_FEATURE_KEYS);\n    sheet.getRange(1, 1, 1, initHeaders.length).setValues([initHeaders]);\n  }\n\n  var existing = sheet.getDataRange().getValues();\n  var headers = existing[0].map(function(h) { return String(h).trim(); });\n\n  var row = headers.map(function(h) {\n    if (h === \"id\") return t.id;\n    if (h === \"name\") return t.name || \"\";\n    if (h === \"icon\") return t.icon || \"\";\n    if (h === \"desc\") return t.desc || \"\";\n    return t.features && t.features[h] !== undefined ? t.features[h] : \"\";\n  });\n\n  var idIdx = headers.indexOf(\"id\");\n  for (var i = 1; i < existing.length; i++) {\n    if (String(existing[i][idIdx]).trim() === t.id) {\n      sheet.getRange(i + 1, 1, 1, row.length).setValues([row]);\n      return jsonResponse({ ok: true, id: t.id });\n    }\n  }\n\n  sheet.appendRow(row);\n  return jsonResponse({ ok: true, id: t.id });\n}\n\n// \u2500\u2500 Debug \u2500\u2500\n\nfunction eloColumns() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"ELO\");\n  if (!sheet) return jsonResponse({ cols: [] });\n  var headers = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];\n  var cols = headers.map(function(h) { return String(h).trim(); }).filter(function(h) {\n    return h && h.toLowerCase() !== \"test\" && h.toLowerCase() !== \"name\";\n  });\n  return jsonResponse({ cols: cols });\n}\n\nfunction debugElo() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"ELO\");\n  if (!sheet) return jsonResponse({ error: \"No sheet named ELO\" });\n  var data = sheet.getDataRange().getValues();\n  return jsonResponse({\n    rowCount: data.length,\n    headers: data.length > 0 ? data[0] : [],\n    firstDataRow: data.length > 1 ? data[1] : []\n  });\n}\n\nfunction debugSettings() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"Settings\");\n  if (!sheet) return jsonResponse({ error: \"No sheet named Settings\" });\n  var data = sheet.getDataRange().getValues();\n  return jsonResponse({\n    rowCount: data.length,\n    headers: data.length > 0 ? data[0] : [],\n    firstDataRow: data.length > 1 ? data[1] : []\n  });\n}\n\n// \u2500\u2500 Helpers \u2500\u2500\n\nfunction jsonResponse(obj) {\n  return ContentService\n    .createTextOutput(JSON.stringify(obj))\n    .setMimeType(ContentService.MimeType.JSON);\n}\n";

// Google Sheets integration — Database card in Advanced tab
// Sheets sync — pull/push ELO, validate, copy script
// Pull: fetches ELO entries (preserves test flag)
function SheetsSync({ state, dispatch, config }) {
  const [status, setStatus] = useState("");
  const url = state.sheetsUrl;
  const col = config?.features?.eloCol || "ELO";
  const pull = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Pulling…");
    try {
      const r = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      if (d?.entries) {
        const db = {};
        d.entries.forEach((e) => {
          if (e?.name)
            db[e.name.toLowerCase()] = { elo: parseInt(e.elo) || ED, name: e.name, test: !!e.test };
        });
        dispatch({ type: "SET_ELO_DB", db, col });
        setStatus(`✓ Pulled ${Object.keys(db).length} (${col})`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const push = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Pushing…");
    try {
      const ent = Object.values(state.eloDb?.[col] || {})
        .filter((v) => v?.name)
        .map((v) => ({ name: v.name, elo: v.elo, test: !!v.test }));
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "save", col, test: false, entries: ent }),
      });
      setStatus(`Verifying…`);
      await new Promise((r) => setTimeout(r, 1500));
      const vr = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      const vd = await vr.json();
      const remote = vd?.entries?.length || 0;
      if (remote >= ent.length) {
        setStatus(`✓ Pushed & verified (${remote} entries, ${col})`);
      } else {
        setStatus(`⚠ Pushed ${ent.length} but ${col} has ${remote} — check manually`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const validate = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    setStatus("Validating…");
    const results = [];
    try {
      const r = await fetch(url + "?action=load&col=" + encodeURIComponent(col));
      const d = await r.json();
      results.push(d?.entries ? `✓ ELO (${col})` : `✗ ELO (${col}) — missing or wrong format`);
    } catch {
      results.push("✗ ELO — unreachable");
    }
    try {
      const r = await fetch(url + "?action=seed_list");
      const d = await r.json();
      results.push(d?.seeds ? "✓ Seeds" : "✗ Seeds — missing or wrong format");
    } catch {
      results.push("✗ Seeds — unreachable");
    }
    try {
      const r = await fetch(url + "?action=rules&tournament=_validate_");
      const d = await r.json();
      results.push(d?.rows ? "✓ Rules" : "✗ Rules — missing or wrong format");
    } catch {
      results.push("✗ Rules — unreachable");
    }
    const ok = results.every((r) => r.startsWith("✓"));
    setStatus(ok ? `✓ All tabs valid — ${results.join(" · ")}` : results.join("\n"));
  };
  const copyScript = () => {
    const s = APPS_SCRIPT;
    navigator.clipboard
      .writeText(s)
      .then(() => setStatus("✓ Script copied to clipboard"))
      .catch(() => {
        const ta = document.createElement("textarea");
        ta.value = s;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        setStatus("✓ Script copied");
      });
  };
  return (
    <Card>
      <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 12 }}>Database</h3>
      <label
        style={{ fontSize: 13, color: "#444", fontWeight: 500, marginBottom: 6, display: "block" }}
      >
        Google Sheet URL
      </label>
      <input
        type="text"
        value={url || ""}
        placeholder="Apps Script URL"
        onChange={(e) => dispatch({ type: "SET_SHEETS_URL", url: e.target.value.trim() })}
        style={{ ...S.input, fontSize: 12, padding: "5px 8px", marginBottom: 6 }}
      />
      <div style={{ display: "flex", gap: 6, marginBottom: 4 }}>
        <Btn onClick={pull} style={{ flex: 1, fontSize: 12 }}>
          ⬇ Pull
        </Btn>
        <Btn onClick={push} style={{ flex: 1, fontSize: 12 }}>
          ⬆ Push
        </Btn>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <Btn
          onClick={validate}
          style={{ flex: 1, fontSize: 12, borderColor: C.blue, color: C.blue }}
        >
          🔍 Validate Sheet
        </Btn>
        <Btn
          onClick={copyScript}
          style={{ flex: 1, fontSize: 12, borderColor: C.purple, color: C.purple }}
        >
          📋 Copy Script
        </Btn>
      </div>
      <div
        style={{
          fontSize: 11,
          color: C.muted,
          minHeight: 14,
          marginTop: 6,
          whiteSpace: "pre-wrap",
        }}
      >
        {status}
      </div>
    </Card>
  );
}

// Save/load tournament snapshots via Google Sheets
// Seeds — save/load/delete tournament snapshots
// v3 format: single JSON blob per seed (no chunking)
function SeedsManager({ state, dispatch }) {
  const [status, setStatus] = useState(""),
    [seedId, setSeedId] = useState(""),
    [seeds, setSeeds] = useState([]);
  const url = state.sheetsUrl;
  const buildSnap = () => {
    const t = state.tournaments?.[state.tournamentId];
    return {
      v: 3,
      tournamentMode: state.tournamentId,
      tournamentName: t?.name || "",
      tournamentStarted: state.tournamentStarted,
      playerCount: state.players.length,
      round: state.currentRound,
      state: {
        players: state.players,
        currentRound: state.currentRound,
        phase: state.phase,
        pairings: state.pairings,
        history: state.history,
        matchLog: state.matchLog,
        startedAt: state.startedAt,
      },
      prizes: state.prizes,
      ranks: state.ranks,
      entryCost: state.entryCost,
      prizePct: state.prizePct,
      prizePctRoundUp: state.prizePctRoundUp,
      roundUpPct: state.roundUpPct,
      roundUpPctRoundUp: state.roundUpPctRoundUp,
      featureOverrides: state.featureOverrides,
      testMode: state.testMode,
      experimental: state.experimental,
      advancedSetup: state.advancedSetup,
    };
  };
  const save = async () => {
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    if (!state.players.length) {
      setStatus("⚠ No players");
      return;
    }
    const id = mkId();
    const snap = buildSnap();
    const data = JSON.stringify(snap);
    const t = state.tournaments?.[state.tournamentId];
    const label = `${t?.icon || ""} ${t?.name || ""} · ${state.players.length}p · R${state.currentRound}`;
    setStatus("Saving…");
    try {
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "seed_save", id, label, data }),
      });
      setStatus("Verifying…");
      await new Promise((r) => setTimeout(r, 1500));
      const vr = await fetch(url + "?action=seed_load&id=" + encodeURIComponent(id));
      const vd = await vr.json();
      if (vd?.ok) {
        setStatus(`✓ Saved · ${id}`);
        list();
      } else {
        setStatus(`⚠ Sent but verify failed · ${id}`);
      }
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const loadById = async (id) => {
    const target = (id || seedId.trim()).toUpperCase();
    if (!url || !target) {
      setStatus("⚠ Enter ID");
      return;
    }
    setStatus("Loading…");
    try {
      const r = await fetch(url + "?action=seed_load&id=" + encodeURIComponent(target));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      if (!d?.ok) throw new Error(d?.error || "Not found");
      let snap;
      if (d.data) {
        snap = JSON.parse(d.data);
      } else if (d.chunks) {
        snap = JSON.parse(d.chunks.join(""));
      } else throw new Error("No data");
      dispatch({ type: "RESTORE_SNAPSHOT", snapshot: snap });
      setStatus(`✓ Restored ${target}`);
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const del = async (id) => {
    if (!url) return;
    setStatus("Deleting…");
    try {
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "seed_delete", id }),
      });
      await new Promise((r) => setTimeout(r, 1000));
      list();
      setStatus(`✓ Deleted ${id}`);
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  const list = async () => {
    if (!url) return;
    try {
      const r = await fetch(url + "?action=seed_list");
      const d = await r.json();
      setSeeds(
        (d?.seeds || []).sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || "")),
      );
    } catch {}
  };
  useEffect(() => {
    list();
  }, []);
  return (
    <Card>
      <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 12 }}>Seeds</h3>
      <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
        <Btn onClick={save} style={{ fontSize: 12 }}>
          💾 Save snapshot
        </Btn>
        <input
          type="text"
          value={seedId}
          placeholder="Seed ID…"
          onChange={(e) => setSeedId(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && loadById()}
          style={{ ...S.input, fontSize: 12, padding: "5px 8px", flex: 1, minWidth: 80 }}
        />
        <Btn onClick={() => loadById()} style={{ fontSize: 12 }}>
          📂 Load
        </Btn>
      </div>
      <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>{status}</div>
      {seeds.length > 0 && (
        <div style={{ fontSize: 12 }}>
          {seeds.map((s) => (
            <div
              key={s.id}
              style={{
                display: "flex",
                gap: 6,
                padding: "6px 0",
                borderBottom: `0.5px solid ${C.bL}`,
                alignItems: "center",
                flexWrap: "wrap",
              }}
            >
              <code
                style={{
                  fontSize: 11,
                  background: C.subtle,
                  padding: "1px 5px",
                  borderRadius: 3,
                  flexShrink: 0,
                }}
              >
                {s.id}
              </code>
              <span style={{ flex: 1, fontSize: 12, minWidth: 80 }}>{s.label}</span>
              <span style={{ fontSize: 10, color: C.faint, flexShrink: 0 }}>
                {s.timestamp ? new Date(s.timestamp).toLocaleDateString() : ""}
              </span>
              <Btn
                onClick={() => {
                  if (confirm(`Load seed ${s.id}?`)) loadById(s.id);
                }}
                style={{
                  fontSize: 10,
                  padding: "2px 8px",
                  color: C.blue,
                  borderColor: C.bBd,
                  flexShrink: 0,
                }}
              >
                Load
              </Btn>
              <Btn
                onClick={() => {
                  if (confirm(`Delete seed ${s.id}?`)) del(s.id);
                }}
                style={{ fontSize: 10, padding: "2px 6px", color: C.red, flexShrink: 0 }}
              >
                ✕
              </Btn>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

// Fetches rules from Google Sheet's 'Rules' tab
// Rules tab — fetches from Google Sheet, caches locally
// Filtered by tournament name. Cached in localStorage
function RulesTab({ state }) {
  const [rows, setRows] = useState(null),
    [status, setStatus] = useState("");
  const tn = state.tournaments?.[state.tournamentId]?.name || "";
  const load = async (f) => {
    const ck = "rules_" + tn;
    if (!f)
      try {
        const c = localStorage.getItem(ck);
        if (c) {
          setRows(JSON.parse(c));
          setStatus("Cached");
        }
      } catch {}
    const url = state.sheetsUrl;
    if (!url) {
      setStatus("⚠ No URL");
      return;
    }
    try {
      const r = await fetch(url + "?action=rules&tournament=" + encodeURIComponent(tn));
      const d = await r.json();
      if (d?.rows) {
        setRows(d.rows);
        try {
          localStorage.setItem(ck, JSON.stringify(d.rows));
        } catch {}
        setStatus("✓");
      } else setStatus("✗ " + (d?.error || "Error"));
    } catch (e) {
      setStatus("✗ " + e.message);
    }
  };
  useEffect(() => {
    load(false);
  }, []);
  return (
    <Card>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          marginBottom: 12,
          flexWrap: "wrap",
          gap: 8,
        }}
      >
        <h3 style={{ margin: 0 }}>Rules — {tn}</h3>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontSize: 11, color: C.muted }}>{status}</span>
          <Btn onClick={() => load(true)} style={{ fontSize: 11, padding: "3px 8px" }}>
            ↻
          </Btn>
        </div>
      </div>
      {!rows ? (
        <div
          style={{
            padding: 16,
            background: "#fafaf7",
            borderRadius: 8,
            color: C.muted,
            fontStyle: "italic",
            fontSize: 13,
          }}
        >
          Rules load from "Rules" tab.
        </div>
      ) : rows.length === 0 ? (
        <div style={{ padding: 16, color: C.muted, fontSize: 13 }}>No rules for "{tn}".</div>
      ) : (
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} style={{ background: i % 2 === 1 ? "#fafafa" : "" }}>
                {r.map((c, j) => (
                  <td
                    key={j}
                    style={{
                      padding: "6px 10px 6px 0",
                      borderBottom: `0.5px solid ${C.bL}`,
                      whiteSpace: "pre-wrap",
                    }}
                  >
                    {c}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </Card>
  );
}

// Left card: add players with autocomplete dropdown from ELO database
//   - Dropdown shows up to 6 matches, filtered by test mode
//   - Player list with paid toggle, abandon button, remove button
// Right card: full registered players table with ELO, filter search
//   - Filters by test flag based on testMode state
function PlayersTab({ state, dispatch, config, eloLoadedCols }) {
  const [input, setInput] = useState(""),
    [filter, setFilter] = useState(""),
    [acFocused, setAcFocused] = useState(false);
  const eloCol = config?.features?.eloCol;
  const activeElo = state.eloDb?.[eloCol] || {};
  const eloReady = !eloCol || !!eloLoadedCols?.[eloCol];
  const addS = useMemo(
    () => new Set(state.players.map((p) => p.name.toLowerCase())),
    [state.players],
  );
  const dbE = useMemo(
    () =>
      Object.values(activeElo)
        .filter(
          (e) =>
            e?.name &&
            !addS.has(e.name.toLowerCase()) &&
            (!filter || e.name.toLowerCase().includes(filter.toLowerCase())) &&
            (state.testMode ? !!e.test : !e.test),
        )
        .sort((a, b) => (b.elo || 0) - (a.elo || 0)),
    [activeElo, filter, state.testMode, addS],
  );
  const pc = state.players.filter((p) => p.paid).length;
  const suggestions = useMemo(() => {
    if (!input.trim() || input.length < 1) return [];
    return Object.values(activeElo)
      .filter(
        (e) =>
          e?.name &&
          e.name.toLowerCase().includes(input.toLowerCase()) &&
          !addS.has(e.name.toLowerCase()) &&
          (state.testMode ? !!e.test : !e.test),
      )
      .sort((a, b) => (b.elo || 0) - (a.elo || 0))
      .slice(0, 6);
  }, [input, activeElo, addS, state.testMode]);
  const addPlayer = (name) => {
    dispatch({ type: "ADD_PLAYER", name });
    setInput("");
  };
  return (
    <div>

                          fontWeight: 500,
                          textAlign: "left",

                          top: 0,

                      <th

                          fontSize: 11,
                          color: C.muted,
                          fontWeight: 500,
                          textAlign: "center",
                          padding: "4px 6px",
